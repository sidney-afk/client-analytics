name: B1 Linear Incremental Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read

concurrency:
  group: b1-linear-incremental-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SUPABASE_URL: https://uzltbbrjidmjwwfakwve.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Restore last-known-good authority cache
        uses: actions/cache@v4
        with:
          path: .sync-ledger
          key: b1-prod-authority-${{ github.run_id }}
          restore-keys: |
            b1-prod-authority-

      - name: Require refresh secrets
        shell: bash
        run: |
          missing=0
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ] || [ -z "$LINEAR_API_KEY" ]; then
            echo "::error::Missing SUPABASE_SERVICE_ROLE_KEY or LINEAR_API_KEY; refusing to report a green refresh."
            missing=1
          fi
          exit "$missing"

      - name: Run incremental refresh
        shell: bash
        run: |
          mkdir -p artifacts
          node scripts/b1-linear-backfill.js \
            --incremental \
            --apply \
            --page-delay-ms 500 \
            --out artifacts/b1-linear-incremental-refresh.md \
            --json-out artifacts/b1-linear-incremental-refresh.json

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: b1-linear-incremental-refresh
          path: artifacts/
          if-no-files-found: ignore
