name: Deploy staff-sensitive edge functions

# Auto-deploys onboarding, credentials, filming-plan, and SMM-report functions
# plus their shared role-key helper whenever they change on main, or on manual
# dispatch. The Track-B linear-outbound + production-write pair is manual-only:
# it must come from an exact commit already on main, and the provider deploys
# before the gateway. A normal merge/push must never deploy that pair.
# Uses the existing SUPABASE_ACCESS_TOKEN Actions secret. Role keys and
# transition-only legacy passphrases live as Supabase function secrets, never in
# this repository.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/onboarding-list/**'
      - 'supabase/functions/ai-onboarding-list/**'
      - 'supabase/functions/legacy-onboarding-list/**'
      - 'supabase/functions/onboarding-full/**'
      - 'supabase/functions/client-credentials/**'
      - 'supabase/functions/filming-plans/**'
      - 'supabase/functions/smm-weekly-reports/**'
      - 'supabase/functions/key-verify/**'
      - 'supabase/functions/_shared/staff-role-auth.ts'
      - '.github/workflows/deploy-onboarding-edge-functions.yml'
  workflow_dispatch:
    inputs:
      commit_sha:
        description: Exact 40-character commit SHA from main to deploy
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: uzltbbrjidmjwwfakwve
      DEPLOY_COMMIT: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_COMMIT }}
          fetch-depth: 0
      - name: Verify pinned deploy commit
        shell: bash
        run: |
          actual="$(git rev-parse HEAD)"
          if [ "$actual" != "$DEPLOY_COMMIT" ]; then
            echo "::error::Checked out $actual instead of requested $DEPLOY_COMMIT"
            exit 1
          fi
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            if ! [[ "$DEPLOY_COMMIT" =~ ^[0-9a-f]{40}$ ]]; then
              echo "::error::Manual deploys require an exact 40-character commit SHA"
              exit 1
            fi
            git fetch origin main:refs/remotes/origin/main
            if ! git merge-base --is-ancestor "$DEPLOY_COMMIT" origin/main; then
              echo "::error::Manual deploy commit is not on origin/main"
              exit 1
            fi
          fi
          echo "Deploying Edge Functions from $actual" >> "$GITHUB_STEP_SUMMARY"
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy push-safe staff-sensitive functions
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set — add it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          for fn in onboarding-list ai-onboarding-list legacy-onboarding-list onboarding-full client-credentials filming-plans smm-weekly-reports key-verify; do
            echo "Deploying $fn…"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF" --no-verify-jwt
          done
      - name: Deploy pinned Track-B write functions
        if: github.event_name == 'workflow_dispatch'
        run: |
          for fn in linear-outbound production-write; do
            echo "Deploying $fn…"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF" --no-verify-jwt
          done
