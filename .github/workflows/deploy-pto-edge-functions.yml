name: Deploy PTO edge function

# Auto-deploys the staff-authenticated PTO function when its source or shared
# role-key helper changes on main. Manual dispatch supports later verified
# redeploys once this new workflow exists on the default branch.
# The Actions token and role keys stay in managed secret stores, never here.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/pto/**'
      - 'supabase/functions/_shared/staff-role-auth.ts'
      - '.github/workflows/deploy-pto-edge-functions.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: uzltbbrjidmjwwfakwve
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy functions
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set — add it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          for fn in pto; do
            echo "Deploying $fn…"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF" --no-verify-jwt
          done
