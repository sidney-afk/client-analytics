name: Deploy thumbnail edge functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/calendar-upsert/**'
      - 'supabase/functions/sample-review-upsert/**'
      - 'supabase/functions/thumbnail-revision-read/**'
      - 'supabase/functions/thumbnail-revision-scan/**'
      - 'supabase/functions/_shared/thumbnail-revisions.ts'
      - 'supabase/functions/_shared/staff-role-auth.ts'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-thumbnail-edge-functions.yml'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: deploy-thumbnail-edge-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: uzltbbrjidmjwwfakwve
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Verify deploy credential
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set — add it in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Deploy thumbnail functions
        shell: bash
        run: |
          for fn in calendar-upsert sample-review-upsert thumbnail-revision-read thumbnail-revision-scan; do
            echo "Deploying $fn…"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF" --no-verify-jwt
          done
