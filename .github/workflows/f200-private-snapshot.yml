name: F200 private attribution snapshot

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      SUPABASE_URL: https://uzltbbrjidmjwwfakwve.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Require read credentials
        run: |
          test -n "$SUPABASE_SERVICE_ROLE_KEY"
          test -n "$LINEAR_API_KEY"
      - name: Create private read-only snapshot
        run: node scripts/f200-attribution-live-snapshot.js --out "$RUNNER_TEMP/f200-live-snapshot.json"
      - name: Retain private snapshot briefly
        uses: actions/upload-artifact@v4
        with:
          name: f200-live-snapshot
          path: ${{ runner.temp }}/f200-live-snapshot.json
          retention-days: 1
