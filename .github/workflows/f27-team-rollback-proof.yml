name: F27 team rollback proof

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "migrations/2026-07-20-f27-team-rollback.sql"
      - "scripts/f27-team-rollback-proof.sql"
      - "scripts/f27-drill-runner.js"
      - "scripts/f27-drill-runner-fixture.sql"
      - "scripts/f27-apply-migration.js"
      - "scripts/f27-edge-source-rollback.js"
      - "scripts/f27-edge-source-rollback-lib.js"
      - "scripts/f27-edge-source-rollback-supabase-adapter.js"
      - "scripts/f27-inbound-freshness.js"
      - "scripts/f27-database-rollback-recipe.js"
      - "scripts/f27-database-rollback-execute.js"
      - "scripts/f27-install-checklist.js"
      - "scripts/f27-mirror-outbox-snapshot.js"
      - "scripts/f27-private-snapshot-store.js"
      - "test/f27-team-rollback.js"
      - "test/f27-drill-runner.js"
      - "test/f27-apply-migration.js"
      - "test/f27-edge-source-rollback.js"
      - "test/f27-inbound-freshness.js"
      - "test/f27-database-rollback-recipe.js"
      - "test/f27-database-rollback-execute.js"
      - "test/f27-install-checklist.js"
      - "test/f27-mirror-outbox-snapshot.js"
      - "test/f27-private-snapshot-store.js"
      - "supabase/functions/linear-inbound/deno.json"
      - "supabase/functions/linear-inbound/deno.lock"
      - "supabase/functions/linear-inbound/index.ts"
      - "docs/ops/F27_INSTALL_RUNBOOK.md"
      - "docs/ops/F27_INSTALL_CHECKLIST.md"
      - ".github/workflows/f27-team-rollback-proof.yml"

permissions:
  contents: read

jobs:
  f27-proof:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.2.15
      - name: Validate the already-produced frozen inbound lock
        run: |
          deno --version
          deno cache --frozen \
            --config supabase/functions/linear-inbound/deno.json \
            supabase/functions/linear-inbound/index.ts
          git diff --exit-code -- \
            supabase/functions/linear-inbound/deno.json \
            supabase/functions/linear-inbound/deno.lock
      - name: Validate fail-closed operator contracts
        run: |
          node test/f27-apply-migration.js
          node test/f27-drill-runner.js
          node test/f27-edge-source-rollback.js
          node test/f27-inbound-freshness.js
          node test/f27-database-rollback-recipe.js
          node test/f27-database-rollback-execute.js
          node test/f27-install-checklist.js
          node test/f27-mirror-outbox-snapshot.js
          node test/f27-private-snapshot-store.js
      - name: Run isolated TEST proof and prepare pristine toolkit fixture
        env:
          F27_PROOF_DIR: ${{ runner.temp }}/f27-proof
        run: |
          set -o pipefail
          mkdir -p "$F27_PROOF_DIR"
          createdb f27_contract
          PGDATABASE=f27_contract \
            psql -X -v ON_ERROR_STOP=1 -f scripts/f27-team-rollback-proof.sql \
            | tee "$F27_PROOF_DIR/terminal.txt"
          sha256sum "$F27_PROOF_DIR/terminal.txt" | tee "$F27_PROOF_DIR/terminal.sha256"
          createdb f27_operator_toolkit
          PGDATABASE=f27_operator_toolkit \
            psql -X -q -v ON_ERROR_STOP=1 -f scripts/f27-drill-runner-fixture.sql \
            > "$F27_PROOF_DIR/operator-fixture.txt"
      - name: Outside-n8n terminal observer
        env:
          F27_PROOF_DIR: ${{ runner.temp }}/f27-proof
        run: |
          grep -q "F27_PROOF_OK" "$F27_PROOF_DIR/terminal.txt"
          {
            echo "## F27 isolated TEST proof"
            echo
            echo "- observer: GitHub Actions (outside n8n)"
            echo "- terminal: F27_PROOF_OK"
            echo "- receipt hash: $(cut -d' ' -f1 "$F27_PROOF_DIR/terminal.sha256")"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Fingerprint the exact post-migration contract
        env:
          F27_CANDIDATE_RELEASE_SHA: ${{ github.sha }}
          F27_DISPOSABLE_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/f27_operator_toolkit
          F27_PROOF_DIR: ${{ runner.temp }}/f27-proof
        run: |
          set -o pipefail
          node - <<'NODE' | tee "$F27_PROOF_DIR/post-contract.json"
          const crypto = require('node:crypto');
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');
          const { fingerprintPost } = require('./scripts/f27-mirror-outbox-snapshot.js');
          const releaseSha = process.env.F27_CANDIDATE_RELEASE_SHA;
          const headSha = execFileSync('git', ['rev-parse', 'HEAD'], { encoding: 'utf8' }).trim();
          const dirty = Boolean(execFileSync('git', [
            'status', '--porcelain=v1', '--untracked-files=all',
          ], { encoding: 'utf8' }).trim());
          const migrationSha256 = crypto.createHash('sha256').update(fs.readFileSync(
            'migrations/2026-07-20-f27-team-rollback.sql',
          )).digest('hex');
          const receipt = fingerprintPost({
            confirmed: true,
            database: 'f27_operator_toolkit',
            databaseUrl: process.env.F27_DISPOSABLE_DATABASE_URL,
            releaseSha,
            releaseInfo: {
              headSha,
              originMainSha: null,
              dirty,
              migrationSha256,
            },
          });
          process.stdout.write(`${JSON.stringify({ ...receipt, release_scope: 'checked_out_candidate' })}\n`);
          NODE
          grep -q '"status":"PASS"' "$F27_PROOF_DIR/post-contract.json"
          grep -q '"release_scope":"checked_out_candidate"' "$F27_PROOF_DIR/post-contract.json"
          sha256sum "$F27_PROOF_DIR/post-contract.json" | tee "$F27_PROOF_DIR/post-contract.sha256"
          {
            echo
            echo "## F27 exact post-migration contract"
            echo
            echo "- source: clean checked-out candidate migration on disposable PostgreSQL 16"
            echo "- terminal: PASS"
            echo "- public receipt hash: $(cut -d' ' -f1 "$F27_PROOF_DIR/post-contract.sha256")"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Run the packaged reserved-drill operator
        env:
          F27_PROOF_DIR: ${{ runner.temp }}/f27-proof
        run: |
          set -o pipefail
          PGDATABASE=f27_operator_toolkit \
            node scripts/f27-drill-runner.js \
              --transport=psql \
              --confirm=F27_DISPOSABLE_DRILL_ONLY \
              --confirm-database=f27_operator_toolkit \
              --actor=f27-ci \
            | tee "$F27_PROOF_DIR/operator-terminal.json"
          grep -q "F27_DRILL_RUNNER_OK" "$F27_PROOF_DIR/operator-terminal.json"
          sha256sum "$F27_PROOF_DIR/operator-terminal.json" | tee "$F27_PROOF_DIR/operator-terminal.sha256"
          {
            echo
            echo "## F27 packaged operator proof"
            echo
            echo "- transport: disposable PostgreSQL 16"
            echo "- terminal: F27_DRILL_RUNNER_OK"
            echo "- authority CAS: refused"
            echo "- operator receipt hash: $(cut -d' ' -f1 "$F27_PROOF_DIR/operator-terminal.sha256")"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v4
        with:
          name: f27-team-rollback-proof
          path: ${{ runner.temp }}/f27-proof/
          retention-days: 30
