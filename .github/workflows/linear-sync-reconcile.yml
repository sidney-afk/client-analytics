name: Linear ⇄ SyncView status reconcile

# Convergence backbone: catches any dropped real-time sync event by periodically
# reconciling every linked card-component against its Linear issue (most-recent
# action wins). See scripts/linear-sync-reconcile.js and docs/ops/LINEAR_SYNC_RECONCILE.md.
#
# Production cadence is owned by the monitored n8n pager `qllIDZPkdNAPRj0b`,
# which dispatches this workflow every 15 minutes. Keep this workflow dispatch-only
# so GitHub cron throttling cannot duplicate the pager's runs and n8n API reads.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview only — report corrections without writing'
        type: boolean
        default: true
      cap:
        description: 'Safety cap: abort without writing if more than this many corrections'
        default: '15'

concurrency:
  group: linear-sync-reconcile
  cancel-in-progress: false      # let an in-flight run finish (and save its ledger)

permissions:
  contents: read

jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4              # needs index.html for the canonical logic
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Restore reconcile ledger
        uses: actions/cache@v4
        with:
          path: .sync-ledger
          key: linear-reconcile-ledger-${{ github.run_id }}
          restore-keys: |
            linear-reconcile-ledger-
      - name: Reconcile
        env:
          # qll dispatches with dry_run=false; operator runs honor the input.
          APPLY: ${{ github.event.inputs.dry_run != 'true' }}
          CAP: ${{ github.event.inputs.cap || '15' }}
          SYNCVIEW_STAFF_KEY: ${{ secrets.SYNCVIEW_STAFF_KEY }}
        run: node scripts/linear-sync-reconcile.js
