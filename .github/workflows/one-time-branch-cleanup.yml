# One-time cleanup of stale branches, June 2026.
#
# Runs ONLY when a person presses "Run workflow" in the Actions tab.
# Deletes ONLY the branches named in .github/branch-cleanup-list.txt,
# and only after re-proving, for each one, that its work is preserved
# elsewhere (merged into main, or snapshotted on an archive/* branch).
# It can never touch main, claude/data-competitors (live data feed for
# the weekly n8n Slack reports), or the archive/* snapshots.
#
# Safe to delete this file and the list file once the cleanup has run.

name: One-time branch cleanup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete listed branches, verifying each is preserved first
        run: |
          set -u
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune
          MAIN_SHA=$(git rev-parse refs/remotes/origin/main)
          echo "main is at $MAIN_SHA"
          DELETED=0; GONE=0; KEPT=0

          while IFS= read -r raw; do
            b=$(printf '%s' "$raw" | tr -d '[:space:]')
            [ -z "$b" ] && continue
            case "$b" in '#'*) continue ;; esac

            # Hard guard: refuse protected names even if listed by mistake.
            case "$b" in
              main|claude/data-competitors|claude/kind-fermi-xa2mdz|archive/*)
                echo "PROTECTED — refusing to touch: $b"; KEPT=$((KEPT+1)); continue ;;
            esac

            if ! git rev-parse -q --verify "refs/remotes/origin/$b" >/dev/null; then
              echo "already gone: $b"; GONE=$((GONE+1)); continue
            fi

            SHA=$(git rev-parse "refs/remotes/origin/$b")
            ARCH="archive/${b#claude/}"
            if git merge-base --is-ancestor "$SHA" "$MAIN_SHA"; then
              REASON="fully merged into main"
            elif git rev-parse -q --verify "refs/remotes/origin/$ARCH" >/dev/null && \
                 [ "$(git rev-parse "refs/remotes/origin/$ARCH")" = "$SHA" ]; then
              REASON="snapshot preserved at $ARCH"
            else
              echo "NOT PROVEN SAFE — keeping: $b (not in main, no matching archive snapshot)"
              KEPT=$((KEPT+1)); continue
            fi

            if git push origin --delete "$b" >/dev/null 2>&1; then
              echo "deleted: $b  [$REASON]"
              DELETED=$((DELETED+1))
            else
              echo "ERROR deleting (kept): $b"
              KEPT=$((KEPT+1))
            fi
          done < .github/branch-cleanup-list.txt

          echo ""
          echo "================================================="
          echo "Summary: $DELETED deleted, $GONE already gone, $KEPT kept"
          echo "================================================="
          if [ "$KEPT" -ne 0 ]; then
            echo "Some branches were kept out of caution — see lines above."
            exit 1
          fi
