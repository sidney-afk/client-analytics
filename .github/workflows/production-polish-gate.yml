name: Production polish gate

on:
  pull_request:
    paths:
      - 'index.html'
      - 'package.json'
      - 'docs/syncview-design/**'
      - '.github/workflows/production-polish-gate.yml'
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'package.json'
      - 'docs/syncview-design/**'
      - '.github/workflows/production-polish-gate.yml'
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * 1-5'

concurrency:
  group: production-polish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-polish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Resolve Playwright version
        id: playwright-version
        run: node -e "require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'version=' + require('./package.json').devDependencies.playwright + '\n')"
      - name: Install browser test dependencies
        run: npm install --no-package-lock
      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install Chromium and system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Verify cached Chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install chromium
      - name: Run fast Production polish gate
        run: node docs/syncview-design/tests/prod-polish-gate.js --lane=fast

  production-polish-interaction:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Resolve Playwright version
        id: playwright-version
        run: node -e "require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'version=' + require('./package.json').devDependencies.playwright + '\n')"
      - name: Install browser test dependencies
        run: npm install --no-package-lock
      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install Chromium and system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Verify cached Chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install chromium
      - name: Run Production interaction inventory
        run: node docs/syncview-design/tests/prod-polish-gate.js --lane=interaction

  production-polish-heavy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Resolve Playwright version
        id: playwright-version
        run: node -e "require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'version=' + require('./package.json').devDependencies.playwright + '\n')"
      - name: Install browser test dependencies
        run: npm install --no-package-lock
      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install Chromium and system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Verify cached Chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install chromium
      - name: Run behavior and pixel Production polish gates
        run: node docs/syncview-design/tests/prod-polish-gate.js --lane=heavy
      - name: Build Production review packet
        run: npm run test:prod-review
      - name: Validate Production review packet
        run: npm run test:prod-review:validate
      - name: Prepare Argos Production snapshots
        run: npm run test:prod-argos:prepare
      - name: Summarize Production review packet
        if: always()
        run: |
          if [ -f .codex-tmp/prod-review-packet/manifest.md ]; then
            cat .codex-tmp/prod-review-packet/manifest.md >> "$GITHUB_STEP_SUMMARY"
            if [ -f .codex-tmp/prod-review-packet/review-checklist.md ]; then
              echo "" >> "$GITHUB_STEP_SUMMARY"
              cat .codex-tmp/prod-review-packet/review-checklist.md >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "Production review packet manifest was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload Production snapshots to Argos
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
          ARGOS_PROJECT: ${{ vars.ARGOS_PROJECT }}
        run: |
          if [ ! -d .codex-tmp/prod-argos-snapshots ]; then
            echo "Argos snapshot export was not generated; skipping Argos visual upload." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ -z "$ARGOS_TOKEN" ]; then
            echo "ARGOS_TOKEN is not configured; skipping Argos visual upload." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          args=(upload .codex-tmp/prod-argos-snapshots --build-name production-desktop)
          if [ -n "$ARGOS_PROJECT" ]; then
            args+=(--project "$ARGOS_PROJECT")
          fi
          npm exec -- argos "${args[@]}"
          echo "Uploaded Production desktop snapshots to Argos." >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Production polish screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-polish-screenshots
          path: .codex-tmp/prod-pixel-wired
          if-no-files-found: ignore
      - name: Upload Production review packet
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-review-packet
          path: .codex-tmp/prod-review-packet
          if-no-files-found: ignore
      - name: Upload Argos Production snapshot export
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-argos-snapshots
          path: .codex-tmp/prod-argos-snapshots
          if-no-files-found: ignore
