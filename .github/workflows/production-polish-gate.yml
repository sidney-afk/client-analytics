name: Production polish gate

on:
  pull_request:
    paths:
      - 'index.html'
      - 'package.json'
      - 'docs/syncview-design/**'
      - '.github/workflows/production-polish-gate.yml'
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'package.json'
      - 'docs/syncview-design/**'
      - '.github/workflows/production-polish-gate.yml'
  workflow_dispatch:
  schedule:
    - cron: '17 9 * * 1-5'

concurrency:
  group: production-polish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  production-polish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Resolve Playwright version
        id: playwright-version
        run: node -e "require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'version=' + require('./package.json').devDependencies.playwright + '\n')"
      - name: Install browser test dependencies
        run: npm install --no-package-lock
      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install Chromium and system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Verify cached Chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install chromium
      - name: Run fast Production polish gate
        run: |
          mkdir -p .codex-tmp
          if ! node docs/syncview-design/tests/prod-polish-gate.js --lane=fast > .codex-tmp/prod-fast-private.log 2>&1; then
            echo "::error::Production fast gate failed. Live-derived output stayed in the ephemeral runner."
            exit 1
          fi

  production-polish-interaction:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Resolve Playwright version
        id: playwright-version
        run: node -e "require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'version=' + require('./package.json').devDependencies.playwright + '\n')"
      - name: Install browser test dependencies
        run: npm install --no-package-lock
      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install Chromium and system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Verify cached Chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install chromium
      - name: Run Production interaction inventory
        run: |
          mkdir -p .codex-tmp
          if ! node docs/syncview-design/tests/prod-polish-gate.js --lane=interaction > .codex-tmp/prod-interaction-private.log 2>&1; then
            echo "::error::Production interaction gate failed. Live-derived output stayed in the ephemeral runner."
            exit 1
          fi

  production-polish-heavy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Resolve Playwright version
        id: playwright-version
        run: node -e "require('fs').appendFileSync(process.env.GITHUB_OUTPUT, 'version=' + require('./package.json').devDependencies.playwright + '\n')"
      - name: Install browser test dependencies
        run: npm install --no-package-lock
      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ steps.playwright-version.outputs.version }}
      - name: Install Chromium and system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Verify cached Chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install chromium
      - name: Run behavior and pixel Production polish gates
        run: |
          mkdir -p .codex-tmp
          if ! node docs/syncview-design/tests/prod-polish-gate.js --lane=heavy > .codex-tmp/prod-heavy-private.log 2>&1; then
            echo "::error::Production heavy gate failed. Live-derived output stayed in the ephemeral runner."
            exit 1
          fi
      - name: Build Production review packet
        run: |
          if ! npm run test:prod-review > .codex-tmp/prod-review-private.log 2>&1; then
            echo "::error::Production packet build failed. Live-derived output stayed in the ephemeral runner."
            exit 1
          fi
      - name: Validate Production review packet
        run: |
          if ! npm run test:prod-review:validate > .codex-tmp/prod-validate-private.log 2>&1; then
            echo "::error::Production packet validation failed. Live-derived output stayed in the ephemeral runner."
            exit 1
          fi
      - name: Prepare local Production snapshot export
        run: |
          if ! npm run test:prod-argos:prepare > .codex-tmp/prod-export-private.log 2>&1; then
            echo "::error::Production local visual export failed. Live-derived output stayed in the ephemeral runner."
            exit 1
          fi
      - name: Summarize Production review packet
        if: always()
        run: |
          if [ -f .codex-tmp/prod-review-packet/manifest.md ]; then
            echo "Production review packet generated and validated inside the ephemeral runner." >> "$GITHUB_STEP_SUMMARY"
            echo "Detailed manifests, checklists, screenshots, and live-derived text were intentionally not copied into this public job summary." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Production review packet manifest was not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Keep visual evidence runner-local
        if: always()
        run: |
          echo "Production screenshots can contain live customer-visible text." >> "$GITHUB_STEP_SUMMARY"
          echo "They were validated inside this ephemeral runner and are intentionally not uploaded as public artifacts or sent to Argos." >> "$GITHUB_STEP_SUMMARY"
