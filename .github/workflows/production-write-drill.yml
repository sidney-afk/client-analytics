name: Production write gateway TEST drill

on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * *'

permissions:
  contents: read

concurrency:
  group: production-write-gateway-test-drill
  cancel-in-progress: false

jobs:
  drill:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      SUPABASE_URL: https://uzltbbrjidmjwwfakwve.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
      B4_CONFIRM_TEST_MUTATIONS: '1'
      PRODUCTION_WRITE_DRILL_REPORT: artifacts/production-write-drill.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Require TEST-only drill configuration
        shell: bash
        run: |
          missing=0
          for name in SUPABASE_SERVICE_ROLE_KEY LINEAR_API_KEY; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required TEST drill secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Exercise native create and field writes through production-write
        run: node scripts/production-write-drill.js

      - name: Upload public-safe aggregate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-write-drill
          path: artifacts/production-write-drill.json
          if-no-files-found: ignore
          retention-days: 14
