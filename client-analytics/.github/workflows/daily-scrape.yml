name: Daily SocialBlade Scrape

on:
  schedule:
    # Runs at 9 AM EST every day (2 PM UTC)
    - cron: '0 14 * * *'
  workflow_dispatch: # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Set up Google credentials
      env:
        GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: |
        echo "$GOOGLE_SERVICE_ACCOUNT" > /tmp/google-creds.json
        
    - name: Run scraper
      env:
        GOOGLE_APPLICATION_CREDENTIALS: /tmp/google-creds.json
      run: |
        python scraper_github.py
        
    - name: Cleanup
      if: always()
      run: |
        rm -f /tmp/google-creds.json
