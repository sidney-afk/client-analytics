<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .filters {
            background: white;
            padding: 20px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            margin-bottom: 25px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filters label {
            font-weight: 600;
            color: #555;
            font-size: 0.9em;
        }

        .filters select {
            padding: 10px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 0.95em;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 180px;
        }

        .filters select:hover {
            border-color: #667eea;
        }

        .filters select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            padding: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }

        .stat-card h3 {
            font-size: 0.8em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .stat-card .value {
            font-size: 2.4em;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 6px;
            line-height: 1.1;
        }

        .stat-card .subtitle {
            font-size: 0.85em;
            color: #10b981;
            font-weight: 500;
        }

        .stat-card .subtitle.neutral {
            color: #888;
        }

        .stat-card.youtube .value { color: #FF0000; }
        .stat-card.instagram .value { color: #E1306C; }
        .stat-card.tiktok .value { color: #00f2ea; }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .chart-container {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .chart-container h2 {
            margin-bottom: 20px;
            color: #333;
            font-size: 1.3em;
            font-weight: 600;
        }

        .chart-wrapper {
            position: relative;
            height: 350px;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 60px 20px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid #fecaca;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            font-size: 1.1em;
        }

        .last-updated {
            text-align: center;
            color: white;
            opacity: 0.85;
            margin-top: 30px;
            font-size: 0.9em;
        }

        @media (min-width: 1024px) {
            .charts-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 600px) {
            header h1 {
                font-size: 1.8em;
            }
            
            .filters {
                padding: 15px;
            }
            
            .filter-group {
                width: 100%;
            }
            
            .filters select {
                flex: 1;
            }
            
            .stat-card .value {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Client Analytics</h1>
            <p>Daily social media performance tracking</p>
        </header>

        <div id="loading" class="loading">Loading data</div>
        <div id="error" class="error" style="display: none;"></div>

        <div id="dashboard" style="display: none;">
            <div class="filters">
                <div class="filter-group">
                    <label for="clientFilter">Client:</label>
                    <select id="clientFilter">
                        <option value="all">All Clients</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <label for="platformFilter">Platform:</label>
                    <select id="platformFilter">
                        <option value="all">All Platforms</option>
                        <option value="YouTube">YouTube</option>
                        <option value="Instagram">Instagram</option>
                        <option value="TikTok">TikTok</option>
                    </select>
                </div>
            </div>

            <div id="noData" class="no-data" style="display: none;">
                No data available for the selected filters.
            </div>

            <div id="dashboardContent">
                <div class="stats-grid" id="statsGrid"></div>
                <div class="charts-grid">
                    <div class="chart-container">
                        <h2>📈 Daily Followers Gained</h2>
                        <div class="chart-wrapper">
                            <canvas id="followersChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-container">
                        <h2>👁️ Total Views</h2>
                        <div class="chart-wrapper">
                            <canvas id="viewsChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-container">
                        <h2>🎯 Followers by Platform</h2>
                        <div class="chart-wrapper">
                            <canvas id="platformBarChart"></canvas>
                        </div>
                    </div>
                    <div class="chart-container">
                        <h2>📊 Platform Distribution</h2>
                        <div class="chart-wrapper">
                            <canvas id="platformPieChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="last-updated" id="lastUpdated"></div>
        </div>
    </div>

    <script>
        // Configuration
        const SHEET_ID = '1iZ7OL_B1XWrLnL8CzoH3xOGCANIl5UTY_oX0NBz-HlI';
        const SHEET_NAME = 'Sheet1';
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${SHEET_NAME}`;

        // Platform colors
        const COLORS = {
            'YouTube': { bg: 'rgba(255, 0, 0, 0.15)', border: '#FF0000' },
            'Instagram': { bg: 'rgba(225, 48, 108, 0.15)', border: '#E1306C' },
            'TikTok': { bg: 'rgba(0, 242, 234, 0.15)', border: '#00f2ea' }
        };

        // Global state
        let allData = [];
        let charts = {};
        let filtersInitialized = false;

        // Parse CSV
        function parseCSV(csv) {
            const lines = csv.split('\n').filter(line => line.trim());
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
            
            return lines.slice(1).map(line => {
                // Handle CSV with possible commas in values
                const values = [];
                let current = '';
                let inQuotes = false;
                
                for (const char of line) {
                    if (char === '"') {
                        inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                
                const obj = {};
                headers.forEach((header, i) => {
                    obj[header] = (values[i] || '').replace(/"/g, '').trim();
                });
                return obj;
            });
        }

        // Fetch data
        async function fetchData() {
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error('Failed to fetch data from Google Sheets');
            
            const csv = await response.text();
            const data = parseCSV(csv);
            
            return data.map(row => ({
                date: row.Date || row.date || '',
                client: row.Client || row['Client Name'] || row.client || '',
                platform: row.Platform || row.platform || '',
                followersGained: parseInt(row['Followers '] || row['Followers Gained'] || row.Followers || 0) || 0,
                views: parseInt(row.Views || row.views || 0) || 0
            })).filter(row => row.date && row.client);
        }

        // Get unique sorted dates
        function getUniqueDates(data) {
            return [...new Set(data.map(d => d.date))].sort();
        }

        // Create stats cards
        function createStatsCards(data) {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '';

            if (data.length === 0) return;

            const dates = getUniqueDates(data);
            const platforms = [...new Set(data.map(d => d.platform))];
            
            // Total followers gained (all data)
            const totalFollowers = data.reduce((sum, row) => sum + row.followersGained, 0);
            
            // Calculate days in data
            const numDays = dates.length;
            const dateLabel = numDays === 1 ? 'Today' : `Last ${numDays} days`;

            // Total card
            statsGrid.innerHTML += `
                <div class="stat-card">
                    <h3>Total Followers Gained</h3>
                    <div class="value">+${totalFollowers.toLocaleString()}</div>
                    <div class="subtitle">${dateLabel}</div>
                </div>
            `;

            // Per-platform cards
            platforms.forEach(platform => {
                const platformData = data.filter(d => d.platform === platform);
                const followers = platformData.reduce((sum, row) => sum + row.followersGained, 0);
                const platformClass = platform.toLowerCase().replace(/\s+/g, '');
                
                statsGrid.innerHTML += `
                    <div class="stat-card ${platformClass}">
                        <h3>${platform}</h3>
                        <div class="value">+${followers.toLocaleString()}</div>
                        <div class="subtitle neutral">${platformData.length} data points</div>
                    </div>
                `;
            });

            // Total views card (if views > 0)
            const totalViews = data.reduce((sum, row) => sum + row.views, 0);
            if (totalViews > 0) {
                statsGrid.innerHTML += `
                    <div class="stat-card">
                        <h3>Total Views</h3>
                        <div class="value">${totalViews.toLocaleString()}</div>
                        <div class="subtitle neutral">${dateLabel}</div>
                    </div>
                `;
            }
        }

        // Create all charts
        function createCharts(data) {
            if (data.length === 0) return;

            const dates = getUniqueDates(data);
            const platforms = [...new Set(data.map(d => d.platform))];
            const clients = [...new Set(data.map(d => d.client))];

            // Followers line chart
            charts.followersChart = new Chart(document.getElementById('followersChart'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: platforms.map(platform => {
                        const platformData = dates.map(date => {
                            const rows = data.filter(d => d.date === date && d.platform === platform);
                            return rows.reduce((sum, r) => sum + r.followersGained, 0);
                        });
                        return {
                            label: platform,
                            data: platformData,
                            backgroundColor: COLORS[platform]?.bg || 'rgba(102, 126, 234, 0.15)',
                            borderColor: COLORS[platform]?.border || '#667eea',
                            borderWidth: 2.5,
                            tension: 0.3,
                            pointRadius: dates.length > 14 ? 0 : 4,
                            pointHoverRadius: 6
                        };
                    })
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { position: 'top', labels: { usePointStyle: true, padding: 15 } }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Views line chart
            charts.viewsChart = new Chart(document.getElementById('viewsChart'), {
                type: 'line',
                data: {
                    labels: dates,
                    datasets: platforms.map(platform => {
                        const platformData = dates.map(date => {
                            const rows = data.filter(d => d.date === date && d.platform === platform);
                            return rows.reduce((sum, r) => sum + r.views, 0);
                        });
                        return {
                            label: platform,
                            data: platformData,
                            backgroundColor: COLORS[platform]?.bg || 'rgba(102, 126, 234, 0.15)',
                            borderColor: COLORS[platform]?.border || '#667eea',
                            borderWidth: 2.5,
                            tension: 0.3,
                            fill: true,
                            pointRadius: dates.length > 14 ? 0 : 4,
                            pointHoverRadius: 6
                        };
                    })
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { position: 'top', labels: { usePointStyle: true, padding: 15 } }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Platform bar chart
            const platformTotals = platforms.map(platform => 
                data.filter(d => d.platform === platform).reduce((sum, r) => sum + r.followersGained, 0)
            );

            charts.platformBarChart = new Chart(document.getElementById('platformBarChart'), {
                type: 'bar',
                data: {
                    labels: platforms,
                    datasets: [{
                        label: 'Followers Gained',
                        data: platformTotals,
                        backgroundColor: platforms.map(p => COLORS[p]?.border || '#667eea'),
                        borderRadius: 8,
                        borderSkipped: false
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });

            // Platform pie chart
            charts.platformPieChart = new Chart(document.getElementById('platformPieChart'), {
                type: 'doughnut',
                data: {
                    labels: platforms,
                    datasets: [{
                        data: platformTotals,
                        backgroundColor: platforms.map(p => COLORS[p]?.border || '#667eea'),
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '60%',
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } }
                    }
                }
            });
        }

        // Populate client dropdown (only once)
        function populateClientFilter(data) {
            if (filtersInitialized) return;
            
            const clients = [...new Set(data.map(d => d.client))].sort();
            const select = document.getElementById('clientFilter');
            
            clients.forEach(client => {
                const option = document.createElement('option');
                option.value = client;
                option.textContent = client;
                select.appendChild(option);
            });
            
            filtersInitialized = true;
        }

        // Get filtered data
        function getFilteredData() {
            const clientFilter = document.getElementById('clientFilter').value;
            const platformFilter = document.getElementById('platformFilter').value;
            
            return allData.filter(row => {
                const matchClient = clientFilter === 'all' || row.client === clientFilter;
                const matchPlatform = platformFilter === 'all' || row.platform === platformFilter;
                return matchClient && matchPlatform;
            });
        }

        // Destroy all charts
        function destroyCharts() {
            Object.values(charts).forEach(chart => {
                if (chart && typeof chart.destroy === 'function') {
                    chart.destroy();
                }
            });
            charts = {};
        }

        // Render dashboard
        function renderDashboard() {
            const data = getFilteredData();
            
            destroyCharts();
            
            const noDataEl = document.getElementById('noData');
            const contentEl = document.getElementById('dashboardContent');
            
            if (data.length === 0) {
                noDataEl.style.display = 'block';
                contentEl.style.display = 'none';
                return;
            }
            
            noDataEl.style.display = 'none';
            contentEl.style.display = 'block';
            
            createStatsCards(data);
            createCharts(data);
        }

        // Initialize
        async function init() {
            try {
                allData = await fetchData();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                
                populateClientFilter(allData);
                
                // Set up filter listeners (only once)
                if (!filtersInitialized) {
                    document.getElementById('clientFilter').addEventListener('change', renderDashboard);
                    document.getElementById('platformFilter').addEventListener('change', renderDashboard);
                }
                
                renderDashboard();
                
                if (allData.length > 0) {
                    const dates = getUniqueDates(allData);
                    const lastDate = dates[dates.length - 1];
                    document.getElementById('lastUpdated').textContent = `Last updated: ${lastDate} • Auto-refreshes every 5 minutes`;
                }
                
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error: ${error.message}. Make sure the Google Sheet is public (view-only).`;
            }
        }

        // Start
        init();
        setInterval(() => {
            allData = [];
            filtersInitialized = false;
            init();
        }, 5 * 60 * 1000);
    </script>
</body>
</html>
