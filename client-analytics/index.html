<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Analytics Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0,0,0,0.15);
        }
        
        .stat-card .label {
            font-size: 0.9em;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .stat-card .value {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }
        
        .stat-card .change {
            font-size: 0.9em;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
        }
        
        .stat-card .change.positive {
            background: #d4edda;
            color: #155724;
        }
        
        .stat-card .change.negative {
            background: #f8d7da;
            color: #721c24;
        }
        
        .stat-card .change.neutral {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        .chart-container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        
        .chart-container h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .chart {
            height: 300px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            border-left: 2px solid #ddd;
            border-bottom: 2px solid #ddd;
            padding: 20px 10px 30px 10px;
        }
        
        .bar {
            flex: 1;
            background: linear-gradient(to top, #667eea, #764ba2);
            margin: 0 5px;
            border-radius: 4px 4px 0 0;
            position: relative;
            transition: all 0.3s;
            min-width: 20px;
        }
        
        .bar:hover {
            opacity: 0.8;
        }
        
        .bar-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8em;
            color: #666;
            white-space: nowrap;
        }
        
        .bar-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8em;
            font-weight: bold;
            color: #333;
        }
        
        .posts-grid {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .posts-grid h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .posts-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        
        .post-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            border-left: 4px solid #667eea;
        }
        
        .post-card .post-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 0.9em;
        }
        
        .post-card .post-stat {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }
        
        .last-update {
            text-align: center;
            color: white;
            margin-top: 30px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Client Analytics Dashboard</h1>
            <p>Real-time Instagram metrics tracking</p>
        </header>
        
        <div id="loading" class="loading">Loading analytics data...</div>
        <div id="error" class="error" style="display: none;"></div>
        <div id="dashboard" style="display: none;">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="label">Followers</div>
                    <div class="value" id="followers">-</div>
                    <div class="change" id="followers-change"></div>
                </div>
                
                <div class="stat-card">
                    <div class="label">Total Posts</div>
                    <div class="value" id="posts">-</div>
                    <div class="change" id="posts-change"></div>
                </div>
                
                <div class="stat-card">
                    <div class="label">Engagement Rate</div>
                    <div class="value" id="engagement">-</div>
                    <div class="change neutral">Last 12 posts</div>
                </div>
                
                <div class="stat-card">
                    <div class="label">Avg Likes</div>
                    <div class="value" id="avg-likes">-</div>
                    <div class="change neutral">Per post</div>
                </div>
            </div>
            
            <div class="chart-container">
                <h2>📈 Follower Growth (Last 30 Days)</h2>
                <div class="chart" id="followers-chart"></div>
            </div>
            
            <div class="posts-grid">
                <h2>📸 Recent Posts Performance</h2>
                <div class="posts-list" id="posts-list"></div>
            </div>
            
            <div class="last-update">
                Last updated: <span id="last-update">-</span>
            </div>
        </div>
    </div>
    
    <script>
        async function loadDashboard() {
            try {
                const response = await fetch('data/metrics.json');
                if (!response.ok) throw new Error('Failed to load data');
                
                const data = await response.json();
                const latest = data.latest;
                const changes = data.changes || {};
                const history = data.history || [];
                
                // Hide loading, show dashboard
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                
                // Update stats
                document.getElementById('followers').textContent = latest.followers.toLocaleString();
                document.getElementById('posts').textContent = latest.posts_count.toLocaleString();
                document.getElementById('engagement').textContent = (latest.engagement_rate || 0).toFixed(2) + '%';
                document.getElementById('avg-likes').textContent = Math.round(latest.avg_likes || 0).toLocaleString();
                
                // Update changes
                updateChange('followers-change', changes.followers_change);
                updateChange('posts-change', changes.posts_change);
                
                // Update last update time
                const lastUpdate = new Date(latest.date);
                document.getElementById('last-update').textContent = lastUpdate.toLocaleString();
                
                // Render follower chart
                renderFollowersChart(history.slice(-30));
                
                // Render posts
                renderPosts(latest.recent_posts || []);
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = 'Failed to load analytics data. Please try again later.';
            }
        }
        
        function updateChange(elementId, value) {
            const element = document.getElementById(elementId);
            if (!value || value === 0) {
                element.textContent = 'No change';
                element.className = 'change neutral';
                return;
            }
            
            const sign = value > 0 ? '+' : '';
            element.textContent = `${sign}${value.toLocaleString()}`;
            element.className = value > 0 ? 'change positive' : 'change negative';
        }
        
        function renderFollowersChart(history) {
            const chart = document.getElementById('followers-chart');
            chart.innerHTML = '';
            
            if (history.length === 0) return;
            
            const maxFollowers = Math.max(...history.map(h => h.followers));
            
            history.forEach(entry => {
                const date = new Date(entry.date);
                const height = (entry.followers / maxFollowers) * 100;
                
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.style.height = `${height}%`;
                
                const label = document.createElement('div');
                label.className = 'bar-label';
                label.textContent = `${date.getMonth() + 1}/${date.getDate()}`;
                
                const value = document.createElement('div');
                value.className = 'bar-value';
                value.textContent = entry.followers.toLocaleString();
                
                bar.appendChild(label);
                bar.appendChild(value);
                chart.appendChild(bar);
            });
        }
        
        function renderPosts(posts) {
            const container = document.getElementById('posts-list');
            container.innerHTML = '';
            
            posts.forEach(post => {
                const card = document.createElement('div');
                card.className = 'post-card';
                
                const date = new Date(post.date);
                const mediaType = post.is_video ? '🎥 Video' : '📷 Photo';
                
                card.innerHTML = `
                    <div><strong>${mediaType}</strong></div>
                    <div style="font-size: 0.8em; color: #666; margin-top: 5px;">
                        ${date.toLocaleDateString()}
                    </div>
                    <div class="post-stats">
                        <div class="post-stat">
                            <span>❤️</span>
                            <span>${post.likes.toLocaleString()}</span>
                        </div>
                        <div class="post-stat">
                            <span>💬</span>
                            <span>${post.comments.toLocaleString()}</span>
                        </div>
                        ${post.is_video ? `
                            <div class="post-stat">
                                <span>👁️</span>
                                <span>${post.video_views.toLocaleString()}</span>
                            </div>
                        ` : ''}
                    </div>
                `;
                
                container.appendChild(card);
            });
        }
        
        // Load dashboard on page load
        loadDashboard();
        
        // Refresh every 5 minutes
        setInterval(loadDashboard, 5 * 60 * 1000);
    </script>
</body>
</html>
