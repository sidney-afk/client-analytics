<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 8px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* Client selector */
        .client-selector {
            background: white;
            padding: 15px 25px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .client-selector label {
            font-weight: 600;
            color: #555;
        }

        .client-selector select {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1em;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .client-selector select:hover {
            border-color: #667eea;
        }

        .client-selector select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        /* Tabs */
        .tabs {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
            margin-bottom: 25px;
            overflow: hidden;
        }

        .tab-buttons {
            display: flex;
            border-bottom: 2px solid #f3f4f6;
        }

        .tab-button {
            flex: 1;
            padding: 18px;
            background: none;
            border: none;
            font-size: 1.05em;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .tab-button:hover {
            background: #f9fafb;
            color: #667eea;
        }

        .tab-button.active {
            color: #667eea;
        }

        .tab-button.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: #667eea;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        /* Platform metrics grid */
        .platform-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .platform-card {
            background: linear-gradient(135deg, #ffffff 0%, #f9fafb 100%);
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
            transition: all 0.2s ease;
        }

        .platform-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .platform-card h3 {
            font-size: 1.1em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .platform-card.youtube h3 { color: #FF0000; }
        .platform-card.instagram h3 { color: #E1306C; }
        .platform-card.tiktok h3 { color: #00f2ea; }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f3f4f6;
        }

        .metric-row:last-child {
            border-bottom: none;
        }

        .metric-label {
            font-size: 0.9em;
            color: #6b7280;
        }

        .metric-value {
            font-size: 1.3em;
            font-weight: 700;
        }

        .metric-value.positive {
            color: #10b981;
        }

        /* Top performers */
        .top-performers {
            margin-top: 30px;
        }

        .top-performers h2 {
            font-size: 1.4em;
            margin-bottom: 20px;
            color: #1f2937;
        }

        .leaderboards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .leaderboard {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #e5e7eb;
        }

        .leaderboard h3 {
            font-size: 1.1em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f3f4f6;
        }

        .leaderboard.youtube h3 { color: #FF0000; }
        .leaderboard.instagram h3 { color: #E1306C; }
        .leaderboard.tiktok h3 { color: #00f2ea; }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 12px;
            margin: 8px 0;
            background: #f9fafb;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .leaderboard-item:hover {
            background: #f3f4f6;
            transform: translateX(4px);
        }

        .rank {
            font-weight: 700;
            font-size: 1.1em;
            color: #9ca3af;
            min-width: 35px;
        }

        .rank.top3 {
            color: #f59e0b;
        }

        .client-name {
            flex: 1;
            font-weight: 500;
            color: #374151;
        }

        .client-value {
            font-weight: 700;
            font-size: 1.1em;
            color: #667eea;
        }

        /* Charts */
        .charts-section {
            margin-top: 30px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 25px;
        }

        .chart-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            border: 2px solid #e5e7eb;
        }

        .chart-card h3 {
            font-size: 1.2em;
            margin-bottom: 20px;
            color: #1f2937;
        }

        .chart-wrapper {
            position: relative;
            height: 350px;
        }

        /* Loading & errors */
        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 60px 20px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fef2f2;
            color: #dc2626;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid #fecaca;
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #6b7280;
            font-size: 1.1em;
            background: white;
            border-radius: 12px;
            border: 2px dashed #e5e7eb;
        }

        .last-updated {
            text-align: center;
            color: white;
            opacity: 0.85;
            margin-top: 30px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .charts-grid {
                grid-template-columns: 1fr;
            }

            .leaderboards {
                grid-template-columns: 1fr;
            }

            .platform-metrics {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Client Analytics</h1>
            <p>Track daily, weekly, and monthly social media performance</p>
        </header>

        <div id="loading" class="loading">Loading data</div>
        <div id="error" class="error" style="display: none;"></div>

        <div id="dashboard" style="display: none;">
            <!-- Client selector -->
            <div class="client-selector">
                <label for="clientSelect">View:</label>
                <select id="clientSelect">
                    <option value="all">📊 All Clients Overview</option>
                </select>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <div class="tab-buttons">
                    <button class="tab-button active" data-tab="daily">📅 Daily</button>
                    <button class="tab-button" data-tab="weekly">📈 Weekly</button>
                    <button class="tab-button" data-tab="monthly">📊 Monthly</button>
                </div>

                <!-- Daily tab -->
                <div id="daily" class="tab-content active">
                    <div class="platform-metrics" id="dailyMetrics"></div>
                    <div class="top-performers">
                        <h2>🏆 Today's Top Performers</h2>
                        <div class="leaderboards" id="dailyLeaderboards"></div>
                    </div>
                </div>

                <!-- Weekly tab -->
                <div id="weekly" class="tab-content">
                    <div class="platform-metrics" id="weeklyMetrics"></div>
                    <div class="charts-section">
                        <h2>📈 7-Day Trends</h2>
                        <div class="charts-grid">
                            <div class="chart-card">
                                <h3>Followers Gained</h3>
                                <div class="chart-wrapper">
                                    <canvas id="weeklyFollowersChart"></canvas>
                                </div>
                            </div>
                            <div class="chart-card">
                                <h3>Views</h3>
                                <div class="chart-wrapper">
                                    <canvas id="weeklyViewsChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="top-performers">
                        <h2>🏆 Top Performers (7 Days)</h2>
                        <div class="leaderboards" id="weeklyLeaderboards"></div>
                    </div>
                </div>

                <!-- Monthly tab -->
                <div id="monthly" class="tab-content">
                    <div class="platform-metrics" id="monthlyMetrics"></div>
                    <div class="charts-section">
                        <h2>📊 30-Day Trends</h2>
                        <div class="charts-grid">
                            <div class="chart-card">
                                <h3>Followers Gained</h3>
                                <div class="chart-wrapper">
                                    <canvas id="monthlyFollowersChart"></canvas>
                                </div>
                            </div>
                            <div class="chart-card">
                                <h3>Views</h3>
                                <div class="chart-wrapper">
                                    <canvas id="monthlyViewsChart"></canvas>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="top-performers">
                        <h2>🏆 Top Performers (30 Days)</h2>
                        <div class="leaderboards" id="monthlyLeaderboards"></div>
                    </div>
                </div>
            </div>

            <div class="last-updated" id="lastUpdated"></div>
        </div>
    </div>

    <script>

        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

                "TikTok": "https://socialblade.com/tiktok/user/john_wineland"
            },
            "David Kessler": {
                "YouTube": "https://socialblade.com/youtube/channel/UC3nSTGZ3mBqgQTfSuZ5Bl9A",
                "Instagram": "https://socialblade.com/instagram/user/iamdavidkessler",
                "TikTok": "https://socialblade.com/tiktok/user/iamdavidkessler"
            },
            "Chelsey Scaffidi": {
                "Instagram": "https://socialblade.com/instagram/user/chelseyscaffidi",
                "TikTok": "https://socialblade.com/tiktok/user/chelseyscaffidi"
            },
            "Danielle Robin": {
                "Instagram": "https://socialblade.com/instagram/user/dani__robin"
            },
            "Morgan Burch": {
                "YouTube": "https://socialblade.com/youtube/channel/UCjF8q8v46XqehBI_jrG_2HA",
                "Instagram": "https://socialblade.com/instagram/user/goodmorgantherapy",
                "TikTok": "https://socialblade.com/tiktok/user/goodmorgantherapy"
            }
        };

        let allData = [];
        let charts = {};
        let currentTab = 'daily';
        let selectedClient = 'all';

        // Parse CSV
        function parseCSV(csv) {
            const lines = csv.split('\n').filter(line => line.trim());
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
            
            return lines.slice(1).map(line => {
                const values = [];
                let current = '';
                let inQuotes = false;
                
                for (const char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                
                const obj = {};
                headers.forEach((header, i) => {
                    obj[header] = (values[i] || '').replace(/"/g, '').trim();
                });
                return obj;
            });
        }

        // Fetch data
        async function fetchData() {
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error('Failed to fetch data');
            
            const csv = await response.text();
            const data = parseCSV(csv);
            
            return data.map(row => ({
                date: row.Date || row.date || '',
                client: row.Client || row.client || '',
                platform: row.Platform || row.platform || '',
                followersGained: parseInt(row['Followers Gained'] || row.Followers || 0) || 0,
                views: parseInt(row['Views Gained'] || row.Views || 0) || 0
            })).filter(row => row.date && row.client);
        }

        // Get date ranges
        function getDateRange(data, days) {
            const dates = [...new Set(data.map(d => d.date))].sort().reverse();
            const targetDates = dates.slice(0, days);
            return data.filter(row => targetDates.includes(row.date));
        }

        function getLatestDate(data) {
            const dates = [...new Set(data.map(d => d.date))].sort();
            return dates[dates.length - 1];
        }

        // Filter data by client
        function getClientData(client) {
            if (client === 'all') return allData;
            return allData.filter(row => row.client === client);
        }

        // Render platform metrics
        function renderPlatformMetrics(data, containerId) {
            const container = document.getElementById(containerId);
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="no-data">No data available</div>';
                return;
            }

            const platforms = ['Instagram', 'YouTube', 'TikTok'];
            
            container.innerHTML = platforms.map(platform => {
                const platformData = data.filter(d => d.platform === platform);
                
                // Skip platform if no data exists (for individual client view)
                if (selectedClient !== 'all' && platformData.length === 0) {
                    return '';
                }
                
                const totalFollowers = platformData.reduce((sum, r) => sum + r.followersGained, 0);
                const totalViews = platformData.reduce((sum, r) => sum + r.views, 0);
                
                // Add Social Blade link if viewing individual client
                let socialBladeLink = '';
                if (selectedClient !== 'all' && SOCIALBLADE_URLS[selectedClient]?.[platform]) {
                    socialBladeLink = `<a href="${SOCIALBLADE_URLS[selectedClient][platform]}" target="_blank" style="margin-left: 8px; text-decoration: none; font-size: 0.9em;" title="View on Social Blade">🔗</a>`;
                }
                
                return `
                    <div class="platform-card ${platform.toLowerCase()}">
                        <h3>${PLATFORM_ICONS[platform]} ${platform}${socialBladeLink}</h3>
                        <div class="metric-row">
                            <span class="metric-label">Followers Gained</span>
                            <span class="metric-value positive">+${totalFollowers.toLocaleString()}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Views</span>
                            <span class="metric-value">${totalViews.toLocaleString()}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Render leaderboards
        function renderLeaderboards(data, containerId) {
            const container = document.getElementById(containerId);
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="no-data">No data available</div>';
                return;
            }

            const platforms = ['Instagram', 'YouTube', 'TikTok'];
            
            container.innerHTML = platforms.map(platform => {
                const platformData = data.filter(d => d.platform === platform);
                
                // Aggregate by client
                const clientTotals = {};
                platformData.forEach(row => {
                    if (!clientTotals[row.client]) {
                        clientTotals[row.client] = { followers: 0, views: 0 };
                    }
                    clientTotals[row.client].followers += row.followersGained;
                    clientTotals[row.client].views += row.views;
                });

                // Sort and get top 10
                const sorted = Object.entries(clientTotals)
                    .sort((a, b) => b[1].followers - a[1].followers)
                    .slice(0, 10);

                const items = sorted.map(([client, stats], index) => `
                    <div class="leaderboard-item">
                        <span class="rank ${index < 3 ? 'top3' : ''}">#${index + 1}</span>
                        <span class="client-name">${client}</span>
                        <span class="client-value">+${stats.followers.toLocaleString()}</span>
                    </div>
                `).join('');

                return `
                    <div class="leaderboard ${platform.toLowerCase()}">
                        <h3>${PLATFORM_ICONS[platform]} ${platform} Top 10</h3>
                        ${items || '<div class="no-data">No data</div>'}
                    </div>
                `;
            }).join('');
        }

        // Render charts
        function renderChart(canvasId, data, label) {
            const ctx = document.getElementById(canvasId);
            if (!ctx) return;

            if (charts[canvasId]) {
                charts[canvasId].destroy();
            }

            const dates = [...new Set(data.map(d => d.date))].sort();
            const platforms = ['Instagram', 'YouTube', 'TikTok'];

            const datasets = platforms.map(platform => {
                const platformData = dates.map(date => {
                    const rows = data.filter(d => d.date === date && d.platform === platform);
                    return label === 'Followers' 
                        ? rows.reduce((sum, r) => sum + r.followersGained, 0)
                        : rows.reduce((sum, r) => sum + r.views, 0);
                });

                return {
                    label: platform,
                    data: platformData,
                    borderColor: PLATFORM_COLORS[platform],
                    backgroundColor: PLATFORM_COLORS[platform] + '33',
                    borderWidth: 2.5,
                    tension: 0.3,
                    fill: true
                };
            });

            charts[canvasId] = new Chart(ctx, {
                type: 'line',
                data: { labels: dates, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'top' }
                    },
                    scales: {
                        y: { beginAtZero: true }
                    }
                }
            });
        }

        // Render dashboard
        function renderDashboard() {
            const data = getClientData(selectedClient);
            if (data.length === 0) return;

            // Show/hide leaderboards based on view
            const showLeaderboards = selectedClient === 'all';
            document.querySelectorAll('.top-performers').forEach(el => {
                el.style.display = showLeaderboards ? 'block' : 'none';
            });

            // Daily
            const latestDate = getLatestDate(data);
            const dailyData = data.filter(d => d.date === latestDate);
            renderPlatformMetrics(dailyData, 'dailyMetrics');
            if (showLeaderboards) renderLeaderboards(dailyData, 'dailyLeaderboards');

            // Weekly
            const weeklyData = getDateRange(data, 7);
            renderPlatformMetrics(weeklyData, 'weeklyMetrics');
            if (showLeaderboards) renderLeaderboards(weeklyData, 'weeklyLeaderboards');
            renderChart('weeklyFollowersChart', weeklyData, 'Followers');
            renderChart('weeklyViewsChart', weeklyData, 'Views');

            // Monthly
            const monthlyData = getDateRange(data, 30);
            renderPlatformMetrics(monthlyData, 'monthlyMetrics');
            if (showLeaderboards) renderLeaderboards(monthlyData, 'monthlyLeaderboards');
            renderChart('monthlyFollowersChart', monthlyData, 'Followers');
            renderChart('monthlyViewsChart', monthlyData, 'Views');

            // Update last updated
            document.getElementById('lastUpdated').textContent = `Last updated: ${latestDate}`;
        }

        // Init
        async function init() {
            try {
                allData = await fetchData();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';

                // Populate client dropdown
                const clients = [...new Set(allData.map(d => d.client))].sort();
                const select = document.getElementById('clientSelect');
                clients.forEach(client => {
                    const option = document.createElement('option');
                    option.value = client;
                    option.textContent = client;
                    select.appendChild(option);
                });

                // Tab switching
                document.querySelectorAll('.tab-button').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                        btn.classList.add('active');
                        document.getElementById(btn.dataset.tab).classList.add('active');
                        currentTab = btn.dataset.tab;
                    });
                });

                // Client selector
                select.addEventListener('change', (e) => {
                    selectedClient = e.target.value;
                    renderDashboard();
                });

                renderDashboard();
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error: ${error.message}`;
            }
        }

        init();
    </script>
</body>
</html>
