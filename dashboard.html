<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncView</title>
    <link rel="icon" type="image/png" href="syncview-favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            min-height: 100vh;
            padding: 24px;
            color: #e2e8f0;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        header h1 {
            font-size: 2.75em;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        header p {
            font-size: 1.15em;
            color: #94a3b8;
            font-weight: 400;
        }

        /* Client selector */
        .client-selector {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            padding: 20px 28px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .client-selector label {
            font-weight: 600;
            color: #cbd5e1;
            font-size: 0.95em;
            letter-spacing: 0.02em;
        }

        .client-selector select {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 12px;
            font-size: 1em;
            background: rgba(15, 23, 42, 0.6);
            color: #e2e8f0;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .client-selector select:hover {
            border-color: rgba(96, 165, 250, 0.4);
            background: rgba(15, 23, 42, 0.8);
        }

        .client-selector select:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
        }

        /* Tabs */
        .tabs {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(148, 163, 184, 0.1);
            margin-bottom: 28px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .tab-buttons {
            display: flex;
            padding: 8px;
            gap: 8px;
            background: rgba(15, 23, 42, 0.3);
        }

        .tab-button {
            flex: 1;
            padding: 16px;
            background: transparent;
            border: none;
            font-size: 1em;
            font-weight: 600;
            color: #94a3b8;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border-radius: 12px;
            letter-spacing: 0.01em;
        }

        .tab-button:hover {
            background: rgba(96, 165, 250, 0.1);
            color: #60a5fa;
        }

        .tab-button.active {
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.15), rgba(167, 139, 250, 0.15));
            color: #e2e8f0;
            box-shadow: 0 4px 12px rgba(96, 165, 250, 0.2);
        }

        .tab-content {
            display: none;
            padding: 32px;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Platform metrics grid */
        .platform-metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .platform-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8) 0%, rgba(30, 41, 59, 0.6) 100%);
            backdrop-filter: blur(12px);
            padding: 28px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.15);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .platform-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, currentColor, transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .platform-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.5);
            border-color: rgba(148, 163, 184, 0.3);
        }

        .platform-card:hover::before {
            opacity: 0.6;
        }

        .platform-card h3 {
            font-size: 1.15em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .platform-card.youtube { color: #ff4444; }
        .platform-card.youtube h3 { color: #ff4444; }
        
        .platform-card.instagram { color: #e94185; }
        .platform-card.instagram h3 { color: #e94185; }
        
        .platform-card.tiktok { color: #00f2ea; }
        .platform-card.tiktok h3 { color: #00f2ea; }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.1);
        }

        .metric-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .metric-label {
            font-size: 0.92em;
            color: #94a3b8;
            font-weight: 500;
        }

        .metric-value {
            font-size: 1.5em;
            font-weight: 800;
            letter-spacing: -0.02em;
        }

        .metric-value.positive {
            color: #34d399;
        }

        /* Top performers */
        .top-performers {
            margin-top: 32px;
        }

        .top-performers h2 {
            font-size: 1.5em;
            margin-bottom: 24px;
            color: #e2e8f0;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .leaderboards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 20px;
        }

        .leaderboard {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(148, 163, 184, 0.15);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .leaderboard h3 {
            font-size: 1.15em;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(148, 163, 184, 0.15);
            font-weight: 700;
        }

        .leaderboard.youtube h3 { color: #ff4444; }
        .leaderboard.instagram h3 { color: #e94185; }
        .leaderboard.tiktok h3 { color: #00f2ea; }

        .leaderboard-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            margin: 10px 0;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent;
        }

        .leaderboard-item:hover {
            background: rgba(15, 23, 42, 0.7);
            transform: translateX(6px);
            border-color: rgba(96, 165, 250, 0.3);
        }

        .rank {
            font-weight: 800;
            font-size: 1.15em;
            color: #475569;
            min-width: 40px;
        }

        .rank.top3 {
            background: linear-gradient(135deg, #fbbf24, #f59e0b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .client-name {
            flex: 1;
            font-weight: 500;
            color: #cbd5e1;
        }

        .client-value {
            font-weight: 700;
            font-size: 1.15em;
            color: #60a5fa;
        }

        /* Charts */
        .charts-section {
            margin-top: 32px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
            gap: 24px;
        }

        .chart-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            padding: 28px;
            border-radius: 16px;
            border: 1px solid rgba(148, 163, 184, 0.15);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .chart-card h3 {
            font-size: 1.25em;
            margin-bottom: 24px;
            color: #e2e8f0;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .chart-wrapper {
            position: relative;
            height: 350px;
        }

        /* Loading & errors */
        .loading {
            text-align: center;
            color: #cbd5e1;
            font-size: 1.25em;
            padding: 80px 20px;
            font-weight: 500;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(96, 165, 250, 0.3);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 12px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            padding: 24px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid rgba(239, 68, 68, 0.3);
            backdrop-filter: blur(8px);
        }

        .no-data {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
            font-size: 1.1em;
            background: rgba(30, 41, 59, 0.4);
            border-radius: 12px;
            border: 1px dashed rgba(148, 163, 184, 0.2);
        }

        .last-updated {
            text-align: center;
            color: #64748b;
            margin-top: 40px;
            font-size: 0.92em;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            header h1 {
                font-size: 2em;
            }

            .charts-grid {
                grid-template-columns: 1fr;
            }

            .leaderboards {
                grid-template-columns: 1fr;
            }

            .platform-metrics {
                grid-template-columns: 1fr;
            }

            .tab-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📊 Client Analytics</h1>
            <p>Track daily, weekly, and monthly social media performance</p>
        </header>

        <div id="loading" class="loading">Loading data</div>
        <div id="error" class="error" style="display: none;"></div>

        <div id="dashboard" style="display: none;">
            <!-- Client selector -->
            <div class="client-selector">
                <label for="clientSelect">View:</label>
                <select id="clientSelect">

            </div>

            <!-- Tabs -->
            <div class="tabs">
                <div class="tab-buttons">
                    <button class="tab-button active" data-tab="daily">📅 Daily</button>

                                <div class="chart-wrapper">

                            <div class="chart-card">

                    <div class="top-performers">
                        <h2>🏆 Top Performers (30 Days)</h2>

            </div>

            <div class="last-updated" id="lastUpdated"></div>
        </div>

    <script>

        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

            },
            "David Kessler": {

                "Instagram": "https://socialblade.com/instagram/user/iamdavidkessler",
                "TikTok": "https://socialblade.com/tiktok/user/iamdavidkessler"
            },
            "Chelsey Scaffidi": {
                "Instagram": "https://socialblade.com/instagram/user/chelseyscaffidi",
                "TikTok": "https://socialblade.com/tiktok/user/chelseyscaffidi"
            },
            "Danielle Robin": {
                "Instagram": "https://socialblade.com/instagram/user/dani__robin"
            },
            "Morgan Burch": {
                "YouTube": "https://socialblade.com/youtube/channel/UCjF8q8v46XqehBI_jrG_2HA",
                "Instagram": "https://socialblade.com/instagram/user/goodmorgantherapy",
                "TikTok": "https://socialblade.com/tiktok/user/goodmorgantherapy"
            }
        };

        let allData = [];
        let charts = {};
        let currentTab = 'daily';
        let selectedClient = 'all';

        // Parse CSV
        function parseCSV(csv) {
            const lines = csv.split('\n').filter(line => line.trim());
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
            
            return lines.slice(1).map(line => {
                const values = [];
                let current = '';
                let inQuotes = false;
                
                for (const char of line) {
                    if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) {
                        values.push(current.trim());
                        current = '';
                    } else {
                        current += char;
                    }
                }
                values.push(current.trim());
                
                const obj = {};
                headers.forEach((header, i) => {
                    obj[header] = (values[i] || '').replace(/"/g, '').trim();
                });
                return obj;
            });
        }

        // Fetch data
        async function fetchData() {
            const response = await fetch(CSV_URL);
            if (!response.ok) throw new Error('Failed to fetch data');
            
            const csv = await response.text();
            const data = parseCSV(csv);
            
            return data.map(row => ({
                date: row.Date || row.date || '',
                client: row.Client || row.client || '',
                platform: row.Platform || row.platform || '',
                followersGained: parseInt(row['Followers Gained'] || row.Followers || 0) || 0,
                views: parseInt(row['Views Gained'] || row.Views || 0) || 0
            })).filter(row => row.date && row.client);
        }

        // Get date ranges
        function getDateRange(data, days) {
            const dates = [...new Set(data.map(d => d.date))].sort().reverse();
            const targetDates = dates.slice(0, days);
            return data.filter(row => targetDates.includes(row.date));
        }

        function getLatestDate(data) {
            const dates = [...new Set(data.map(d => d.date))].sort();
            return dates[dates.length - 1];
        }

        // Filter data by client
        function getClientData(client) {
            if (client === 'all') return allData;
            return allData.filter(row => row.client === client);
        }

        // Render platform metrics
        function renderPlatformMetrics(data, containerId) {
            const container = document.getElementById(containerId);
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="no-data">No data available</div>';
                return;
            }

            const platforms = ['Instagram', 'YouTube', 'TikTok'];
            
            container.innerHTML = platforms.map(platform => {
                const platformData = data.filter(d => d.platform === platform);
                
                // Skip platform if no data exists (for individual client view)
                if (selectedClient !== 'all' && platformData.length === 0) {
                    return '';
                }
                
                const totalFollowers = platformData.reduce((sum, r) => sum + r.followersGained, 0);
                const totalViews = platformData.reduce((sum, r) => sum + r.views, 0);
                
                // Add Social Blade link if viewing individual client
                let socialBladeLink = '';
                if (selectedClient !== 'all' && SOCIALBLADE_URLS[selectedClient]?.[platform]) {
                    socialBladeLink = `<a href="${SOCIALBLADE_URLS[selectedClient][platform]}" target="_blank" style="margin-left: 8px; text-decoration: none; font-size: 0.9em;" title="View on Social Blade">🔗</a>`;
                }
                
                return `
                    <div class="platform-card ${platform.toLowerCase()}">
                        <h3>${PLATFORM_ICONS[platform]} ${platform}${socialBladeLink}</h3>
                        <div class="metric-row">
                            <span class="metric-label">Followers Gained</span>
                            <span class="metric-value positive">+${totalFollowers.toLocaleString()}</span>
                        </div>
                        <div class="metric-row">
                            <span class="metric-label">Views</span>
                            <span class="metric-value">${totalViews.toLocaleString()}</span>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Render leaderboards
        function renderLeaderboards(data, containerId) {
            const container = document.getElementById(containerId);
            if (!data || data.length === 0) {
                container.innerHTML = '<div class="no-data">No data available</div>';
                return;
            }

            const platforms = ['Instagram', 'YouTube', 'TikTok'];
            
            container.innerHTML = platforms.map(platform => {
                const platformData = data.filter(d => d.platform === platform);
                
                // Aggregate by client
                const clientTotals = {};
                platformData.forEach(row => {
                    if (!clientTotals[row.client]) {
                        clientTotals[row.client] = { followers: 0, views: 0 };
                    }
                    clientTotals[row.client].followers += row.followersGained;
                    clientTotals[row.client].views += row.views;
                });

                // Sort and get top 10
                const sorted = Object.entries(clientTotals)
                    .sort((a, b) => b[1].followers - a[1].followers)
                    .slice(0, 10);

                const items = sorted.map(([client, stats], index) => `
                    <div class="leaderboard-item">
                        <span class="rank ${index < 3 ? 'top3' : ''}">#${index + 1}</span>
                        <span class="client-name">${client}</span>
                        <span class="client-value">+${stats.followers.toLocaleString()}</span>
                    </div>
                `).join('');

                return `
                    <div class="leaderboard ${platform.toLowerCase()}">
                        <h3>${PLATFORM_ICONS[platform]} ${platform} Top 10</h3>
                        ${items || '<div class="no-data">No data</div>'}
                    </div>
                `;
            }).join('');
        }

        // Render charts
        function renderChart(canvasId, data, label) {
            const ctx = document.getElementById(canvasId);
            if (!ctx) return;

            if (charts[canvasId]) {
                charts[canvasId].destroy();
            }

            const dates = [...new Set(data.map(d => d.date))].sort();
            const platforms = ['Instagram', 'YouTube', 'TikTok'];

            const datasets = platforms.map(platform => {
                const platformData = dates.map(date => {
                    const rows = data.filter(d => d.date === date && d.platform === platform);
                    return label === 'Followers' 
                        ? rows.reduce((sum, r) => sum + r.followersGained, 0)
                        : rows.reduce((sum, r) => sum + r.views, 0);
                });

                return {
                    label: platform,
                    data: platformData,
                    borderColor: PLATFORM_COLORS[platform],
                    backgroundColor: PLATFORM_COLORS[platform] + '33',
                    borderWidth: 2.5,
                    tension: 0.3,
                    fill: true
                };
            });

            charts[canvasId] = new Chart(ctx, {
                type: 'line',
                data: { labels: dates, datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false
                    },
                    plugins: {
                        legend: { 
                            position: 'top',
                            labels: {
                                color: '#cbd5e1',
                                font: {
                                    size: 13,
                                    weight: '600'
                                },
                                padding: 15
                            }
                        },
                        tooltip: {
                            enabled: true,
                            backgroundColor: 'rgba(15, 23, 42, 0.95)',
                            titleColor: '#e2e8f0',
                            bodyColor: '#cbd5e1',
                            borderColor: 'rgba(96, 165, 250, 0.3)',
                            borderWidth: 1,
                            padding: 12,
                            displayColors: true,
                            callbacks: {
                                label: function(context) {
                                    const label = context.dataset.label || '';
                                    const value = context.parsed.y.toLocaleString();
                                    return `${label}: ${value}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: { 
                            beginAtZero: true,
                            ticks: {
                                color: '#94a3b8',
                                font: {
                                    size: 12
                                }
                            },
                            grid: {
                                color: 'rgba(148, 163, 184, 0.1)'
                            }
                        },
                        x: {
                            ticks: {
                                color: '#94a3b8',
                                font: {
                                    size: 12
                                }
                            },
                            grid: {
                                color: 'rgba(148, 163, 184, 0.1)'
                            }
                        }
                    }
                }
            });
        }

        // Render dashboard
        function renderDashboard() {
            const data = getClientData(selectedClient);
            if (data.length === 0) return;

            // Show/hide leaderboards based on view
            const showLeaderboards = selectedClient === 'all';
            document.querySelectorAll('.top-performers').forEach(el => {
                el.style.display = showLeaderboards ? 'block' : 'none';
            });

            // Daily
            const latestDate = getLatestDate(data);
            const dailyData = data.filter(d => d.date === latestDate);
            renderPlatformMetrics(dailyData, 'dailyMetrics');
            if (showLeaderboards) renderLeaderboards(dailyData, 'dailyLeaderboards');

            // Weekly
            const weeklyData = getDateRange(data, 7);
            renderPlatformMetrics(weeklyData, 'weeklyMetrics');
            if (showLeaderboards) renderLeaderboards(weeklyData, 'weeklyLeaderboards');
            renderChart('weeklyFollowersChart', weeklyData, 'Followers');
            renderChart('weeklyViewsChart', weeklyData, 'Views');

            // Monthly
            const monthlyData = getDateRange(data, 30);
            renderPlatformMetrics(monthlyData, 'monthlyMetrics');
            if (showLeaderboards) renderLeaderboards(monthlyData, 'monthlyLeaderboards');
            renderChart('monthlyFollowersChart', monthlyData, 'Followers');
            renderChart('monthlyViewsChart', monthlyData, 'Views');

            // Update last updated
            document.getElementById('lastUpdated').textContent = `Last updated: ${latestDate}`;
        }

        // Init
        async function init() {
            try {
                allData = await fetchData();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';

                // Populate client dropdown
                const clients = [...new Set(allData.map(d => d.client))].sort();
                const select = document.getElementById('clientSelect');
                clients.forEach(client => {
                    const option = document.createElement('option');
                    option.value = client;
                    option.textContent = client;
                    select.appendChild(option);
                });

                // Tab switching
                document.querySelectorAll('.tab-button').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                        btn.classList.add('active');
                        document.getElementById(btn.dataset.tab).classList.add('active');
                        currentTab = btn.dataset.tab;
                    });
                });

                // Client selector
                select.addEventListener('change', (e) => {
                    selectedClient = e.target.value;
                    renderDashboard();
                });

                renderDashboard();
            } catch (error) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = `Error: ${error.message}`;
            }
        }

        init();
    </script>
</body>
</html>
