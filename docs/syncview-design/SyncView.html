  --hover:#1e1e21;--selected-nav:#1e1e21;--selected-row:#171923;--menu-hover:#1e1e21;
  --border:#2a2a2d;--border-soft:#242428;--divider:#1d1d20;
  --text:#f4f4f5;--text-strong:#ededee;--dim:#b6b6bb;--muted:#8f8f96;--faint:#6f6f78;
  --accent:#5e6ad2;--link:#8ea0ff;--danger:#ff5f5f;--overdue:#ff5f5f;
  --detail-strong:#ededee;--prop-label:#b6b6bb;
  --shadow-pop:0 14px 32px rgba(0,0,0,.42),0 3px 12px rgba(0,0,0,.34),0 0 0 1px rgba(255,255,255,.03);
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--content);color:var(--text);overflow:hidden;font-family:"InterVar",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:12px;line-height:1.4;letter-spacing:normal;-webkit-font-smoothing:antialiased}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer;padding:0}
svg{display:block}
a{color:var(--link);text-decoration:none}a:hover{text-decoration:underline}
.app{display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr);height:100vh;background:var(--bg);user-select:none}
.crumb,.crumb-detail,.d-title{cursor:default}
.tb-tab,a{cursor:pointer}
.d-desc,.d-desc *,.act-text,.act-text *,.composer-box,.composer-box input,.composer-box textarea{user-select:text}

.sb{display:flex;flex-direction:column;height:100vh;overflow:hidden;padding:8px 7px 6px}
.sb-top{display:flex;align-items:center;gap:6px;padding:2px 5px 9px}
.sb-brand{display:flex;align-items:center;gap:7px;flex:1;min-width:0;border-radius:6px;padding:3px 5px;margin:-3px -5px}.sb-brand:hover{background:var(--hover)}.sb-caret{display:flex;color:var(--faint);opacity:0}.sb-brand:hover .sb-caret{opacity:1}.sb-caret svg{width:13px;height:13px}
.sb-mark{width:20px;height:20px;border-radius:5px;background:linear-gradient(135deg,#5e6ad2,#8b7cf0);flex:none;display:grid;place-items:center;color:#fff;font-weight:600;font-size:11px}
.sb-name{font-weight:550;font-size:14px;letter-spacing:-.1px;color:var(--text-strong);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-icobtn{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;color:var(--dim);flex:none}
.sb-icobtn:hover{background:var(--hover);color:var(--text)}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding-top:2px}
.sb-scroll::-webkit-scrollbar{width:7px}.sb-scroll::-webkit-scrollbar-thumb{background:#0000001a;border-radius:8px}
.nav{display:flex;flex-direction:column;gap:1px}
.nav-i{display:flex;align-items:center;gap:8px;height:var(--nav-h);padding:0 8px;border-radius:5px;color:var(--dim);font-size:13px;font-weight:500;letter-spacing:normal;cursor:pointer;user-select:none;border:none;width:100%;text-align:left}
.nav-i:hover{background:var(--hover);color:var(--text)}
.nav-i.on{background:var(--selected-nav);color:var(--text)}
.nav-i .ico{width:15px;height:15px;flex:none;color:var(--faint);display:grid;place-items:center}
.nav-i:hover .ico,.nav-i.on .ico{color:var(--dim)}
.nav-i .lbl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-i.child{padding-left:27px}
.nav-sec{display:flex;align-items:center;gap:4px;width:100%;padding:14px 8px 4px;color:var(--dim);font-size:12px;font-weight:500;letter-spacing:normal;background:none;border:none;text-align:left;cursor:pointer}
.nav-sec .sec-lbl{flex:1}
.nav-sec .sec-chev{display:flex;color:var(--faint);opacity:0;transition:transform .12s}
.nav-sec .sec-chev svg{width:13px;height:13px}
.nav-sec:hover .sec-chev{opacity:1}
.nav-sec.col .sec-chev{transform:rotate(-90deg);opacity:1}
.team-hd{display:flex;align-items:center;gap:8px;height:var(--nav-h);padding:0 8px;border-radius:5px;cursor:pointer;user-select:none;border:none;width:100%}
.team-hd:hover{background:var(--hover)}
.team-emoji{width:16px;height:16px;flex:none;display:grid;place-items:center;font-size:11px}
.team-name{flex:1;font-size:13px;font-weight:500;color:var(--dim);text-align:left;letter-spacing:normal}
.tw{color:var(--faint);transition:transform .12s}.collapsed .tw{transform:rotate(-90deg)}

.main{display:flex;flex-direction:column;min-width:0;height:100vh;background:var(--content);border-left:1px solid var(--border);border-top:1px solid var(--border);border-top-left-radius:8px;margin-top:8px;overflow:hidden}
.topbar{display:flex;align-items:center;gap:7px;height:48px;padding:0 16px;flex:none;border-bottom:1px solid var(--divider)}
.crumb{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:500;color:var(--text-strong)}
.crumb .sep{color:var(--faint);display:flex}
.crumb .cico{width:14px;height:14px;color:var(--dim)}
.crumb-link{border:0;background:transparent;color:inherit;font:inherit;padding:0;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.crumb-link:hover{color:var(--text-strong);text-decoration:underline}
.tb-tabs{display:flex;gap:2px;margin-left:4px}
.tb-tab{height:23px;padding:0 8px;border-radius:5px;font-size:12px;font-weight:500;color:var(--muted);display:flex;align-items:center}
.tb-tab:hover{background:var(--hover)}.tb-tab.on{background:var(--hover);color:var(--text)}
.fpills{display:flex;align-items:center;gap:6px;margin-left:6px;flex-wrap:wrap}
.fpill{display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 3px 0 7px;border:1px solid var(--border-soft);border-radius:6px;font-size:12px;color:var(--text-strong);cursor:pointer;background:var(--surface);white-space:nowrap}
.fpill:hover{background:var(--menu-hover)}
.fpill .ficon{display:flex;color:var(--muted)}
.fpill .ficon svg{width:13px;height:13px}
.fpill .fop{color:var(--faint)}
.fpill .fval{display:inline-flex;align-items:center;gap:4px;color:var(--text-strong)}
.fpill .fval svg{width:14px;height:14px}
.fpill .fx{width:17px;height:17px;display:grid;place-items:center;border-radius:4px;color:var(--faint);margin-left:1px;font-size:11px}
.fpill .fx:hover{background:var(--hover);color:var(--text)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:2px}
.tb-btn{height:25px;padding:0 8px;border-radius:6px;color:var(--muted);display:flex;align-items:center;gap:6px;font-size:11.5px}
.tb-btn:hover{background:var(--hover);color:var(--text)}
.tb-btn.on{background:var(--hover);color:var(--text)}
.tb-ico{width:25px;height:25px;border-radius:6px;display:grid;place-items:center;color:var(--muted)}
.tb-ico:hover{background:var(--hover);color:var(--text)}
.tb-ico.on{background:var(--hover);color:var(--text)}
.topbar.noborder{border-bottom:none}
.subbar{display:flex;align-items:center;gap:7px;height:44px;padding:0 16px;flex:none;border-bottom:1px solid var(--divider)}
.crumb-star{width:22px;height:22px;border-radius:5px;display:grid;place-items:center;color:var(--faint);margin-left:4px}
.crumb-star:hover{background:var(--hover);color:var(--text)}
.crumb-star.on,.crumb-star.on:hover{color:#e2b53d}.crumb-star.on svg{fill:currentColor}

.listwrap{flex:1;overflow-y:auto;overflow-x:hidden}
.listwrap::-webkit-scrollbar{width:9px}.listwrap::-webkit-scrollbar-thumb{background:#00000015;border-radius:9px}
.grp-hd{display:flex;align-items:center;gap:8px;height:30px;padding:0 12px;background:var(--content);position:sticky;top:0;z-index:2;cursor:pointer;user-select:none}
.grp-hd .gchev{width:16px;height:16px;flex:none;display:grid;place-items:center;color:var(--faint);transition:transform .12s}
.grp-hd.col .gchev{transform:rotate(-90deg)}
.grp-hd:hover .grp-ico{opacity:0;pointer-events:none}
.grp-hd .gcheck{position:absolute;left:34px;width:14px;height:14px;border-radius:4px;border:1.5px solid var(--faint);background:var(--surface);opacity:0;pointer-events:none;display:grid;place-items:center;margin:0}
.grp-hd:hover .gcheck{opacity:1;pointer-events:auto}
.grp-hd .gcheck.on{background:var(--accent);border-color:var(--accent);opacity:1}
.grp-hd .gcheck.on::after{content:"";width:3.2px;height:6.5px;border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(42deg) translateY(-1px)}.grp-hd .gcheck.partial{opacity:1;background:var(--accent);border-color:var(--accent)}.grp-hd .gcheck.partial::after{content:"";width:7px;height:1.5px;background:#fff;border-radius:1px}
.grp-sp{flex:1}
.grp-add{width:22px;height:22px;border-radius:5px;display:grid;place-items:center;color:var(--faint);opacity:0;flex:none}
.grp-hd:hover .grp-add{opacity:1}
.grp-add:hover{background:var(--hover);color:var(--text)}
.grp-ico{width:15px;height:15px;flex:none;display:grid;place-items:center}
.grp-title{font-size:13px;font-weight:500;color:var(--text-strong);letter-spacing:normal}.grp-title.navp{cursor:pointer}.grp-title.navp:hover{text-decoration:underline}
.grp-count{font-size:13px;font-weight:450;color:var(--muted);font-variant-numeric:tabular-nums}

.row{display:flex;align-items:center;gap:8px;height:var(--row-h);padding:0 12px;border-bottom:1px solid var(--divider);cursor:pointer;user-select:none}
.row:hover{background:var(--hover)}
.row.sel{background:var(--selected-row)}.row.sel:hover{background:var(--selected-row)}.row.kfocus{box-shadow:inset 2px 0 0 var(--accent)}
.row .check{width:14px;height:14px;flex:none;border-radius:4px;border:1.5px solid var(--faint);background:var(--surface);opacity:0;display:grid;place-items:center;margin-right:-1px}
.row:hover .check,.row.sel .check{opacity:1}
.row .check.on{background:var(--accent);border-color:var(--accent);opacity:1}
.row .check.on::after{content:"";width:3.2px;height:6.5px;border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(42deg) translateY(-1px)}
.row .st{width:16px;height:16px;flex:none;border-radius:4px;display:grid;place-items:center}
.row .st:hover{background:var(--hover)}
.row .rid{font-size:13px;font-weight:450;color:var(--muted);letter-spacing:-.02em;flex:none;font-variant-numeric:tabular-nums;width:72px}
.rtitle{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;display:flex;align-items:center;gap:0}
.rtitle b{font-weight:500;white-space:nowrap}
.rtitle .rp{color:var(--muted);font-weight:450;margin-left:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rtitle .rp::before{content:"› ";color:var(--faint)}
.subchip{display:inline-flex;align-items:center;gap:3px;font-size:12px;font-weight:450;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:0 8px;height:24px;flex:none;margin-left:8px}
.rspacer{flex:1;min-width:8px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:450;color:var(--muted);border:1px solid var(--border);border-radius:999px;padding:0 8px;height:24px;flex:none;white-space:nowrap;max-width:180px;overflow:hidden}
.chip .cdot{font-size:10px}.chip span{overflow:hidden;text-overflow:ellipsis}
.due{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:450;flex:none;border:1px solid var(--border);border-radius:999px;padding:0 8px;height:24px;color:var(--muted);white-space:nowrap}
.due.over svg{color:var(--overdue)}
.rcreated{font-size:11px;color:var(--faint);flex:none;font-variant-numeric:tabular-nums;width:42px;text-align:right}
.av{border-radius:50%;flex:none;display:grid;place-items:center;color:#fff;font-weight:600}
.av.empty{background:transparent;border:1.3px dashed var(--faint)}

.board{flex:1;display:flex;overflow-x:auto;overflow-y:hidden}
.board::-webkit-scrollbar{height:9px}.board::-webkit-scrollbar-thumb{background:var(--border-soft);border-radius:9px}
.pcol{width:354px;flex:none;display:flex;flex-direction:column;padding:11px 12px;border-right:1px solid var(--divider);min-height:0}.pcol.pcol-drop{background:var(--selected-row)}.pcard-dragging{opacity:.45;cursor:grabbing}.pcol-empty{font-size:12px;color:var(--faint);padding:5px 6px}
.pcol-hd{display:flex;align-items:center;gap:7px;padding:2px 6px 9px;position:relative}.pcol-chev{position:absolute;left:5px;top:1px;width:17px;height:17px;border-radius:4px;display:grid;place-items:center;color:var(--faint);background:none;border:none;opacity:0;cursor:pointer;transition:transform .12s;z-index:1}.pcol-hd:hover .pico{opacity:0}.pcol-hd:hover .pcol-chev{opacity:1}.pcol-chev:hover{color:var(--text);background:var(--hover)}.pcol.col{width:46px;padding-left:5px;padding-right:5px}.pcol.col .pico,.pcol.col .pt,.pcol.col .pc,.pcol.col .pcol-sp,.pcol.col .pcol-btn{display:none}.pcol.col .pcol-chev{opacity:1;position:static;transform:rotate(-90deg)}.pcol-railname{writing-mode:vertical-rl;font-size:13px;font-weight:500;color:var(--text-strong);margin:6px 0 0 4px;white-space:nowrap}
.pcol-hd .pico{width:16px;height:16px;flex:none}.pcol-hd .pt{font-size:13px;font-weight:500;color:var(--text-strong)}.pcol-hd .pc{font-size:13px;font-weight:450;color:var(--muted)}
.pcards{display:flex;flex-direction:column;gap:7px;overflow-y:auto;padding-bottom:20px}
.pcards::-webkit-scrollbar{width:7px}.pcards::-webkit-scrollbar-thumb{background:var(--border-soft);border-radius:8px}
.pcard{background:var(--surface);border-radius:8px;padding:11px 13px;cursor:grab;box-shadow:0 3px 6px -2px rgba(0,0,0,.02),0 1px 1px 0 rgba(0,0,0,.04);transition:box-shadow .12s}
.pcard:hover{box-shadow:0 4px 10px -2px rgba(0,0,0,.05),0 1px 2px 0 rgba(0,0,0,.06)}
.pcard.pcard-kfocus{box-shadow:0 0 0 2px var(--accent),0 3px 6px -2px rgba(0,0,0,.04)}
.pcard.pcard-sel{background:var(--selected-row)}
.pcard-check{width:14px;height:14px;flex:none;border-radius:4px;border:1.5px solid var(--faint);background:var(--surface);opacity:0;display:grid;place-items:center;cursor:pointer}
.pcard:hover .pcard-check,.pcard.pcard-sel .pcard-check{opacity:1}
.pcard-check.on{background:var(--accent);border-color:var(--accent);opacity:1}
.pcard-check.on::after{content:"";width:3.2px;height:6.5px;border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(42deg) translateY(-1px)}
.pcard-hd{display:flex;align-items:center;gap:7px}.pcard-hd .pico{width:16px;height:16px;flex:none}
.pcard-ico{width:16px;height:16px;flex:none;display:grid;place-items:center;color:var(--muted)}
.pcard-status{width:16px;height:16px;flex:none;display:grid;place-items:center}
.pcard-nm{font-size:13px;font-weight:500;color:var(--text-strong);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcard-desc{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.45;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pcard-meta{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;font-weight:450;color:var(--muted)}
.pcard-meta .mdue{display:inline-flex;align-items:center;gap:4px}.pcard-meta .mdue.over svg{color:var(--overdue)}.pcard-meta .spacer{flex:1}
.pcol-sp{flex:1}
.pcol-btn{width:22px;height:22px;border-radius:5px;display:grid;place-items:center;color:var(--faint);flex:none}
.pcol-btn:hover{background:var(--hover);color:var(--text)}
.pcard-dots{width:20px;height:20px;border-radius:5px;display:grid;place-items:center;color:var(--faint);flex:none;opacity:0}
.pcard:hover .pcard-dots{opacity:1}
.pcard-dots:hover{background:var(--hover);color:var(--text)}

#layer{position:fixed;inset:0;z-index:55;pointer-events:none}
.cmdk-bd{position:fixed;inset:0;background:rgba(20,20,22,.28);display:flex;justify-content:center;align-items:flex-start;padding-top:13vh;pointer-events:auto}
.cmdk{width:min(620px,92vw);max-height:56vh;background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;box-shadow:var(--shadow-pop);display:flex;flex-direction:column;overflow:hidden}
.cmdk-inp{border:none;outline:none;font:inherit;font-size:15px;font-weight:450;letter-spacing:-.1px;padding:13px 16px;background:none;color:var(--text);border-bottom:1px solid var(--divider)}
.cmdk-inp::placeholder{color:var(--faint)}
.cmdk-list{overflow-y:auto;padding:6px;flex:1}
.cmdk-item{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:450;color:var(--text-strong)}
.cmdk-item.sel{background:var(--menu-hover)}
.cmdk-item .ci{width:16px;height:16px;flex:none;display:grid;place-items:center}
.cmdk-item .ct{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cmdk-item .cmeta{margin-left:auto;font-size:11px;color:var(--faint);flex:none;padding-left:10px}
.cmdk-empty{padding:18px 16px;color:var(--faint);font-size:13px}
.pop-empty{padding:7px 11px;color:var(--faint);font-size:12.5px}
.tb-ico.menu-open{background:var(--hover);color:var(--text)}
.composer-hint{font-size:10.5px;color:var(--faint);margin-right:8px;align-self:center}.composer-hint .kbd{background:transparent;border:0;padding:0;color:var(--muted)}
.pop-bd{position:fixed;inset:0}
.pop{position:absolute;background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;box-shadow:var(--shadow-pop);padding:5px;min-width:190px;font-size:12px;color:var(--text-strong)}
.mi{display:flex;align-items:center;gap:9px;height:32px;padding:0 8px;border-radius:6px;cursor:default;white-space:nowrap;font-size:13px}
.mi:hover{background:var(--menu-hover)}.mi.sel{background:var(--menu-hover)}
.mi .mic{width:16px;height:16px;flex:none;color:var(--dim);display:grid;place-items:center}
.mi .mlbl{flex:1}.mi .kbd{color:var(--faint);font-size:10px;margin-left:14px;order:1}.mi .chev{color:var(--faint);display:flex;margin-left:6px}.mi .tick{color:var(--text);margin-left:8px}
.mi.danger{color:var(--danger)}.mi.danger .mic{color:var(--danger)}
.msep{height:1px;background:var(--divider);margin:5px 6px}
.pop-hd{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;padding:4px 8px}
.pop-search{padding:3px 5px 6px}
.pop-search input{width:100%;border:1px solid var(--border-soft);border-radius:6px;padding:5px 8px;font:inherit;font-size:12px;color:var(--text);outline:none;background:var(--content)}
.pop-search input:focus{border-color:var(--accent)}
.pop-list{max-height:262px;overflow-y:auto}
.pop-list .mi{font-weight:450}
.pop-list::-webkit-scrollbar{width:7px}.pop-list::-webkit-scrollbar-thumb{background:#00000015;border-radius:8px}
.clk{cursor:pointer}.crumb-detail .clk:hover{color:var(--text-strong)}
.pop.duepop{width:266px}
.dres{color:var(--faint);font-size:11px;margin-left:auto;white-space:nowrap;padding-left:12px;font-variant-numeric:tabular-nums}
.cal{padding:2px 6px 8px}
.cal-hd{display:flex;align-items:center;justify-content:space-between;padding:2px 2px 8px}
.cal-mo{font-size:12.5px;font-weight:600;color:var(--text)}
.cal-nav{width:22px;height:22px;border-radius:5px;color:var(--muted);font-size:16px;display:grid;place-items:center;line-height:1}
.cal-nav:hover{background:var(--hover);color:var(--text)}
.cal-wk{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:3px}
.cal-wk span{text-align:center;font-size:10px;color:var(--faint);font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cal-d{height:29px;display:grid;place-items:center;font-size:12px;color:var(--text);border-radius:6px;cursor:pointer;font-variant-numeric:tabular-nums}
.cal-d:hover{background:var(--hover)}
.cal-d.empty{visibility:hidden;cursor:default}
.cal-d.today{color:var(--accent);font-weight:700}.cal-d.focus{box-shadow:inset 0 0 0 2px var(--accent)}
.cal-d.sel{background:var(--accent);color:#fff!important}
.cal-d.sel:hover{background:var(--accent)}

.actionbar{position:fixed;left:calc(50% + var(--sidebar)/2);bottom:20px;transform:translateX(-50%);z-index:45;display:inline-flex;align-items:center;gap:3px;height:44px;padding:5px;background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;box-shadow:var(--shadow-pop)}
.actionbar .cnt{font-size:12px;color:var(--dim);padding:0 8px 0 9px;white-space:nowrap}
.actionbar .abtn{height:28px;display:inline-flex;align-items:center;gap:6px;padding:0 10px;background:var(--hover);border-radius:7px;font-size:12px;color:var(--text-strong)}
.actionbar .abtn:hover{background:var(--hover)}
.actionbar .abq{padding:0;width:28px;justify-content:center}.actionbar .abq svg{width:15px;height:15px}.actionbar .absep{width:1px;height:20px;background:var(--border-soft);margin:0 2px}

function buildFilterValues(p,field){const f=FILTERFIELDS[field];const vals=f.values();const c0=condFor(field);const sel=new Set(c0?c0.values:[]);
  p.innerHTML='<div class="pop-search"><input data-search placeholder="'+f.label+'…"></div><div class="pop-list">'+vals.map((v,i)=>'<div class="mi" data-fv="'+i+'"><span class="mic">'+f.icon(v)+'</span><span class="mlbl">'+esc(f.name(v))+'</span><span class="tick"'+(sel.has(v)?'':' style="visibility:hidden"')+'>'+I.check+'</span></div>').join("")+'</div>';
  const fvVis=()=>[...p.querySelectorAll("[data-fv]")].filter(el=>el.style.display!=="none");
  let fmsel=0;const fhi=n=>{const v=fvVis();if(!v.length)return;fmsel=Math.max(0,Math.min(n,v.length-1));v.forEach((el,i)=>el.classList.toggle("sel",i===fmsel));const s=v[fmsel];if(s)s.scrollIntoView({block:"nearest"});};
  const toggleFv=el=>{const v=vals[+el.getAttribute("data-fv")];toggleFilterValue(field,v);const has=(condFor(field)||{values:[]}).values.includes(v);el.querySelector(".tick").style.visibility=has?"visible":"hidden";};

  const inp=p.querySelector("[data-search]");if(inp){inp.addEventListener("input",()=>{const q=inp.value.toLowerCase();let shown=0;p.querySelectorAll("[data-fv]").forEach(el=>{const v=vals[+el.getAttribute("data-fv")];const m=f.name(v).toLowerCase().includes(q);el.style.display=m?"":"none";if(m)shown++;});pickerEmptyState(p,shown);fhi(0);});inp.addEventListener("keydown",e=>{e.stopPropagation();if(e.key==="Escape"){if(subPop&&subPop===p){closeSub();}else{clearLayer();}return;}if(e.key==="ArrowDown"){e.preventDefault();fhi(fmsel+1);return;}if(e.key==="ArrowUp"){e.preventDefault();fhi(fmsel-1);return;}if(e.key==="Enter"){e.preventDefault();const v=fvVis();if(v.length)toggleFv(v[Math.min(fmsel,v.length-1)]);}});setTimeout(()=>{try{inp.focus();}catch(e){}},20);fhi(0);}
  return p;}

function searchRank(q,primary,secondary,body){q=String(q||"").trim().toLowerCase();if(!q)return 0;primary=String(primary||"").trim().toLowerCase();secondary=String(secondary||"").trim().toLowerCase();body=String(body||"").trim().toLowerCase();if(primary===q)return 0;if(primary.indexOf(q)===0)return 1;if(primary.split(/\s+/).some(function(part){return part.indexOf(q)===0;}))return 2;if(primary.indexOf(q)>=0)return 3;if(secondary===q||secondary.indexOf(q)===0)return 4;if(secondary.indexOf(q)>=0)return 5;if(body.indexOf(q)>=0)return 8;return -1;}

function clearDropFx(){[].forEach.call(document.querySelectorAll(".pcol-drop"),function(el){el.classList.remove("pcol-drop");});}
document.addEventListener("dragstart",function(e){var c=e.target.closest&&e.target.closest(".pcard[data-project]");if(!c)return;dragProj=c.getAttribute("data-project");if(e.dataTransfer){e.dataTransfer.effectAllowed="move";try{e.dataTransfer.setData("text/plain",dragProj);}catch(_){}}c.classList.add("pcard-dragging");});
document.addEventListener("dragend",function(e){var c=e.target.closest&&e.target.closest(".pcard");if(c)c.classList.remove("pcard-dragging");clearDropFx();dragProj=null;});
document.addEventListener("dragover",function(e){var col=e.target.closest&&e.target.closest("[data-pcol]");if(!col||!dragProj)return;e.preventDefault();if(e.dataTransfer)e.dataTransfer.dropEffect="move";var dc=CLIENTS.find(function(z){return z.id===dragProj;});if(dc&&dc.status===col.getAttribute("data-pcol")){clearDropFx();return;}if(!col.classList.contains("pcol-drop")){clearDropFx();col.classList.add("pcol-drop");}});
document.addEventListener("drop",function(e){var col=e.target.closest&&e.target.closest("[data-pcol]");if(!col||!dragProj)return;e.preventDefault();var k=col.getAttribute("data-pcol");var c=CLIENTS.find(function(z){return z.id===dragProj;});clearDropFx();var moved=c&&c.status!==k;if(moved){c.status=k;}dragProj=null;if(moved){render();toast("Status → "+PSTATUS[k].name);}});
render();
history.replaceState(snapshot(),"");
</script>
