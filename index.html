        if(sel!=='all'&&!clientOnly){
            pageTop.classList.remove('overview-mode');
            pageTitle.style.display='none';pageSub.style.display='none';selectorWrap.style.display='none';
            if(!existingBack){
                const btn=document.createElement('button');
                btn.className='back-btn';btn.innerHTML='← All Clients';
                btn.onclick=()=>history.back();
                titleRow.insertBefore(btn,titleRow.firstChild);
            }
        } else if(!clientOnly){
            pageTop.classList.add('overview-mode');
            pageTitle.style.display='';pageSub.style.display='';selectorWrap.style.display='';
            if(existingBack)existingBack.remove();
        }
        if(sel==='all'){
            content.innerHTML=renderOverview(latestPerClient());
            const pr=document.getElementById('pinsArea');
            if(pr)pr.style.display='';
            return;
        }
        const _pr=document.getElementById('pinsArea');
        if(_pr)_pr.style.display='none';
        const hist=clientHistory(sel);
        if(!hist.length){content.innerHTML=`<div class="error-state">No data for "${sel}"</div>`;return;}
        content.innerHTML=renderClient(sel,hist,clientOnly);
        const tab=clientViewTab[sel]||'analytics';
        if(tab==='analytics')setTimeout(()=>renderChart(hist),0);
    }

    function selectClient(name){
        updateClientTrigger(name);
        history.pushState({client:name},'','#'+encodeURIComponent(name));
        render(name,false);
        window.scrollTo({top:0,behavior:'instant'});
    }

    window.addEventListener('popstate',()=>{
        const hash=decodeURIComponent(location.hash.replace('#',''));
        const clientNames=[...new Set(allData.map(r=>r.client_name))];
        if(hash&&clientNames.includes(hash)){
            updateClientTrigger(hash);render(hash,false);window.scrollTo({top:0,behavior:'instant'});
        } else {
            updateClientTrigger('All Clients');render('all');window.scrollTo({top:0,behavior:'instant'});
        }
    });

    const RECENT_KEY='syncview_recent_searches';
    function getRecent(){try{return JSON.parse(localStorage.getItem(RECENT_KEY)||'[]');}catch{return[];}}
    function addRecent(name){let r=getRecent().filter(n=>n!==name);r.unshift(name);r=r.slice(0,3);localStorage.setItem(RECENT_KEY,JSON.stringify(r));}
    function openSearchDropdown(){const box=document.getElementById('searchBox');if(!box||box.classList.contains('open'))return;box.classList.add('open');const close=(e)=>{const wrap=document.getElementById('searchWrap');if(wrap&&!wrap.contains(e.target)){box.classList.remove('open');document.removeEventListener('click',close);}};setTimeout(()=>document.addEventListener('click',close),0);}
    function onSearchFocus(){renderSearchResults(document.getElementById('searchInput')?.value||'');openSearchDropdown();}
    function onSearchIconClick(){const inp=document.getElementById('searchInput');const q=inp?.value.trim();if(q){const allNames=[...new Set(allData.map(r=>r.client_name))].sort();const starts=allNames.filter(n=>n.toLowerCase().startsWith(q.toLowerCase()));const contains=allNames.filter(n=>!n.toLowerCase().startsWith(q.toLowerCase())&&n.toLowerCase().includes(q.toLowerCase()));const first=[...starts,...contains][0];if(first){searchGoTo(first);return;}}inp?.focus();openSearchDropdown();}
    function onSearchInput(){const q=document.getElementById('searchInput').value;renderSearchResults(q);updateSearchGhost(q);openSearchDropdown();}
    function updateSearchGhost(q){const ghost=document.getElementById('searchGhost');const inp=document.getElementById('searchInput');if(!ghost||!inp)return;const q2=q.trim().toLowerCase();if(!q2){ghost.innerHTML='';return;}const allNames=[...new Set(allData.map(r=>r.client_name))].sort();const starts=allNames.filter(n=>n.toLowerCase().startsWith(q2));const contains=allNames.filter(n=>!n.toLowerCase().startsWith(q2)&&n.toLowerCase().includes(q2));const first=[...starts,...contains][0];if(!first){ghost.innerHTML='';return;}if(first.toLowerCase().startsWith(q2)){const typed=first.slice(0,q.length);const rest=first.slice(q.length);ghost.innerHTML=`<span style="color:transparent;white-space:pre">${typed}</span><span style="color:var(--text-muted);opacity:0.55;white-space:pre">${rest}</span><span style="margin-left:8px;font-size:0.65rem;color:var(--text-muted);opacity:0.4;background:var(--border);border-radius:3px;padding:1px 5px;flex-shrink:0;">↵</span>`;}else{ghost.innerHTML=`<span style="color:transparent;white-space:pre">${q}</span><span style="margin-left:8px;font-size:0.65rem;color:var(--text-muted);opacity:0.4;background:var(--border);border-radius:3px;padding:1px 5px;flex-shrink:0;">↵ ${first}</span>`;}}
    function onSearchKey(e){if(e.key!=='Enter')return;const q=document.getElementById('searchInput')?.value.trim();if(!q)return;const allNames=[...new Set(allData.map(r=>r.client_name))].sort();const _starts=allNames.filter(n=>n.toLowerCase().startsWith(q.toLowerCase()));const _contains=allNames.filter(n=>!n.toLowerCase().startsWith(q.toLowerCase())&&n.toLowerCase().includes(q.toLowerCase()));const first=[..._starts,..._contains][0];if(first)searchGoTo(first);}
    function highlightMatch(name,q){if(!q)return name;const idx=name.toLowerCase().indexOf(q.toLowerCase());if(idx<0)return name;return name.slice(0,idx)+`<span class="s-match">`+name.slice(idx,idx+q.length)+`</span>`+name.slice(idx+q.length);}
    function renderSearchResults(q){const el=document.getElementById('searchResults');if(!el)return;const allNames=[...new Set(allData.map(r=>r.client_name))].sort();const recent=getRecent().filter(n=>allNames.includes(n));const q2=q.trim().toLowerCase();if(!q2){if(!recent.length){el.innerHTML='';return;}el.innerHTML=`<div class="search-section-label">Recent</div>`+recent.map(name=>`<div class="search-suggestion" onclick="searchGoTo('${name}')"><span class="s-icon">↩</span><span>${name}</span></div>`).join('');}else{const starts=allNames.filter(n=>n.toLowerCase().startsWith(q2));const contains=allNames.filter(n=>!n.toLowerCase().startsWith(q2)&&n.toLowerCase().includes(q2));const matches=[...starts,...contains];if(!matches.length){el.innerHTML=`<div class="search-empty">No clients found</div>`;}else{el.innerHTML=matches.slice(0,6).map(name=>`<div class="search-suggestion" onclick="searchGoTo('${name}')"><span class="s-icon">👤</span><span>${highlightMatch(name,q.trim())}</span></div>`).join('');}}}
    function searchGoTo(name){addRecent(name);const box=document.getElementById('searchBox');const inp=document.getElementById('searchInput');const ghost=document.getElementById('searchGhost');if(box)box.classList.remove('open');if(inp){inp.value='';inp.blur();}if(ghost)ghost.innerHTML='';selectClient(name);}

    const PINS_KEY='syncview_pinned_clients';
    const MAX_PINS=3;
    let pinsEditMode=false;
    let pinSelectorOpen=false;
    const PIN_ICON_SVG='<svg width="10" height="10" viewBox="0 0 16 16" fill="none"><path d="M5 1h6v1l-1 4 2 2v1H9v5l-1 1-1-1V9H3V8l2-2L4 2z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/><line x1="8" y1="9" x2="8" y2="15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>';
    const PEN_ICON_SVG='<svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M11 2l3 3-8 8H3v-3l8-8z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    const CHECK_SVG='<svg width="8" height="8" viewBox="0 0 10 10" fill="none"><path d="M2 5l2.5 2.5L8 3" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    function getPins(){try{return JSON.parse(localStorage.getItem(PINS_KEY)||'[]');}catch{return[];}}
    function savePins(pins){localStorage.setItem(PINS_KEY,JSON.stringify(pins));}
    function togglePin(name){let pins=getPins();if(pins.includes(name))pins=pins.filter(p=>p!==name);else{if(pins.length>=MAX_PINS)return;pins.push(name);}savePins(pins);renderPins();}
    function removePin(name){const pins=getPins().filter(p=>p!==name);savePins(pins);if(pins.length===0)pinsEditMode=false;pinSelectorOpen=false;renderPins();}
    function togglePinsEdit(){pinsEditMode=!pinsEditMode;pinSelectorOpen=false;renderPins();}
    function closePinSelector(){pinSelectorOpen=false;const dd=document.getElementById('pinSelectorDropdown');if(dd)dd.classList.remove('open');}
    function togglePinSelector(){if(pinSelectorOpen){closePinSelector();return;}pinSelectorOpen=true;const dd=document.getElementById('pinSelectorDropdown');if(dd){dd.classList.add('open');renderPinSelectorList();}const close=(e)=>{const addRow=document.getElementById('pinsAddRow');if(addRow&&!addRow.contains(e.target)){closePinSelector();document.removeEventListener('click',close);}};setTimeout(()=>document.addEventListener('click',close),0);}
    function renderPins(){
        const row=document.getElementById('pinsRow'),addRow=document.getElementById('pinsAddRow'),area=document.getElementById('pinsArea');
        if(!row||!addRow)return;
        const pins=getPins();
        row.innerHTML='';
        pins.forEach(name=>{const pill=document.createElement('div');pill.className='pin-pill';if(!pinsEditMode)pill.onclick=()=>selectClient(name);const nameSpan=document.createElement('span');nameSpan.textContent=name;pill.appendChild(nameSpan);if(pinsEditMode){const rm=document.createElement('span');rm.className='pin-remove';rm.title='Remove';rm.textContent='✕';rm.onclick=(e)=>{e.stopPropagation();removePin(name);};pill.appendChild(rm);}row.appendChild(pill);});
        if(pins.length>=1){const editBtn=document.createElement('button');editBtn.className='pin-edit-btn'+(pinsEditMode?' active':'');editBtn.title=pinsEditMode?'Done':'Edit pins';editBtn.innerHTML=pinsEditMode?'<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>':PEN_ICON_SVG;editBtn.onclick=togglePinsEdit;row.appendChild(editBtn);}
        addRow.innerHTML='';
        const showAddBtn=pins.length<MAX_PINS&&(pins.length===0||pinsEditMode||pinSelectorOpen);
        if(showAddBtn){const addBtn=document.createElement('button');addBtn.className='pin-add-btn';addBtn.title='Pin a client';addBtn.innerHTML=PIN_ICON_SVG+' Pin client <span style="opacity:0.6;font-size:0.68rem;">'+pins.length+'/'+MAX_PINS+'</span>';addBtn.onclick=togglePinSelector;addRow.appendChild(addBtn);const dd=document.createElement('div');dd.className='pin-selector-dropdown'+(pinSelectorOpen?' open':'');dd.id='pinSelectorDropdown';const hdr=document.createElement('div');hdr.className='pin-selector-header';hdr.innerHTML='<span class="pin-selector-title">Pin a client</span><div style="display:flex;align-items:center;gap:8px;"><span class="pin-selector-count">'+pins.length+' / '+MAX_PINS+'</span><button style="background:none;border:none;cursor:pointer;color:var(--text-muted);display:inline-flex;align-items:center;padding:0;transition:color 0.13s;" id="pinDropCloseBtn" title="Close"><svg width="9" height="9" viewBox="0 0 10 10" fill="none"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button></div>';dd.appendChild(hdr);const list=document.createElement('div');list.className='pin-selector-list';list.id='pinSelectorList';dd.appendChild(list);addRow.appendChild(dd);const closeBtn=dd.querySelector('#pinDropCloseBtn');if(closeBtn)closeBtn.onclick=(e)=>{e.stopPropagation();closePinSelector();};if(pinSelectorOpen)renderPinSelectorList();}else if(!showAddBtn&&pinSelectorOpen){pinSelectorOpen=false;}
        if(area)area.style.display='';
    }
    function renderPinSelectorList(){const list=document.getElementById('pinSelectorList');if(!list)return;const pins=getPins();const allNames=[...new Set(allData.map(r=>r.client_name))].sort();list.innerHTML='';allNames.forEach(name=>{const isPinned=pins.includes(name);const disabled=!isPinned&&pins.length>=MAX_PINS;const item=document.createElement('div');item.className='pin-selector-item'+(isPinned?' pinned':'');if(disabled)item.style.cssText='opacity:0.35;cursor:default;';const nameSpan=document.createElement('span');nameSpan.textContent=name;const check=document.createElement('span');check.className='pin-check';if(isPinned)check.innerHTML=CHECK_SVG;item.appendChild(nameSpan);item.appendChild(check);if(!disabled)item.onclick=(e)=>{e.stopPropagation();togglePin(name);};list.appendChild(item);});}

    function goHome(){history.pushState({},'',location.pathname+location.search);updateClientTrigger('All Clients');render('all');}

    async function init(){
        try{
            await fetchAll();
            const dates=allData.map(r=>r.date).filter(Boolean).sort().reverse();
            if(dates[0])document.getElementById('lastUpdated').textContent=`Updated ${fmtDate(dates[0])}`;
            const clientNames=[...new Set(allData.map(r=>r.client_name))];
            const qParam=new URLSearchParams(location.search).get('c');
            const clientFromQuery=qParam?decodeURIComponent(qParam):null;
            if(clientFromQuery&&clientNames.includes(clientFromQuery)){
                document.getElementById('selectorWrap').style.display='none';
                document.getElementById('pageSub').style.display='none';
                document.getElementById('pageTitle').textContent='Your Analytics';
                render(clientFromQuery,true);return;
            }
            const hash=decodeURIComponent(location.hash.replace('#',''));
            populateDropdown();
            renderPins();
            if(hash&&clientNames.includes(hash)){updateClientTrigger(hash);render(hash,false);}
            else{render('all');}
        }catch(err){
            document.getElementById('content').innerHTML=`<div class="error-state">Could not load data. Make sure the Google Sheet is set to "Anyone with the link can view".<br><br><small style="color:#aaa">${err.message}</small></div>`;
        }
    }
    init();
</script>
</body>
</html>
