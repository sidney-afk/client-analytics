    function deltaBadge(today,prev,key){
        if(!prev)return`<span class="m-delta none">no previous day yet</span>`;
        const diff=n(today[key])-n(prev[key]);
        if(diff===0)return`<span class="m-delta flat">no change</span>`;
        // ── FIX: correct '-' sign for losses
        const sign=diff>0?'+':'-',cls=diff>0?'up':'down',arr=diff>0?'↑':'↓';
        return`<span class="m-delta ${cls}">${arr} ${sign}${fmt(Math.abs(diff))||Math.abs(diff).toLocaleString()}</span>`;
    }
    function mBlock(label,today,prev,key){const f=fmt(today[key]);return`<div class="metric-block"><div class="m-label">${label}</div><div class="m-value ${f?'':'empty'}">${f||'—'}</div>${f?deltaBadge(today,prev,key):''}</div>`;}
    function mBlockNoD(label,today,key){const f=fmt(today[key]);return`<div class="metric-block"><div class="m-label">${label}</div><div class="m-value ${f?'':'empty'}">${f||'—'}</div></div>`;}

    // ── FIX: gainCell now shows '-' for negative deltas
    function gainCell(today,prev,key,cls){
        const f=fmt(today[key]);
        if(!f||!prev)return`<td class="${cls}"><span class="g-none">—</span></td>`;
        const diff=n(today[key])-n(prev[key]);
        if(diff===0)return`<td class="${cls}"><span class="g-none">±0</span></td>`;
        const sign=diff>0?'+':'-';
        return`<td class="${cls}"><span class="${diff>0?'g-up':'g-down'}">${sign}${fmt(Math.abs(diff))||Math.abs(diff).toLocaleString()}</span></td>`;
    }

    // ── FIX: ncDelta now shows '-' for negative values
    function ncDelta(val,cls){
        const x=n(val);
        if(!val&&val!=='0')return`<td class="${cls}"><span class="g-none">—</span></td>`;
        if(x===0)return`<td class="${cls}"><span class="g-none">±0</span></td>`;
        const sign=x>0?'+':'-';
        return`<td class="${cls}"><span class="${x>0?'g-up':'g-down'}">${sign}${fmt(Math.abs(x))||Math.abs(x).toLocaleString()}</span></td>`;
    }

    function mBlockDiff(label,today,valueKey,diffKey){
        const f=fmt(today[valueKey]);const diff=n(today[diffKey]);let delta='';
        if(f){if(diff===0)delta=`<span class="m-delta flat">no change</span>`;else{
            // ── FIX: correct '-' sign
            const sign=diff>0?'+':'-',cls=diff>0?'up':'down',arr=diff>0?'↑':'↓';
            delta=`<span class="m-delta ${cls}">${arr} ${sign}${fmt(Math.abs(diff))||Math.abs(diff).toLocaleString()}</span>`;
        }}
        return`<div class="metric-block"><div class="m-label">${label}</div><div class="m-value ${f?'':'empty'}">${f||'—'}</div>${delta}</div>`;
    }
    function mBlockViews30d(label,today,monthRow,valueKey,diffKey){
        const views30d=monthRow?(n(today[valueKey])-n(monthRow[valueKey])):n(today[valueKey]);
        const f=views30d>0?fmt(views30d):null;const diff=n(today[diffKey]);let delta='';
        if(f){if(diff===0)delta=`<span class="m-delta flat">no change today</span>`;else if(diff>0){
            delta=`<span class="m-delta up">↑ +${fmt(diff)||diff.toLocaleString()}</span>`;
        }else if(diff<0){delta=`<span class="m-delta down">↓ -${fmt(Math.abs(diff))||Math.abs(diff).toLocaleString()}</span>`;}}
        return`<div class="metric-block"><div class="m-label">${label}</div><div class="m-value ${f?'':'empty'}">${f||'—'}</div>${delta}</div>`;
    }

    function gainsBar(today,prev,weekRow,igWeekViews,ttWeekViews,forcePeriod,clientName){
        function chip(label,value,delta){const numFmt=fmt(value);const numHtml=numFmt?`<span class="gain-chip-num">${numFmt}</span>`:`<span class="gain-chip-num empty">—</span>`;let deltaHtml='';if(delta!==null&&delta!==undefined){const d=n(delta);if(d>0)deltaHtml=`<span class="gain-delta up">↑ +${fmt(d)||d.toLocaleString()}</span>`;else if(d<0)deltaHtml=`<span class="gain-delta down">↓ ${fmt(d)||d.toLocaleString()}</span>`;else deltaHtml=`<span class="gain-delta flat">±0</span>`;}return`<div class="gain-chip"><span class="gain-chip-label">${label}</span><div class="gain-chip-val">${numHtml}${deltaHtml}</div></div>`;}
        function chipDiff(label,diffVal){if(diffVal===null||diffVal===undefined)return'';const d=n(diffVal);let deltaHtml='';if(d>0)deltaHtml=`<span class="gain-delta up">+${fmt(d)||d.toLocaleString()}</span>`;else if(d<0)deltaHtml=`<span class="gain-delta down">${fmt(d)||d.toLocaleString()}</span>`;else deltaHtml=`<span class="gain-delta flat">±0</span>`;return`<div class="gain-chip"><span class="gain-chip-label">${label}</span><div class="gain-chip-val">${deltaHtml}</div></div>`;}
        function chipDeltaOnly(label,diff){let deltaHtml='';if(diff===null||diff===undefined){deltaHtml=`<span class="gain-chip-num empty">—</span>`;}else{const d=n(diff);if(d>0)deltaHtml=`<span class="gain-delta up">+${fmt(d)||d.toLocaleString()}</span>`;else if(d<0)deltaHtml=`<span class="gain-delta down">${fmt(d)||d.toLocaleString()}</span>`;else deltaHtml=`<span class="gain-delta flat">±0</span>`;}return`<div class="gain-chip"><span class="gain-chip-label">${label}</span><div class="gain-chip-val">${deltaHtml}</div></div>`;}
        const hasIG=n(today.ig_followers)||n(today.ig_views_this_month);
        const hasTT=n(today.tiktok_followers)||n(today.tiktok_plays_this_month);
        const hasYT=n(today.yt_subscribers)||n(today.yt_total_views);
        const activePeriod=forcePeriod||gainPeriod;
        const dRow=activePeriod==='week'?weekRow:prev;
        const igFolDiff=dRow?n(today.ig_followers)-n(dRow.ig_followers):null;
        const ttFolDiff=dRow?n(today.tiktok_followers)-n(dRow.tiktok_followers):null;
        const ytSubDiff=dRow?n(today.yt_subscribers)-n(dRow.yt_subscribers):null;
        const ytViewDiff=dRow?n(today.yt_total_views)-n(dRow.yt_total_views):null;
        // Day mode: use the direct gained_today field from the sheet
        // Week mode: use _safeWeekViewDelta to handle month-boundary resets
        const igViewsGain=activePeriod==='week'?_safeWeekViewDelta(today,dRow,clientName,'ig_views_this_month','ig_views_gained_today'):(n(today.ig_views_gained_today)||null);
        const ttViewsGain=activePeriod==='week'?_safeWeekViewDelta(today,dRow,clientName,'tiktok_plays_this_month','tiktok_plays_gained_today'):(n(today.tiktok_plays_gained_today)||null);
        const periodLabel=activePeriod==='week'?"This Week's":"Today's";
        let cards='';
        if(hasIG)cards+=`<div class="gains-platform-card gp-ig"><div class="gains-platform-header"><div class="gains-platform-dot"></div><span class="gains-platform-name">Instagram</span></div><div class="gains-metrics-row">${chipDeltaOnly('Followers',igFolDiff)}${chipDiff('Views',igViewsGain)}</div></div>`;
        if(hasTT)cards+=`<div class="gains-platform-card gp-tt"><div class="gains-platform-header"><div class="gains-platform-dot"></div><span class="gains-platform-name">TikTok</span></div><div class="gains-metrics-row">${chipDeltaOnly('Followers',ttFolDiff)}${chipDiff('Views',ttViewsGain)}</div></div>`;
        if(hasYT)cards+=`<div class="gains-platform-card gp-yt"><div class="gains-platform-header"><div class="gains-platform-dot"></div><span class="gains-platform-name">YouTube</span></div><div class="gains-metrics-row">${chipDeltaOnly('Subscribers',ytSubDiff)}${chipDeltaOnly('Total Views',ytViewDiff)}</div></div>`;
        const note=dRow?'':`<span class="gains-no-data-note">Gains show after ${activePeriod==='week'?'7+':'2+'} days</span>`;
        return`<div class="gains-bar"><span class="gains-bar-label">${periodLabel}<br>Gains</span>${cards}${note}</div>`;
    }

    // Returns top N monthly videos across all platforms, sorted by views desc, deduped by URL
    function getTopMonthlyVideos(clientName,topN=5){
        const all=[];
        for(const plat of['instagram','tiktok','youtube'])all.push(...getTopVideos(clientName,plat,'month'));
        const seen=new Set();
        const deduped=[];
        for(const v of all){
            const key=(v.video_url&&v.video_url!=='#'&&v.video_url!=='')?v.video_url:(v.caption||'').substring(0,80);
            if(!seen.has(key)){seen.add(key);deduped.push(v);}
        }
        return deduped.sort((a,b)=>n(b.views)-n(a.views)).slice(0,topN);
    }

    async function generateContentSummary(clientName){
        const videos=getTopMonthlyVideos(clientName,5);
        if(!videos.length){alert('No top monthly videos found for this client.');return;}
        contentSummaryState[clientName]={loading:true,data:null,error:null};
        try{localStorage.setItem('syncview_contentSummaryState_v1',JSON.stringify(contentSummaryState));}catch{}
        refreshContentSummary(clientName);
        const payload={
            clientName,
            contentDescription:clientMap[clientName]?.content_description||'',
            videos:videos.map((v,i)=>({rank:i+1,platform:v.platform,url:v.video_url||'',caption:v.caption||'',views:n(v.views),likes:n(v.likes),comments:n(v.comments)}))
        };
        try{
            const controller=new AbortController();const _csto=setTimeout(()=>controller.abort(),180000);
            const resp=await fetch(CONTENT_SUMMARY_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),signal:controller.signal});clearTimeout(_csto);
            const text=await resp.text();
            if(!text)throw new Error('Empty response from webhook');
            let result=JSON.parse(text);
            if(Array.isArray(result)&&result[0])result=result[0];
            if(result.json)result=result.json;
            if(typeof result==='string'){try{result=JSON.parse(result);}catch{}}
            // Handle raw Claude API response format: { content: [{type:"text", text:"..."}] }
            if(!result.bullets&&result.content&&Array.isArray(result.content)&&result.content[0]?.text){
                result={bullets:result.content[0].text};
            }
            const bullets=result.bullets||result.summary||result;
            contentSummaryState[clientName]={loading:false,data:{bullets:typeof bullets==='string'?bullets:JSON.stringify(bullets),date:new Date().toISOString().split('T')[0]},error:null};
        }catch(e){
            console.error('[SyncView] Content summary error for',clientName,':',e);
            contentSummaryState[clientName]={loading:false,data:null,error:'Failed to generate summary: '+(e.name==='AbortError'?'Request timed out (3 min)':e.message||'Unknown error')};
        }
        try{localStorage.setItem('syncview_contentSummaryState_v1',JSON.stringify(contentSummaryState));}catch{}
        refreshContentSummary(clientName);
    }

    // Auto-refresh content summaries that have new scrape data since the last summary
    async function autoRefreshStaleSummaries(){
        const clientNames=Object.keys(clientMap);
        const staleClients=clientNames.filter(name=>{
            const videos=getTopMonthlyVideos(name,5);
            if(!videos.length)return false;
            const state=contentSummaryState[name];
            if(!state||!state.data)return false; // never generated — skip, user can click Generate
            const summaryDate=state.data.date||'';
            const latestScrape=topVideos.filter(v=>v.client_name===name).reduce((max,v)=>{const d=v.scraped_date||'';return d>max?d:max;},'');
            return latestScrape&&(!summaryDate||summaryDate<latestScrape);
        });
        if(!staleClients.length){console.log('[SyncView] All content summaries up to date.');return;}
        console.log('[SyncView] Auto-refreshing stale content summaries for:',staleClients);
        for(const name of staleClients){
            try{await generateContentSummary(name);}catch(e){console.warn('[SyncView] Auto-refresh failed for',name,e);}
        }
        console.log('[SyncView] Auto-refresh complete.');
    }

    function refreshContentSummary(clientName){
        const el=document.getElementById(`content-summary-${clientName.replace(/\s+/g,'_')}`);
        if(!el)return;
        const temp=document.createElement('div');
        temp.innerHTML=buildContentSummarySection(clientName);
        if(temp.firstElementChild)el.replaceWith(temp.firstElementChild);
    }

    function buildContentSummarySection(clientName){
        const id=`content-summary-${clientName.replace(/\s+/g,'_')}`;
        const enc=encodeURIComponent(clientName);
        const state=contentSummaryState[clientName];
        const videos=getTopMonthlyVideos(clientName,5);
        if(!videos.length)return'';
        let inner='';
        if(!state){
            inner=`<button class="cs-generate-btn" onclick="generateContentSummary(decodeURIComponent('${enc}'))">✦ Generate This Month's Performance Summary</button>`;
        }else if(state.loading){
            inner=`<div class="cs-loading"><span class="cs-spinner"></span>Downloading transcripts &amp; analysing what's working… <span style="font-weight:400;opacity:0.7;">(~1-2 min)</span></div>`;
        }else if(state.error){
            inner=`<div class="cs-error">${state.error}</div><button class="cs-generate-btn" onclick="generateContentSummary(decodeURIComponent('${enc}'))">Retry</button>`;
        }else if(state.data){
            const raw=state.data.bullets||'';
            // Render markdown-style bullet points
            const lines=raw.split('\n').filter(l=>l.trim());
            const items=lines.map(l=>{
                const t=l.replace(/^[-•*]\s*/,'').replace(/^\d+\.\s*/,'').trim();
                // Bold **text** and markdown links [label](url)
                const html=t
                    .replace(/\*\*\[(.+?)\]\*\*/g,'<strong>$1</strong>')
                    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
                    .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;font-weight:500;">$1</a>');
                return`<li>${html}</li>`;
            }).join('');
            // Check if summary is up to date vs latest top videos scrape
            const summaryDate=state.data.date||'';
            const latestScrape=topVideos.filter(v=>v.client_name===clientName).reduce((max,v)=>{const d=v.scraped_date||'';return d>max?d:max;},'');
            let statusBadge='';
            if(latestScrape){
                if(summaryDate&&summaryDate>=latestScrape){
                    statusBadge=`<span style="display:inline-flex;align-items:center;gap:4px;font-size:0.65rem;font-weight:600;color:#10b981;opacity:0.85;"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="#10b981" stroke-width="1.3"/><path d="M3.5 6l2 2 3-3.5" stroke="#10b981" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg> Up to date</span>`;
                }else{
                    statusBadge=`<span style="display:inline-flex;align-items:center;gap:4px;font-size:0.65rem;font-weight:600;color:#f59e0b;opacity:0.85;"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="#f59e0b" stroke-width="1.3"/><path d="M6 3.5v3M6 8.5v.01" stroke="#f59e0b" stroke-width="1.3" stroke-linecap="round"/></svg> New data available · <a href="#" onclick="event.preventDefault();generateContentSummary(decodeURIComponent('${enc}'))" style="color:#f59e0b;text-decoration:underline;font-weight:600;">Update</a></span>`;
                }
            }
            inner=`<ul class="cs-bullets">${items}</ul><div style="display:flex;align-items:center;gap:10px;margin-top:6px;">${statusBadge}<button class="cs-regen-btn" onclick="generateContentSummary(decodeURIComponent('${enc}'))">↻ Regenerate</button></div>`;
        }
        return`<div class="content-summary-section" id="${id}"><div class="cs-header"><span class="cs-title">✦ What's Working This Month</span><span class="cs-subtitle">Based on top ${videos.length} video${videos.length!==1?'s':''} by views</span></div>${inner}</div>`;
    }

    function truncateCaption(caption){if(!caption)return'';const sentences=caption.match(/[^.!?]+[.!?]+/g)||[caption];let result='';for(let i=0;i<Math.min(2,sentences.length);i++){if((result+sentences[i]).length>130&&result.length>0)break;result+=sentences[i];}return result.trim()||caption.substring(0,120);}
    const captionStore={};

    async function sendWeeklySlackUpdate(clientName){
        const btn=document.querySelector(`[data-slack-btn="${clientName}"]`);
        if(btn){btn.disabled=true;btn.textContent='Sending...';}
        try{
            const info=clientMap[clientName]||{};
            const channelId=info.slack_channel_id||'';
            if(!channelId){showNotify('No Slack channel','Add a slack_channel_id column to Clients Info for '+clientName);if(btn){btn.disabled=false;btn.innerHTML=_slackBtnContent;}return;}
            const clientVids=topVideos.filter(v=>v.client_name===clientName&&(v.period||'').toLowerCase().includes('week'));
            const latestDate=clientVids.reduce((max,v)=>{const d=v.scraped_date||'';return d>max?d:max;},'');
            const fresh=latestDate?clientVids.filter(v=>(v.scraped_date||'')===latestDate):clientVids;
            fresh.sort((a,b)=>n(b.views)-n(a.views));
            const top=fresh[0];
            if(!top){showNotify('No videos','No weekly top videos found for '+clientName);if(btn){btn.disabled=false;btn.innerHTML=_slackBtnContent;}return;}
            const resp=await fetch(WEEKLY_SLACK_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientName,slack_channel_id:channelId,content_description:info.content_description||'',platform:top.platform||'instagram',video_url:top.video_url||'',caption:(top.caption||'').substring(0,500),views:n(top.views),likes:n(top.likes),comments:n(top.comments),shares:n(top.shares),scraped_date:latestDate})});
            if(resp.ok)showNotify('Sent!','Slack update sent for '+clientName);
            else showNotify('Error','Slack webhook returned '+resp.status);
        }catch(e){console.error('[SyncView] Slack send error:',e);showNotify('Error','Could not send Slack update. Check webhook.');}
        if(btn){btn.disabled=false;btn.innerHTML=_slackBtnContent;}
    }

    function wlReadCache() {
        try {
            const raw = localStorage.getItem(LINEAR_ISSUES_CACHE_KEY);
            if (!raw) return null;
            const parsed = JSON.parse(raw);
            if (!parsed || !parsed.fetchedAt || !Array.isArray(parsed.issues)) return null;
            return parsed;
        } catch { return null; }
    }
    function wlWriteCache(payload) {
        try { localStorage.setItem(LINEAR_ISSUES_CACHE_KEY, JSON.stringify(payload)); } catch {}
    }
    function wlIsFresh(fetchedAt) {
        return typeof fetchedAt === 'number' && (Date.now() - fetchedAt) < LINEAR_ISSUES_TTL_MS;
    }

    async function loadLinearIssues(force) {
        const cache = wlReadCache();
        if (cache && !force && wlIsFresh(cache.fetchedAt)) {
            return { issues: cache.issues, fetchedAt: cache.fetchedAt, fromCache: true };
        }
        const resp = await fetch(LINEAR_ISSUES_WEBHOOK, { method: 'GET' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        const issues = Array.isArray(data) ? data : (data.issues || []);
        const fetchedAt = Date.now();
        wlWriteCache({ issues, fetchedAt });
        return { issues, fetchedAt, fromCache: false };
    }

    // Date helpers — all dates handled as YYYY-MM-DD strings for determinism.
    function wlTodayISO() {
        const d = new Date();
        return wlISO(d.getFullYear(), d.getMonth(), d.getDate());
    }
    function wlISO(y, m, d) {
        return y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    }
    function wlParseISO(iso) {
        const [y, m, d] = iso.split('-').map(Number);
        return new Date(y, m - 1, d);
    }
    function wlAddWorkingDays(iso, n) {
        const d = wlParseISO(iso);
        let added = 0;
        while (added < n) {
            d.setDate(d.getDate() + 1);
            const dow = d.getDay();
            if (dow !== 0 && dow !== 6) added++;
        }
        return wlISO(d.getFullYear(), d.getMonth(), d.getDate());
    }
    function wlSubWorkingDays(iso, n) {
        const d = wlParseISO(iso);
        let removed = 0;
        while (removed < n) {
            d.setDate(d.getDate() - 1);
            const dow = d.getDay();
            if (dow !== 0 && dow !== 6) removed++;
        }
        return wlISO(d.getFullYear(), d.getMonth(), d.getDate());
    }
    function wlNextWorkingDay(iso) {
        const d = wlParseISO(iso);
        while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() + 1);
        return wlISO(d.getFullYear(), d.getMonth(), d.getDate());
    }
    function wlIsWeekend(y, m, d) {
        const dow = new Date(y, m, d).getDay();
        return dow === 0 || dow === 6;
    }
    function wlWeekMondayISO(iso) {
        const d = wlParseISO(iso);
        const dow = d.getDay(); // 0=Sun..6=Sat
        const diff = dow === 0 ? -6 : 1 - dow;
        d.setDate(d.getDate() + diff);
        return wlISO(d.getFullYear(), d.getMonth(), d.getDate());
    }
    function wlAddDays(iso, n) {
        const d = wlParseISO(iso);
        d.setDate(d.getDate() + n);
        return wlISO(d.getFullYear(), d.getMonth(), d.getDate());
    }
    function wlFormatShort(iso) {
        const d = wlParseISO(iso);
        return d.toLocaleDateString('en-GB', { month: 'short', day: 'numeric' });
    }

    // Status classification — user rule:
    //   "Right now" = status name is literally "In Progress".
    //   Everything else with statusType === 'started' (For SMM approval, Tweak Applied, …) is parked.
    function wlIsInProgress(sub) {
        return (sub.status || '').trim().toLowerCase() === 'in progress';
    }

    // Scheduler — deterministic, per-assignee, due-date first, capacity-per-day batched by client.
    // Rules:
    //   - Items due today are always pinned to today (capacity overflow allowed).
    //   - Items whose due date falls before the cursor get overflow-scheduled on their due date.
    //   - Video editors: 5/day capacity. Graphic designers: 15/day capacity.
    function scheduleAll(plannedSubs, todayISO) {
        const byAssignee = new Map();
        for (const s of plannedSubs) {
            if (!byAssignee.has(s.assigneeId)) byAssignee.set(s.assigneeId, []);
            byAssignee.get(s.assigneeId).push(s);
        }
        const scheduledByDate = new Map();
        const push = (iso, sub) => {
            if (!scheduledByDate.has(iso)) scheduledByDate.set(iso, []);
            scheduledByDate.get(iso).push(sub);
        };

        for (const [, subs] of byAssignee) {
            const capacity = wlEditorCapacity(subs[0].teamKey, subs[0].teamName);

            // Pin items due today to today regardless of capacity.
            const dueToday = subs.filter(s => s.dueDate === todayISO);
            const queue    = subs.filter(s => s.dueDate !== todayISO);
            for (const s of dueToday) {
                s.scheduledDate = todayISO;
                push(todayISO, s);
            }

            queue.sort((a, b) => {
                const da = a.dueDate || '9999-12-31';
                const db = b.dueDate || '9999-12-31';
                if (da !== db) return da < db ? -1 : 1;
                const ca = a.clientName || '';
                const cb = b.clientName || '';
                if (ca !== cb) return ca.localeCompare(cb);
                return (a.identifier || '').localeCompare(b.identifier || '');
            });

            // Group consecutive same-client items into chunks of up to `capacity`.
            const chunks = [];
            let i = 0;
            while (i < queue.length) {
                const chunk = [queue[i]];
                let j = i + 1;
                while (j < queue.length && chunk.length < capacity && queue[j].clientName === chunk[0].clientName) {
                    chunk.push(queue[j]);
                    j++;
                }
                chunks.push(chunk);
                i = j;
            }

            // Assign dates: ASAP scheduling — cursor starts on today so work fills the
            // earliest available slot. If cursor overtakes a chunk's due date, overflow
            // to the due date rather than pushing the work further out.
            let cursor = wlNextWorkingDay(todayISO);
            for (const chunk of chunks) {
                const chunkDue = chunk[0].dueDate;
                const assignedDate = (chunkDue && chunkDue < cursor) ? chunkDue : cursor;
                for (const sub of chunk) {
                    sub.scheduledDate = assignedDate;
                    push(assignedDate, sub);
                }
                if (assignedDate === cursor) cursor = wlAddWorkingDays(cursor, 1);
            }
        }
        return scheduledByDate;
    }

    function wlTeamBucket(teamKey, teamName) {
        const k = (teamKey || '').toUpperCase();
        const n = (teamName || '').toLowerCase();
        if (n.includes('graphic') || k === 'DES' || k === 'GFX' || k === 'GRA') return 'graphics';
        return 'video';
    }
    function wlEditorCapacity(teamKey, teamName) {
        return wlTeamBucket(teamKey, teamName) === 'graphics' ? 15 : 5;
    }

    function wlInitials(name) {
        const n = wlDisplayName(name);
        if (!n) return '?';
        const parts = n.trim().split(/\s+/);
        return ((parts[0]?.[0] || '') + (parts[1]?.[0] || '')).toUpperCase() || n[0].toUpperCase();
    }

    // Some Linear users have no full name set — assigneeName is then the email.
    // Convert "martin.synchro@gmail.com" -> "Martin Synchro"; otherwise use the name as-is.
    function wlDisplayName(name) {
        if (!name) return '';
        const s = String(name).trim();
        if (!/@/.test(s)) return s;
        const local = s.split('@')[0];
        return local.split(/[._-]+/).filter(Boolean)
            .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
            .join(' ') || s;
    }

    async function initWorkloadView() {
        const now = new Date();
        const todayISO = wlTodayISO();
        if (wlState.year == null)      { wlState.year = now.getFullYear(); wlState.month = now.getMonth(); }
        if (wlState.weekStart == null) { wlState.weekStart = wlNextWorkingDay(todayISO); }
        try {
            const pref = localStorage.getItem(WL_VIEW_PREF_KEY);
            if (pref === 'week' || pref === 'month') wlState.viewMode = pref;
        } catch {}

        const cache = wlReadCache();
        if (cache) {
            wlApplyData(cache.issues, cache.fetchedAt);
            renderWorkloadAll();
        } else {
            wlState.loading = true;
            renderWorkloadAll();
        }

        try {
            const { issues, fetchedAt } = await loadLinearIssues(!!cache);
            wlApplyData(issues, fetchedAt);
            wlState.error = null;
        } catch (e) {
            console.error('[SyncView] Workload fetch failed:', e);
            if (!cache) wlState.error = e.message || 'Failed to load issues from Linear.';
        } finally {
            wlState.loading = false;
            renderWorkloadAll();
        }

        wlWireToolbar();
    }

    function wlSpinnerOn() {
        const btn = document.querySelector('[data-wl-nav="refresh"]');
        const freshEl = document.getElementById('wlFreshness');
        if (btn) btn.classList.add('wl-refreshing');
        if (freshEl) freshEl.textContent = 'Refreshing…';
    }
    function wlSpinnerOff() {
        const btn = document.querySelector('[data-wl-nav="refresh"]');
        if (btn) btn.classList.remove('wl-refreshing');
    }

    // Silent background refetch — fires when the browser tab becomes visible again.
    async function wlRefetchSilent() {
        if (!document.querySelector('.workload-view')) return;
        wlSpinnerOn();
        try {
            const { issues, fetchedAt } = await loadLinearIssues(true);
            if (!document.querySelector('.workload-view')) return;
            wlApplyData(issues, fetchedAt);
            wlState.error = null;
        } catch (e) {
            console.error('[SyncView] Workload silent refresh failed:', e);
        } finally {
            wlSpinnerOff();
            if (document.querySelector('.workload-view')) renderWorkloadAll();
        }
    }

    // Manual refresh — toolbar ↻ button. Spins the icon and shows "Refreshing…"
    // without blanking the calendar.
    async function wlManualRefresh() {
        if (!document.querySelector('.workload-view') || wlState.refreshing) return;
        wlState.refreshing = true;
        wlSpinnerOn();
        try {
            const { issues, fetchedAt } = await loadLinearIssues(true);
            if (!document.querySelector('.workload-view')) return;
            wlApplyData(issues, fetchedAt);
            wlState.error = null;
        } catch (err) {
            wlState.error = err.message || 'Refresh failed.';
        } finally {
            wlState.refreshing = false;
            wlSpinnerOff();
            renderWorkloadAll();
        }
    }

    // Pull fresh data the moment the user tabs back to the browser so they
    // don't stare at minutes-old numbers. Registered once at module scope.
    if (typeof document !== 'undefined' && !window.__wlVisibilityWired) {
        window.__wlVisibilityWired = true;
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && document.querySelector('.workload-view')) wlRefetchSilent();
        });
    }

    function wlApplyData(issues, fetchedAt) {
        const parentById = new Map();
        const subsByParentId = new Map();
        for (const i of issues) {
            if (!i.isSubIssue) parentById.set(i.id, i);
            // Normalise dueDate — Linear can return "YYYY-MM-DDTHH:mm:ssZ"; slice to 10.
            if (i.dueDate) i.dueDate = String(i.dueDate).slice(0, 10);
        }
        const subs = issues.filter(i => i.isSubIssue && i.statusType !== 'completed' && i.statusType !== 'canceled');
        for (const s of subs) {
            if (!s.parentId) continue;
            if (!subsByParentId.has(s.parentId)) subsByParentId.set(s.parentId, []);
            subsByParentId.get(s.parentId).push(s);
        }
        wlState.parentById     = parentById;
        wlState.subsByParentId = subsByParentId;
        wlState.allActiveSubs  = subs; // used to populate the client dropdown

        const todayISO   = wlTodayISO();
        const nowWorking = [];
        const planned    = [];
        const unassigned = [];
        for (const s of subs) {
            const inProg = wlIsInProgress(s);
            const hasDue = !!s.dueDate;
            if (!s.assigneeId) {
                if (inProg || hasDue) unassigned.push(s);
                continue;
            }
            if (inProg) {
                nowWorking.push(s);
                continue;
            }
            // Include if: due today/future, OR no due date at all (schedule ASAP, sort last).
            // Silently drop only items with a known past due date.
            if (!hasDue || s.dueDate >= todayISO) planned.push(s);
        }

        wlState.nowWorking = nowWorking;
        wlState.planned    = planned;
        wlState.unassigned = unassigned;
        wlState.fetchedAt  = fetchedAt;
        wlState.scheduled  = scheduleAll(planned, wlTodayISO());
    }

    // Single delegated handler on the shell root. Attached once per shell
    // via a sentinel attribute so repeat calls to initWorkloadView (e.g. when
    // the user re-navigates to Workload while a fetch is in flight) never
    // stack handlers on the same DOM nodes.
    function wlWireToolbar() {
        const root = document.querySelector('.workload-view');
        if (!root || root.dataset.wlWired === '1') return;
        root.dataset.wlWired = '1';

        root.addEventListener('click', (e) => {
            const countBadge = e.target.closest('[data-wl-count-badge]');
            const rollup     = e.target.closest('[data-wl-rollup]');
            const popClose   = e.target.closest('[data-wl-popover-close]');
            const ddTrigger  = e.target.closest('[data-wl-dropdown-trigger]');
            const ddItem     = e.target.closest('[data-wl-dropdown-item]');
            if (popClose) { e.preventDefault(); wlClosePopover(); return; }
            if (ddTrigger) {
                e.preventDefault();
                const wrap = ddTrigger.closest('.wl-dropdown');
                const menu = wrap?.querySelector('.dropdown-menu');
                const willOpen = !ddTrigger.classList.contains('open');
                wlCloseDropdowns(willOpen ? wrap : null);
                ddTrigger.classList.toggle('open', willOpen);
                ddTrigger.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
                menu?.classList.toggle('open', willOpen);
                return;
            }
            if (ddItem) {
                e.preventDefault();
                const kind  = ddItem.getAttribute('data-wl-dropdown-item');
                const value = ddItem.getAttribute('data-wl-value');
                if (kind === 'editor') wlState.editor = value;
                if (kind === 'client') wlState.client = value;
                wlCloseDropdowns(null);
                renderWorkloadAll();
                return;
            }
            if (countBadge && rollup) {
                // Intercept the click on the count badge so it opens the
                // popover instead of following the rollup <a> to Linear.
                e.preventDefault();
                // Toggle: clicking the same rollup's badge again closes it.
                const pop = document.getElementById('wlPopover');
                if (pop && pop.classList.contains('open') && wlState.popoverAnchor === rollup) {
                    wlClosePopover();
                    return;
                }
                wlOpenRollupPopover(rollup);
                return;
            }
            const navBtn    = e.target.closest('[data-wl-nav]');
            const viewBtn   = e.target.closest('[data-wl-view]');
            const teamBtn   = e.target.closest('[data-wl-team]');
            if (navBtn && root.contains(navBtn)) {
                const action = navBtn.getAttribute('data-wl-nav');
                if (action === 'prev') { wlShiftPeriod(-1); renderWorkloadAll(); return; }
                if (action === 'next') { wlShiftPeriod(1);  renderWorkloadAll(); return; }
                if (action === 'today') {
                    const today = wlTodayISO();
                    const n = new Date();
                    wlState.year = n.getFullYear(); wlState.month = n.getMonth();
                    wlState.weekStart = wlNextWorkingDay(today);
                    renderWorkloadAll();
                    return;
                }
                if (action === 'refresh') { wlManualRefresh(); return; }
            }
            if (viewBtn && root.contains(viewBtn)) {
                const mode = viewBtn.getAttribute('data-wl-view');
                if (mode !== 'week' && mode !== 'month') return;
                wlState.viewMode = mode;
                try { localStorage.setItem(WL_VIEW_PREF_KEY, mode); } catch {}
                renderWorkloadAll();
                return;
            }
            if (teamBtn && root.contains(teamBtn)) {
                wlState.team = teamBtn.getAttribute('data-wl-team') || 'all';
                renderWorkloadAll();
                return;
            }
        });

        // Dismiss the popover / dropdowns on outside click or Escape.
        document.addEventListener('click', (e) => {
            const pop = document.getElementById('wlPopover');
            if (pop && pop.classList.contains('open')
                && !pop.contains(e.target)
                && !e.target.closest('[data-wl-count-badge]')) {
                wlClosePopover();
            }
            if (!e.target.closest('.wl-dropdown')) wlCloseDropdowns(null);
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { wlClosePopover(); wlCloseDropdowns(null); }
        });
    }

    function wlShiftPeriod(delta) {
        if (wlState.viewMode === 'week') {
            // Rolling 5-workday window: shift by 5 working days per click.
            if (delta > 0) {
                for (let k = 0; k < delta; k++) wlState.weekStart = wlAddWorkingDays(wlState.weekStart, 5);
            } else if (delta < 0) {
                for (let k = 0; k < -delta; k++) wlState.weekStart = wlSubWorkingDays(wlState.weekStart, 5);
            }
        } else {
            let y = wlState.year, m = wlState.month + delta;
            while (m < 0)  { m += 12; y--; }
            while (m > 11) { m -= 12; y++; }
            wlState.year = y; wlState.month = m;
        }
    }

    function wlPopulateFilterOptions() {
        const all = wlState.allActiveSubs || [];
        // Editors: scoped to active team filter so Video pill hides graphics-only assignees.
        const editors = [...new Map(all.filter(s => s.assigneeId &&
                (wlState.team === 'all' || wlTeamBucket(s.teamKey, s.teamName) === wlState.team))
            .map(s => [s.assigneeId, wlDisplayName(s.assigneeName) || 'Unknown'])).entries()]
            .sort((a, b) => String(a[1]).localeCompare(String(b[1])));
        // Clients: every client with at least one active sub-issue (not just
        // scheduled ones) so the list stays stable as filters change.
        const clients = [...new Set(all.map(s => s.clientName).filter(Boolean))]
            .sort((a, b) => a.localeCompare(b));

        // Reset selected value if it's no longer valid for the current data.
        if (wlState.editor !== 'all' && !editors.some(([id]) => id === wlState.editor)) wlState.editor = 'all';
        if (wlState.client !== 'all' && !clients.includes(wlState.client))              wlState.client = 'all';

        const editorItems = [['all', 'All editors'], ...editors];
        const clientItems = [['all', 'All clients'], ...clients.map(c => [c, c])];

        const editorMenu = document.querySelector('[data-wl-dropdown-menu="editor"]');
        const clientMenu = document.querySelector('[data-wl-dropdown-menu="client"]');
        if (editorMenu) {
            editorMenu.innerHTML = editorItems.map(([id, name]) =>
                `<button type="button" class="dropdown-item${id === wlState.editor ? ' active' : ''}" data-wl-dropdown-item="editor" data-wl-value="${wlEscape(id)}" data-wl-label="${wlEscape(name)}">${wlEscape(name)}</button>`
            ).join('');
        }
        if (clientMenu) {
            clientMenu.innerHTML = clientItems.map(([id, name]) =>
                `<button type="button" class="dropdown-item${id === wlState.client ? ' active' : ''}" data-wl-dropdown-item="client" data-wl-value="${wlEscape(id)}" data-wl-label="${wlEscape(name)}">${wlEscape(name)}</button>`
            ).join('');
        }

        const editorLabel = document.querySelector('[data-wl-dropdown-trigger="editor"] [data-wl-dropdown-label]');
        const clientLabel = document.querySelector('[data-wl-dropdown-trigger="client"] [data-wl-dropdown-label]');
        if (editorLabel) {
            const match = editorItems.find(([id]) => id === wlState.editor);
            editorLabel.textContent = match ? match[1] : 'All editors';
        }
        if (clientLabel) {
            const match = clientItems.find(([id]) => id === wlState.client);
            clientLabel.textContent = match ? match[1] : 'All clients';
        }

        document.querySelectorAll('[data-wl-team]').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-wl-team') === wlState.team);
        });
        document.querySelectorAll('[data-wl-view]').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-wl-view') === wlState.viewMode);
        });
    }

    function wlCloseDropdowns(except) {
        document.querySelectorAll('.wl-dropdown').forEach(d => {
            if (d === except) return;
            d.querySelector('.dropdown-trigger')?.classList.remove('open');
            d.querySelector('.dropdown-trigger')?.setAttribute('aria-expanded', 'false');
            d.querySelector('.dropdown-menu')?.classList.remove('open');
        });
    }

    function wlEscape(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function wlPassesFilters(sub) {
        if (wlState.team !== 'all' && wlTeamBucket(sub.teamKey, sub.teamName) !== wlState.team) return false;
        if (wlState.editor !== 'all' && sub.assigneeId !== wlState.editor) return false;
        if (wlState.client !== 'all' && sub.clientName !== wlState.client) return false;
        return true;
    }

    // URL for the parent issue if we have it; else fall back to the sub-issue URL.
    function wlParentUrl(sub) {
        if (sub.parentId && wlState.parentById.has(sub.parentId)) {
            return wlState.parentById.get(sub.parentId).url || sub.url;
        }
        return sub.url;
    }

    function renderWorkloadAll() {
        const titleEl = document.getElementById('wlTitle');
        const freshEl = document.getElementById('wlFreshness');
        if (titleEl) {
            if (wlState.viewMode === 'week') {
                const ws = wlState.weekStart;
                const we = wlAddWorkingDays(ws, 4); // today + next 4 workdays
                const wsD = wlParseISO(ws), weD = wlParseISO(we);
                const sameMonth = wsD.getMonth() === weD.getMonth() && wsD.getFullYear() === weD.getFullYear();
                titleEl.textContent = sameMonth
                    ? wlFormatShort(ws) + ' – ' + weD.getDate() + ', ' + weD.getFullYear()
                    : wlFormatShort(ws) + ' – ' + wlFormatShort(we) + ', ' + weD.getFullYear();
            } else {
                titleEl.textContent = new Date(wlState.year, wlState.month, 1)
                    .toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
            }
        }
        if (freshEl) {
            if (wlState.loading && !wlState.fetchedAt) freshEl.textContent = 'Loading…';
            else if (wlState.fetchedAt) {
                const d = new Date(wlState.fetchedAt);
                const hh = String(d.getHours()).padStart(2, '0');
                const mm = String(d.getMinutes()).padStart(2, '0');
                freshEl.textContent = 'As of ' + hh + ':' + mm;
            } else freshEl.textContent = '';
        }

        wlPopulateFilterOptions();
        renderUnassignedStrip();

        const bodyEl = document.getElementById('wlBody');
        if (!bodyEl) return;

        const hasAnyData = wlState.planned.length || wlState.nowWorking.length || wlState.unassigned.length;
        if (wlState.error && !hasAnyData) {
            bodyEl.innerHTML = '<div class="workload-error">Could not load Linear issues: ' + wlEscape(wlState.error) + '</div>';
            return;
        }
        if (wlState.loading && !hasAnyData) {
            bodyEl.innerHTML = '<div class="workload-empty"><span class="spinner" style="display:inline-block;vertical-align:middle;"></span> Loading workload…</div>';
            return;
        }

        bodyEl.innerHTML = wlState.viewMode === 'week' ? renderWeekGrid() : renderMonthGrid();
    }

    // Group a list of sub-issues into (assigneeId × clientName) rollups.
    // `inProgress` flag marks rollups that represent "currently in progress" work
    // (shown on today's cell with a green treatment and "NOW" tag).
    function wlGroupRollups(subs, inProgress) {
        const map = new Map();
        for (const s of subs) {
            const key = (s.assigneeId || '?') + '|' + (s.clientName || '');
            if (!map.has(key)) {
                map.set(key, {
                    assigneeId: s.assigneeId,
                    assigneeName: s.assigneeName,
                    clientName: s.clientName,
                    teamKey: s.teamKey,
                    teamName: s.teamName,
                    parentId: s.parentId,
                    anySub: s,
                    count: 0,
                    inProgress: !!inProgress,
                });
            }
            const g = map.get(key);
            g.count++;
        }
        return [...map.values()].sort((a, b) => {
            const na = wlDisplayName(a.assigneeName); const nb = wlDisplayName(b.assigneeName);
            if (na !== nb) return na.localeCompare(nb);
            return (a.clientName || '').localeCompare(b.clientName || '');
        });
    }

    // Build today's rollups: In-Progress items first, then scheduled/planned items.
    function wlTodayRollups(todayISO) {
        const nowSubs = wlState.nowWorking.filter(wlPassesFilters);
        const plannedSubs = (wlState.scheduled.get(todayISO) || []).filter(wlPassesFilters);
        const nowGroups     = wlGroupRollups(nowSubs, true);
        const plannedGroups = wlGroupRollups(plannedSubs, false);
        const count = nowSubs.length + plannedSubs.length;
        return { groups: [...nowGroups, ...plannedGroups], count };
    }

    function renderUnassignedStrip() {
        const unassignedEl = document.getElementById('wlUnassigned');
        const chipsEl      = document.getElementById('wlUnassignedChips');
        if (!unassignedEl || !chipsEl) return;
        const filtered = wlState.unassigned.filter(s => {
            if (wlState.team !== 'all' && wlTeamBucket(s.teamKey, s.teamName) !== wlState.team) return false;
            if (wlState.client !== 'all' && s.clientName !== wlState.client) return false;
            return true; // editor filter doesn't apply to unassigned
        });
        if (!filtered.length) {
            unassignedEl.classList.add('empty');
            chipsEl.innerHTML = '';
            return;
        }
        unassignedEl.classList.remove('empty');
        chipsEl.innerHTML = filtered.map(s => {
            const team = wlTeamBucket(s.teamKey, s.teamName);
            const dot = `<span class="workload-legend-swatch" style="background:${team === 'graphics' ? '#d97706' : '#6c5ce7'}"></span>`;
            return `<a class="workload-chip" href="${wlEscape(s.url)}" target="_blank" rel="noopener noreferrer" title="${wlEscape(s.identifier)} · ${wlEscape(s.clientName || '')}">
                ${dot}<span>${wlEscape(s.title)}</span><span class="chip-client">${wlEscape(s.clientName || '')}</span>
            </a>`;
        }).join('');
    }

    function renderWeekGrid() {
        const todayISO = wlTodayISO();
        const start = wlState.weekStart; // leftmost working day (today by default)
        const dayLabels = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        let weekdayHtml = '<div class="workload-weekdays week">';
        for (let i = 0; i < 5; i++) {
            const iso = wlAddWorkingDays(start, i);
            const d = wlParseISO(iso);
            weekdayHtml += `<div class="workload-weekday">${dayLabels[d.getDay()]} · ${d.getDate()}</div>`;
        }
        weekdayHtml += '</div>';

        let gridHtml = '<div class="workload-grid week">';
        for (let i = 0; i < 5; i++) {
            const iso = wlAddWorkingDays(start, i);
            const d = wlParseISO(iso);
            const isToday = iso === todayISO;
            const classes = ['workload-day'];
            if (isToday) classes.push('today');
            let groups, count;
            if (isToday) {
                ({ groups, count } = wlTodayRollups(todayISO));
            } else {
                const subs = (wlState.scheduled.get(iso) || []).filter(wlPassesFilters);
                groups = wlGroupRollups(subs, false);
                count = subs.length;
            }
            const rowsHtml = renderDayRollups(groups, iso);
            const countBadge = count ? `<span class="workload-day-count">${count}</span>` : '';
            gridHtml += `<div class="${classes.join(' ')}">
                <div class="workload-day-num"><span>${d.getDate()}</span>${countBadge}</div>
                ${rowsHtml}
            </div>`;
        }
        gridHtml += '</div>';
        return '<div class="workload-grid-wrap">' + weekdayHtml + gridHtml + '</div>';
    }

    function renderMonthGrid() {
        const { year, month } = wlState;
        const todayISO = wlTodayISO();
        const firstDow = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const leading = firstDow;
        const totalCells = Math.ceil((leading + daysInMonth) / 7) * 7;

        const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        let weekdayHtml = '<div class="workload-weekdays month">' +
            weekdays.map(w => `<div class="workload-weekday">${w}</div>`).join('') +
            '</div>';

        let gridHtml = '<div class="workload-grid month">';
        for (let i = 0; i < totalCells; i++) {
            const dayOffset = i - leading;
            const cellDate = new Date(year, month, 1 + dayOffset);
            const y = cellDate.getFullYear();
            const m = cellDate.getMonth();
            const d = cellDate.getDate();
            const iso = wlISO(y, m, d);
            const outOfMonth = (m !== month);
            const weekend = wlIsWeekend(y, m, d);
            const isToday = iso === todayISO;

            const classes = ['workload-day'];
            if (outOfMonth) classes.push('out-of-month');
            if (weekend)    classes.push('weekend');
            if (isToday)    classes.push('today');

            let groups, count;
            if (isToday) {
                ({ groups, count } = wlTodayRollups(todayISO));
            } else {
                const subs = (wlState.scheduled.get(iso) || []).filter(wlPassesFilters);
                groups = wlGroupRollups(subs, false);
                count = subs.length;
            }
            const rowsHtml = renderDayRollups(groups, iso);
            const countBadge = count ? `<span class="workload-day-count">${count}</span>` : '';

            gridHtml += `<div class="${classes.join(' ')}">
                <div class="workload-day-num"><span>${d}</span>${countBadge}</div>
                ${rowsHtml}
            </div>`;
        }
        gridHtml += '</div>';
        return '<div class="workload-grid-wrap">' + weekdayHtml + gridHtml + '</div>';
    }

    // One rollup per row. The row itself links to the parent Linear issue
    // (right-click / ctrl-click / middle-click behaves like a normal link).
    // Clicking the count badge instead opens a popover listing the individual
    // sub-issues, each linking to Linear.
    function renderDayRollups(groups, dayISO) {
        if (!groups.length) return '';
        const shown = groups.slice(0, WL_MAX_ROWS_PER_DAY);
        const hiddenGroups = groups.length - shown.length;
        let html = shown.map(g => {
            const team = wlTeamBucket(g.teamKey, g.teamName);
            const classes = ['workload-rollup', 'team-' + team];
            if (g.inProgress) classes.push('in-progress');
            const href = wlParentUrl(g.anySub);
            const name = wlDisplayName(g.assigneeName) || 'Unknown';
            const titleAttr = [name, g.clientName, g.count + ' sub-issue' + (g.count !== 1 ? 's' : ''), g.inProgress ? 'in progress' : ''].filter(Boolean).join(' · ');
            return `<a class="${classes.join(' ')}" href="${wlEscape(href)}" target="_blank" rel="noopener noreferrer" title="${wlEscape(titleAttr)}" data-wl-rollup="1" data-wl-parent-id="${wlEscape(g.parentId || '')}" data-wl-assignee-id="${wlEscape(g.assigneeId || '')}" data-wl-client="${wlEscape(g.clientName || '')}" data-wl-in-progress="${g.inProgress ? '1' : '0'}" data-wl-date="${wlEscape(dayISO || '')}">
                <div class="workload-rollup-row">
                    <span class="workload-rollup-editor">${wlEscape(name)}</span>
                    ${g.inProgress ? '<span class="workload-rollup-now-tag">Now</span>' : ''}
                </div>
                <div class="workload-rollup-row">
                    <span class="workload-rollup-client">${wlEscape(g.clientName || '—')}</span>
                    <span class="rollup-count" data-wl-count-badge="1" title="See the ${g.count} sub-issue${g.count !== 1 ? 's' : ''}">${g.count}</span>
                </div>
            </a>`;
        }).join('');
        if (hiddenGroups > 0) {
            const hiddenCount = groups.slice(shown.length).reduce((n, g) => n + g.count, 0);
            html += `<div class="workload-day-overflow">+${hiddenGroups} more (${hiddenCount})</div>`;
        }
        return html;
    }

    // ── Sub-issue popover ────────────────────────────────────────────────
    // Fetches the underlying subs for a rollup (either the in-progress list
    // or the planned-for-that-day list), filters by assignee+client, and
    // renders a popover anchored to the clicked rollup.
    function wlOpenRollupPopover(rollupEl) {
        const pop = document.getElementById('wlPopover');
        if (!pop) return;
        const parentId   = rollupEl.getAttribute('data-wl-parent-id') || '';
        const assigneeId = rollupEl.getAttribute('data-wl-assignee-id') || '';
        const clientName = rollupEl.getAttribute('data-wl-client') || '';
        const inProgress = rollupEl.getAttribute('data-wl-in-progress') === '1';
        const dayISO     = rollupEl.getAttribute('data-wl-date') || '';

        // In-progress rollups pull from nowWorking (no date filter). Planned
        // rollups pull only the sub-issues scheduled for that specific day so
        // a 5-count badge shows exactly those 5 items — not the editor's
        // entire backlog for that client.
        const source = inProgress
            ? wlState.nowWorking
            : (dayISO ? (wlState.scheduled.get(dayISO) || []) : wlState.planned);
        const subs = source.filter(s =>
            (s.assigneeId || '') === assigneeId &&
            (s.clientName || '') === clientName
        );

        subs.sort((a, b) => {
            const da = a.dueDate || '9999-12-31';
            const db = b.dueDate || '9999-12-31';
            if (da !== db) return da < db ? -1 : 1;
            return (a.identifier || '').localeCompare(b.identifier || '');
        });

        wlState.popoverAnchor = rollupEl;

        const parentUrl   = (parentId && wlState.parentById.get(parentId)?.url) || subs[0]?.url || '';
        const parentTitle = (parentId && wlState.parentById.get(parentId)?.title) || clientName || '';

        const header = `<div class="workload-popover-head">
            <span class="workload-popover-head-title">${wlEscape(clientName || parentTitle)}</span>
            ${parentUrl ? `<a class="workload-popover-parent" href="${wlEscape(parentUrl)}" target="_blank" rel="noopener noreferrer">Open parent →</a>` : ''}
            <button type="button" class="workload-popover-close" data-wl-popover-close="1" aria-label="Close">×</button>
        </div>`;
        const items = subs.map(s => {
            const dueLabel = s.dueDate ? 'Due ' + wlFormatShort(s.dueDate) : 'No due date';
            return `<a class="workload-popover-item" href="${wlEscape(s.url)}" target="_blank" rel="noopener noreferrer">
                <span class="workload-popover-item-title">${wlEscape(s.title || s.identifier)}</span>
                <span class="workload-popover-item-due">${wlEscape(dueLabel)}</span>
            </a>`;
        }).join('') || '<div class="workload-popover-item" style="color:var(--text-muted);cursor:default;">No upcoming sub-issues.</div>';

        pop.innerHTML = header + items;

        // Position: anchored below the clicked rollup, clamped to viewport.
        const rect = rollupEl.getBoundingClientRect();
        pop.classList.add('open');
        pop.setAttribute('aria-hidden', 'false');
        const popW = Math.min(pop.offsetWidth || 320, 380);
        let left = window.scrollX + rect.left;
        const maxLeft = window.scrollX + window.innerWidth - popW - 10;
        if (left > maxLeft) left = maxLeft;
        if (left < window.scrollX + 10) left = window.scrollX + 10;
        const top = window.scrollY + rect.bottom + 6;
        pop.style.left = left + 'px';
        pop.style.top  = top + 'px';
    }

    function wlClosePopover() {
        const pop = document.getElementById('wlPopover');
        if (!pop) return;
        pop.classList.remove('open');
        pop.setAttribute('aria-hidden', 'true');
        wlState.popoverAnchor = null;
    }

    // ── Content Revision Email modal ─────────────────────────────────────
    let crSelectedClient = '';

    function openRevisionModal() {
        const overlay = document.getElementById('crOverlay');
        if (!overlay) return;
        crSelectedClient = '';
        const input = document.getElementById('crClientInput');
        const btn   = document.getElementById('crSendBtn');
        const status = document.getElementById('crStatus');
        if (input)  { input.value = ''; }
        if (btn)    { btn.disabled = true; btn.textContent = 'Send email'; }
        if (status) { status.textContent = ''; status.className = 'cr-status'; }
        crHideResults();
        overlay.classList.add('open');
        setTimeout(() => input?.focus(), 60);
        // Ensure projects are loaded for autocomplete
        if (!linearProjects.length && !linearProjectsLoading) fetchLinearProjects();
    }

    function closeRevisionModal() {
        document.getElementById('crOverlay')?.classList.remove('open');
        crHideResults();
    }

    function crHideResults() {
        const el = document.getElementById('crResults');
        if (el) { el.style.display = 'none'; el.innerHTML = ''; }
    }

    function crOnInput() {
        const q = (document.getElementById('crClientInput')?.value || '').trim().toLowerCase();
        crSelectedClient = '';
        document.getElementById('crSendBtn').disabled = true;

        if (!q) { crHideResults(); return; }

        const names = linearProjects.length
            ? linearProjects
            : [...new Set((wlState.allActiveSubs || []).map(s => s.clientName).filter(Boolean))].sort();

        const starts   = names.filter(n => n.toLowerCase().startsWith(q));
        const contains = names.filter(n => !n.toLowerCase().startsWith(q) && n.toLowerCase().includes(q));
        const matches  = [...starts, ...contains].slice(0, 8);

        const el = document.getElementById('crResults');
        if (!el) return;
        if (!matches.length) { crHideResults(); return; }
        el.innerHTML = matches.map(name =>
            `<button type="button" class="cr-result-item" data-client="${wlEscape(name)}" onclick="crSelectClient(this.dataset.client)">${wlEscape(name)}</button>`
        ).join('');
        el.style.display = 'block';
    }

    function crOnKey(e) {
        const el = document.getElementById('crResults');
        if (!el || el.style.display === 'none') return;
        const items = el.querySelectorAll('.cr-result-item');
        const active = el.querySelector('.cr-result-item.active');
        let idx = [...items].indexOf(active);
        if (e.key === 'ArrowDown')  { e.preventDefault(); idx = Math.min(idx + 1, items.length - 1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); idx = Math.max(idx - 1, 0); }
        else if (e.key === 'Enter' && active) { e.preventDefault(); active.click(); return; }
        else if (e.key === 'Escape') { closeRevisionModal(); return; }
        else return;
        items.forEach((it, i) => it.classList.toggle('active', i === idx));
    }

    function crSelectClient(name) {
        crSelectedClient = name;
        const input = document.getElementById('crClientInput');
        const btn   = document.getElementById('crSendBtn');
        if (input) input.value = name;
        if (btn)   btn.disabled = false;
        crHideResults();
        input?.focus();
    }

    async function crSend() {
        if (!crSelectedClient) return;
        const btn    = document.getElementById('crSendBtn');
        const status = document.getElementById('crStatus');
        btn.disabled = true;
        btn.textContent = 'Sending…';
        status.textContent = '';
        status.className = 'cr-status';
        try {
            await fetch(CONTENT_REVISION_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: crSelectedClient })
            });
            status.textContent = `✓ Email sent to ${crSelectedClient}`;
            status.className = 'cr-status success';
            btn.textContent = 'Send email';
            // Reset for another send without closing
            crSelectedClient = '';
            document.getElementById('crClientInput').value = '';
            btn.disabled = true;
        } catch (err) {
            status.textContent = 'Failed to send — check your connection and try again.';
            status.className = 'cr-status error';
            btn.disabled = false;
            btn.textContent = 'Send email';
        }
    }

    function onLinearSearchKey(e) {
        if (e.key === 'Escape') {
            const box = document.getElementById('linearSearchDropdown');
            const ghost = document.getElementById('linearSearchGhost');
            if (box) box.classList.remove('open');
            if (ghost) ghost.innerHTML = '';
            document.getElementById('linearClientSearch')?.blur();

        if (e.key !== 'Enter') return;
        const q = document.getElementById('linearClientSearch')?.value.trim();
        if (!q) return;
        const names = linearProjects;
        const starts = names.filter(n => n.toLowerCase().startsWith(q.toLowerCase()));
        const contains = names.filter(n => !n.toLowerCase().startsWith(q.toLowerCase()) && n.toLowerCase().includes(q.toLowerCase()));
        const first = [...starts, ...contains][0];
        if (first) selectLinearProject(first);

    function openLinearSearchDropdown() {
        const box = document.getElementById('linearSearchDropdown');
        if (!box || box.classList.contains('open')) return;
        box.classList.add('open');
        const close = (e) => {
            const wrap = document.getElementById('linearSearchWrap');
            if (wrap && !wrap.contains(e.target)) { box.classList.remove('open'); document.removeEventListener('click', close); }
        };
        setTimeout(() => document.addEventListener('click', close), 0);
    }

    function updateLinearSearchGhost(q) {
        const ghost = document.getElementById('linearSearchGhost');
        if (!ghost) return;
        const q2 = q.trim().toLowerCase();
        if (!q2) { ghost.innerHTML = ''; return; }
        const names = linearProjects;
        const starts = names.filter(n => n.toLowerCase().startsWith(q2));
        const contains = names.filter(n => !n.toLowerCase().startsWith(q2) && n.toLowerCase().includes(q2));
        const first = [...starts, ...contains][0];
        if (!first) { ghost.innerHTML = ''; return; }
        if (first.toLowerCase().startsWith(q2)) {
            const typed = first.slice(0, q.length);
            const rest = first.slice(q.length);
            ghost.innerHTML = `<span style="color:transparent;white-space:pre">${typed}</span><span style="color:var(--text-muted);opacity:0.55;white-space:pre">${rest}</span><span style="margin-left:8px;font-size:0.65rem;color:var(--text-muted);opacity:0.4;background:var(--border);border-radius:3px;padding:1px 5px;flex-shrink:0;">↵</span>`;
        } else {
            ghost.innerHTML = `<span style="color:transparent;white-space:pre">${q}</span><span style="margin-left:8px;font-size:0.65rem;color:var(--text-muted);opacity:0.4;background:var(--border);border-radius:3px;padding:1px 5px;flex-shrink:0;">↵ ${first}</span>`;
        }
    }

    function renderLinearSearchResults(q) {
        const el = document.getElementById('linearSearchResults');
        if (!el) return;
        if (linearProjectsLoading) { el.innerHTML = '<div class="linear-search-loading">Loading clients…</div>'; return; }
        if (!linearProjects.length) { el.innerHTML = '<div class="linear-search-empty">No projects loaded</div>'; return; }
        const q2 = q.trim().toLowerCase();
        if (!q2) {
            el.innerHTML = linearProjects.slice(0, 8).map(name =>
                `<div class="linear-search-suggestion" onclick="selectLinearProject('${name.replace(/'/g, "\\'")}')"><span>${name}</span></div>`
            ).join('');
            return;
        }
        const starts = linearProjects.filter(n => n.toLowerCase().startsWith(q2));
        const contains = linearProjects.filter(n => !n.toLowerCase().startsWith(q2) && n.toLowerCase().includes(q2));
        const matches = [...starts, ...contains];
        if (!matches.length) { el.innerHTML = '<div class="linear-search-empty">No projects found</div>'; return; }
        el.innerHTML = matches.slice(0, 6).map(name =>
            `<div class="linear-search-suggestion" onclick="selectLinearProject('${name.replace(/'/g, "\\'")}')"><span>${highlightMatch(name, q.trim())}</span></div>`
        ).join('');
    }

    function closeEditorDropdown() {
        const dd = document.getElementById('editorSearchDropdown');
        const ghost = document.getElementById('editorSearchGhost');
        if (dd) dd.classList.remove('open');
        if (ghost) ghost.innerHTML = '';
    }

    function updateEditorSearchGhost(q) {
        const ghost = document.getElementById('editorSearchGhost');
        if (!ghost) return;
        const q2 = q.trim().toLowerCase();
        if (!q2) { ghost.innerHTML = ''; return; }
        const names = videoEditors.map(e => e.video_editor);
        const starts = names.filter(n => n.toLowerCase().startsWith(q2));
        const contains = names.filter(n => !n.toLowerCase().startsWith(q2) && n.toLowerCase().includes(q2));
        const first = [...starts, ...contains][0];
        if (!first) { ghost.innerHTML = ''; return; }
        if (first.toLowerCase().startsWith(q2)) {
            const typed = first.slice(0, q.length);
            const rest = first.slice(q.length);
            ghost.innerHTML = `<span style="color:transparent;white-space:pre">${typed}</span><span style="color:var(--text-muted);opacity:0.55;white-space:pre">${rest}</span><span style="margin-left:8px;font-size:0.65rem;color:var(--text-muted);opacity:0.4;background:var(--border);border-radius:3px;padding:1px 5px;flex-shrink:0;">↵</span>`;
        } else {
            ghost.innerHTML = `<span style="color:transparent;white-space:pre">${q}</span><span style="margin-left:8px;font-size:0.65rem;color:var(--text-muted);opacity:0.4;background:var(--border);border-radius:3px;padding:1px 5px;flex-shrink:0;">↵ ${first}</span>`;
        }
    }

    function renderEditorSearchResults(q) {
        const el = document.getElementById('editorSearchResults');
        if (!el) return;
        if (!videoEditors.length) { el.innerHTML = '<div class="linear-search-empty">No editors loaded</div>'; return; }
        const q2 = q.trim().toLowerCase();
        if (!q2) {
            el.innerHTML = videoEditors.map(e =>
                `<div class="editor-search-suggestion" onclick="selectEditor('${e.email.replace(/'/g, "\\'")}', '${e.video_editor.replace(/'/g, "\\'")}')"><span>${e.video_editor}</span></div>`
            ).join('');
            return;
        }
        const starts = videoEditors.filter(e => e.video_editor.toLowerCase().startsWith(q2));
        const contains = videoEditors.filter(e => !e.video_editor.toLowerCase().startsWith(q2) && e.video_editor.toLowerCase().includes(q2));
        const matches = [...starts, ...contains];
        if (!matches.length) { el.innerHTML = '<div class="linear-search-empty">No editors found</div>'; return; }
        el.innerHTML = matches.map(e =>
            `<div class="editor-search-suggestion" onclick="selectEditor('${e.email.replace(/'/g, "\\'")}', '${e.video_editor.replace(/'/g, "\\'")}')"><span>${highlightMatch(e.video_editor, q.trim())}</span></div>`
        ).join('');
    }

    function selectEditor(email, name) {
        const inp = document.getElementById('linearEditorSearch');
        const hidden = document.getElementById('linearEditor');
        if (inp) inp.value = name;
        if (hidden) hidden.value = email;
        closeEditorDropdown();
        saveLinearForm();
    }

    // Close editor dropdown on outside click
    document.addEventListener('click', function(e) {
        const wrap = document.getElementById('editorSearchWrap');
        if (wrap && !wrap.contains(e.target)) closeEditorDropdown();
    });

    function buildLinearTitle() {
        const client = document.getElementById('linearClientSearch')?.value || '';
        if (!client) return '';
        // Date is always today — the issue is always tagged with its creation date.
        const d = new Date();
        const formatted = d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        return `${client} · ${formatted}`;
    }

    function updateLinearTitle() {
        const el = document.getElementById('linearTitleDisplay');
        if (!el) return;
        const t = buildLinearTitle();
        el.textContent = t || 'Select a client…';
        el.classList.toggle('empty', !t);
        saveLinearForm();
    }

    function saveLinearForm() {
        const cards = document.querySelectorAll('[id^="videoCard_"]');
        const f = {
            client: document.getElementById('linearClientSearch')?.value || '',
            editor: document.getElementById('linearEditor')?.value || '',
            editorName: document.getElementById('linearEditorSearch')?.value || '',
            filmingPlans: document.getElementById('linearFilmingPlans')?.value || '',
            generalDrive: document.getElementById('linearGeneralDrive')?.value || '',
            notes: document.getElementById('linearNotes')?.value || '',
            videos: []
        };
        cards.forEach(card => {
            const num = card.id.replace('videoCard_', '');
            f.videos.push({
                main_cam: document.getElementById('vid_main_' + num)?.value || '',
                side_cam: document.getElementById('vid_side_' + num)?.value || '',
                audio: document.getElementById('vid_audio_' + num)?.value || ''
            });
        });
        localStorage.setItem(LINEAR_FORM_KEY, JSON.stringify(f));
    }

    function loadLinearForm() {
        try { return JSON.parse(localStorage.getItem(LINEAR_FORM_KEY) || '{}'); } catch { return {}; }
    }

    function navTo(page, push = true) {
        if (page === 'brief') page = 'home';
        currentNav = page;
        localStorage.setItem(NAV_KEY, page);
        document.getElementById('navHome').classList.toggle('active', page === 'home');
        document.getElementById('navLinear').classList.toggle('active', page === 'linear');
        const navWl = document.getElementById('navWorkload');
        if (navWl) navWl.classList.toggle('active', page === 'workload');


        const state = {nav: page, client: null};
        const url = location.pathname + location.search.replace(/#.*$/, '') + (page !== 'home' ? '#' + page : '');
        if (push) history.pushState(state, '', url);
        else history.replaceState(state, '', url);

        const pageTop = document.getElementById('pageTop');
        const content = document.getElementById('content');

        if (page === 'linear') {
            pageTop.style.display = 'none';
            content.innerHTML = renderLinearView();
            if (!linearProjects.length && !linearProjectsLoading) fetchLinearProjects();
            window.scrollTo({ top: 0, behavior: 'instant' });
        } else if (page === 'workload') {
            pageTop.style.display = 'none';
            content.innerHTML = renderWorkloadShell();
            initWorkloadView();
            window.scrollTo({ top: 0, behavior: 'instant' });
        } else {
            pageTop.style.display = '';
            render('all');
        }
    }

    function renderLinearView() {

        const savedClient = saved.client || '';
        const savedEditor = saved.editor || '';
        const savedFilmingPlans = saved.filmingPlans || '';
        const savedGeneralDrive = saved.generalDrive || '';

        // Restore video count from saved data
        const savedVideoCount = saved.videos?.length || LINEAR_DEFAULT_VIDEO_COUNT;
        linearVideoCount = Math.max(savedVideoCount, 1);

        let videoCards = '';
        for (let i = 1; i <= linearVideoCount; i++) {
            const v = saved.videos?.[i - 1] || {};
            videoCards += renderVideoCard(i, v);
        }

        let titleDisplay = 'Select a client…';
        if (savedClient) {
            const d = new Date();
            titleDisplay = `${savedClient} · ${d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}`;

        const successBanner = linearJustCreated ? `<div class="linear-success-banner" id="linearSuccessBanner">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8L6 12L14 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Issue created in Linear!
        </div>` : '';

        const savedEditorName = savedEditor ? (videoEditors.find(e => e.email === savedEditor)?.video_editor || saved.editorName || '') : (saved.editorName || '');

        return `<div class="linear-view">
            ${successBanner}
            <div class="linear-form-title">Create Linear Issue</div>
            <div class="linear-form-sub">Submit a video production task to Linear</div>
            <div class="linear-form">
                <div class="linear-field">
                    <label class="linear-label">Client</label>
                    <div class="linear-search-wrap" id="linearSearchWrap">
                        <div class="linear-search-pill">
                            <input class="linear-search-input" id="linearClientSearch" type="text"
                                placeholder="Search clients…"
                                value="${savedClient.replace(/"/g, '&quot;')}"
                                oninput="onLinearSearchInput()" onkeydown="onLinearSearchKey(event)"
                                onfocus="onLinearSearchFocus()" autocomplete="off">
                            <div class="linear-search-ghost" id="linearSearchGhost"></div>
                        </div>
                        <div class="linear-search-dropdown" id="linearSearchDropdown">
                            <div id="linearSearchResults"></div>
                        </div>
                    </div>
                </div>
                <div class="linear-field">
                    <label class="linear-label">Video Editor</label>
                    <div class="editor-search-wrap" id="editorSearchWrap">
                        <div class="editor-search-pill">
                            <input class="editor-search-input" id="linearEditorSearch" type="text"
                                placeholder="Search editors…"
                                value="${savedEditorName.replace(/"/g, '&quot;')}"
                                oninput="onEditorSearchInput()" onkeydown="onEditorSearchKey(event)"
                                onfocus="onEditorSearchFocus()" autocomplete="off">
                            <div class="editor-search-ghost" id="editorSearchGhost"></div>
                        </div>
                        <div class="editor-search-dropdown" id="editorSearchDropdown">
                            <div id="editorSearchResults"></div>
                        </div>
                    </div>

                </div>

                    <label class="linear-label">Title</label>
                    <div class="linear-title-display ${savedClient ? '' : 'empty'}" id="linearTitleDisplay">${titleDisplay}</div>
                </div>
                <div class="linear-field">
                    <label class="linear-label">Filming Plans</label>
                    <input class="linear-input" id="linearFilmingPlans" type="url" placeholder="Filming plans link…" value="${savedFilmingPlans.replace(/"/g, '&quot;')}" oninput="saveLinearForm()">
                </div>
                <div class="linear-field">
                    <label class="linear-label">General Drive</label>

                </div>
                <div class="linear-field">
                    <label class="linear-label">Notes</label>
                    <textarea class="linear-textarea" id="linearNotes" placeholder="Additional notes…" oninput="saveLinearForm()">${saved.notes || ''}</textarea>

                    </button>
