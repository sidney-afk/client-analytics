    }

        function renderVideoCard(num, data) {
        data = data || {};
        return `<div class="linear-video-card" id="videoCard_${num}">
            <div class="linear-video-header">
                <span class="linear-video-num">Video ${num}</span>
                <button class="linear-video-remove" onclick="removeLinearVideo(${num})" title="Remove">
                    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><line x1="1" y1="1" x2="9" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="9" y1="1" x2="1" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                </button>
            </div>
            <div class="linear-video-fields">
                <input class="linear-input" id="vid_main_${num}" type="url" placeholder="Main camera link" value="${(data.main_cam || '').replace(/"/g, '&quot;')}"
                    oninput="onVideoLinkInput(this)" onblur="onVideoLinkBlur(this)" onkeydown="onVideoLinkKeydown(event,this)">
                <input class="linear-input" id="vid_side_${num}" type="url" placeholder="Side camera link" value="${(data.side_cam || '').replace(/"/g, '&quot;')}"
                    oninput="onVideoLinkInput(this)" onblur="onVideoLinkBlur(this)" onkeydown="onVideoLinkKeydown(event,this)">
                <input class="linear-input" id="vid_audio_${num}" type="url" placeholder="Audio link" value="${(data.audio || '').replace(/"/g, '&quot;')}"
                    oninput="onVideoLinkInput(this)" onblur="onVideoLinkBlur(this)" onkeydown="onVideoLinkKeydown(event,this)">
            </div>
            <span class="video-link-hint">⇧ Shift — paste last link</span>
        </div>`;
    }

    function removeLinearVideo(num) {
        const cards = document.querySelectorAll('[id^="videoCard_"]');
        if (cards.length <= 1) return; // Keep at least 1 video
        const card = document.getElementById('videoCard_' + num);
        if (!card) return;
        card.remove();
        renumberVideoCards();
        linearVideoCount = document.querySelectorAll('[id^="videoCard_"]').length;
        saveLinearForm();
    }

    function renumberVideoCards() {
        const cards = document.querySelectorAll('[id^="videoCard_"]');
        cards.forEach((card, idx) => {
            const newNum = idx + 1;
            const oldNum = card.id.replace('videoCard_', '');
            card.id = 'videoCard_' + newNum;
            card.querySelector('.linear-video-num').textContent = 'Video ' + newNum;
            card.querySelector('.linear-video-remove').setAttribute('onclick', 'removeLinearVideo(' + newNum + ')');
            // Rename input IDs
            const main = card.querySelector('[id^="vid_main_"]');
            const side = card.querySelector('[id^="vid_side_"]');
            const audio = card.querySelector('[id^="vid_audio_"]');
            if (main) main.id = 'vid_main_' + newNum;
            if (side) side.id = 'vid_side_' + newNum;
            if (audio) audio.id = 'vid_audio_' + newNum;
        });
    }

    function addLinearVideo() {
        const container = document.getElementById('linearVideos');
        if (!container) return;
        linearVideoCount++;
        const html = renderVideoCard(linearVideoCount, {});
        container.insertAdjacentHTML('beforeend', html);
        saveLinearForm();
    }

    function onVideoLinkInput(el) {
        if (el.value.trim()) saveLastLink(el.value.trim());
        saveLinearForm();
    }

    function onVideoLinkBlur(el) {
        if (el.value.trim()) saveLastLink(el.value.trim());
    }

    function onVideoLinkKeydown(e, el) {
        if (e.key === 'Shift') {
            const last = getLastLink();
            if (last) {
                e.preventDefault();
                el.value = last;
                saveLastLink(last);
                saveLinearForm();
            }
        }
    }

    async function submitLinearForm(mode) {
        const client = document.getElementById('linearClientSearch')?.value?.trim();
        const title = buildLinearTitle();
        const notes = document.getElementById('linearNotes')?.value?.trim();
        const filmingPlans = document.getElementById('linearFilmingPlans')?.value?.trim() || '';
        const generalDrive = document.getElementById('linearGeneralDrive')?.value?.trim() || '';

        if (!client) { document.getElementById('linearStatus').textContent = 'Please select a client.'; return; }

        const cards = document.querySelectorAll('[id^="videoCard_"]');
        const videos = [];
        let num = 1;
        // Auto-assign due dates in batches of 5: videos 1–5 due in 5 working
        // days, 6–10 in 10 working days, 11–15 in 15 working days, etc. Uses
        // working days (Mon–Fri) so the dates align with the Workload
        // scheduler's calendar.
        const todayISO = wlTodayISO();
        cards.forEach(card => {
            const id = card.id.replace('videoCard_', '');
            const batchIndex = Math.floor((num - 1) / 5); // 0 for #1-5, 1 for #6-10, …
            const dueDate = wlAddWorkingDays(todayISO, (batchIndex + 1) * 5);
            videos.push({
                number: num++,
                main_cam: document.getElementById('vid_main_' + id)?.value?.trim() || '',
                side_cam: document.getElementById('vid_side_' + id)?.value?.trim() || '',
                audio: document.getElementById('vid_audio_' + id)?.value?.trim() || '',
                dueDate
            });
        });

        const allBtns = ['linearSubmitBtnVideo', 'linearSubmitBtnThumbnail', 'linearSubmitBtnBoth'].map(id => document.getElementById(id));
        const status = document.getElementById('linearStatus');
        allBtns.forEach(b => { if (b) b.disabled = true; });
        const activeBtn = document.getElementById(mode === 'video' ? 'linearSubmitBtnVideo' : mode === 'thumbnail' ? 'linearSubmitBtnThumbnail' : 'linearSubmitBtnBoth');
        if (activeBtn) activeBtn.textContent = 'Submitting…';
        status.textContent = '';

        // Build description: prepend links before notes
        let descParts = [];
        if (filmingPlans) descParts.push('Filming Plan: ' + filmingPlans);
        if (generalDrive) descParts.push('General Drive: ' + generalDrive);
        if (descParts.length && notes) descParts.push('');  // blank line before notes
        if (notes) descParts.push(notes);
        const description = descParts.join('\n');

        const payload = { clientName: client, title, notes: description, videos, filmingPlans };

        // Log submission to fallback Google Sheet (fire-and-forget)
        const targetWebhook = (mode === 'thumbnail') ? GRAPHIC_FORM_WEBHOOK : VIDEO_FORM_WEBHOOK;
        const webhookJson = JSON.stringify([{
            headers: { 'content-type': 'application/json' },
            params: {},
            query: {},
            body: payload,
            webhookUrl: targetWebhook,
            executionMode: 'production'
        }]);

        fetch(LOG_SUBMISSION_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                timestamp: new Date().toISOString(),
                clientName: client,
                mode: mode,
                webhookJson: webhookJson
            })
        }).catch(() => {});

        // Fire the relevant webhook(s) — fire-and-forget (CORS may block response reading)
        const sendOptions = {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        };
        if (mode === 'video' || mode === 'both') fetch(VIDEO_FORM_WEBHOOK, sendOptions).catch(() => {});
        if (mode === 'thumbnail' || mode === 'both') fetch(GRAPHIC_FORM_WEBHOOK, sendOptions).catch(() => {});

        localStorage.removeItem(LINEAR_FORM_KEY);
        localStorage.removeItem(LAST_LINK_KEY);
        linearJustCreated = true;
        navTo('linear');
    }



        async function init(){
        try{
            await fetchAll();
            // Resume polling for any pending briefs (persists across page refresh)
            Object.entries(pendingBriefs).forEach(([key,{triggerISO,type}])=>{
                const triggerTime=new Date(triggerISO);
                // Extract client name from key (format: "ClientName__type")
                const sep=key.lastIndexOf('__');
                const clientName=sep>-1?key.substring(0,sep):key;
                const briefType=type||(sep>-1?key.substring(sep+2):'comp');
                const briefList=briefType==='mr'?mrBriefs:briefs;
                const alreadyDone=briefList.find(b=>b.client_name===clientName&&b.raw_json&&new Date(b.id)>triggerTime);
                if(alreadyDone){delete pendingBriefs[key];try{localStorage.setItem('syncview_pendingBriefs_v1',JSON.stringify(pendingBriefs));}catch{}return;}
                briefPollingState[key]={loading:true,triggerTime,intervalId:null,lastChecked:null};
                startBriefPolling(clientName,triggerTime,briefType);
            });
            // Auto-refresh any content summaries that have new scrape data (non-blocking)
            autoRefreshStaleSummaries();
            // Load shared client templates from the Apps Script backend (non-blocking).
            loadTemplates();
            const dates=allData.map(r=>r.date).filter(Boolean).sort().reverse();
            if(dates[0])document.getElementById('lastUpdated').textContent=`Updated ${fmtDate(dates[0])}`;
            const clientNames=[...new Set(allData.map(r=>r.client_name))];
            const qParam=new URLSearchParams(location.search).get('c');
            const clientFromQuery=qParam?decodeURIComponent(qParam):null;
            if(clientFromQuery&&clientNames.includes(clientFromQuery)){
                document.getElementById('selectorWrap').style.display='none';
                document.getElementById('pageSub').style.display='none';
                document.getElementById('pageTitle').textContent='Your Analytics';
                document.querySelector('header.header').style.display='none';
                render(clientFromQuery,true);return;
            }
            const savedNav=localStorage.getItem(NAV_KEY);
            const hash=decodeURIComponent(location.hash.replace('#',''));
            renderPins();
            // On page refresh, restore exact state from history.state
            if(history.state&&history.state.client&&clientNames.includes(history.state.client)){
                const s=history.state,c=s.client;
                const tab=s.clientTab||'analytics';
                clientViewTab[c]=tab;
                if(s.briefSection)activeBriefSection[c]=s.briefSection;
                if(s.briefTab)activeBriefTab[c]=s.briefTab;
                if(s.mrBriefTab)activeMRBriefTab[c]=s.mrBriefTab;
                render(c,false);return;
            }
            if(hash==='linear'){navTo(hash,false);return;}
            if(hash==='workload'){navTo(hash,false);return;}
            if(hash==='calendar'){navTo(hash,false);return;}
            if(hash==='samples'){navTo(hash,false);return;}
            if(hash==='templates'){navTo(hash,false);return;}
            if(hash.startsWith('templates/')){const tn=hash.slice('templates/'.length);if(clientNames.includes(tn)){_templatesSelected=tn;navTo('templates',false);return;}}
            if(hash&&clientNames.includes(hash)){render(hash,false);return;}
            // Only restore savedNav on page refresh (history.state exists), not new tabs
            if(history.state&&history.state.nav&&(savedNav==='linear'||savedNav==='workload'||savedNav==='calendar'||savedNav==='samples'||savedNav==='templates')){navTo(savedNav,false);return;}
            navTo('home',false);
        }catch(err){
            document.getElementById('content').innerHTML=`<div class="error-state">Could not load data. Make sure the Google Sheet is set to "Anyone with the link can view".<br><br><small style="color:#aaa">${err.message}</small></div>`;
        }
    }

    const _AUTH_KEY='syncview_auth_v1';
    function submitPassword(){
        const v=document.getElementById('passwordInput').value;
        if(v==='synchrosocial2026'){
            localStorage.setItem(_AUTH_KEY,'ok');
            document.getElementById('passwordOverlay').style.display='none';
            init();
        } else {
            document.getElementById('passwordError').style.display='block';
            document.getElementById('passwordInput').value='';
            document.getElementById('passwordInput').style.borderColor='#dc2626';
            setTimeout(()=>document.getElementById('passwordInput').style.borderColor='#e0e0de',1500);
        }
    }
    const _isClientLink=!!new URLSearchParams(location.search).get('c');
    if(_isClientLink||localStorage.getItem(_AUTH_KEY)==='ok'){
        if(_isClientLink){
            // Client share link: hide all admin chrome immediately, show clean loader
            document.querySelector('header.header').style.display='none';
            document.getElementById('pageTop').style.display='none';
            document.getElementById('content').innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:16px;">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none" style="animation:spin 0.9s linear infinite;flex-shrink:0;opacity:0.35"><circle cx="14" cy="14" r="11" stroke="#111" stroke-width="2.5" stroke-dasharray="50 20"/></svg>
                <span style="font-family:'Plus Jakarta Sans',sans-serif;font-size:0.88rem;color:#aaa;font-weight:500;">Loading your analytics…</span>
            </div>`;
        }
        init();
    } else {
        document.getElementById('passwordOverlay').style.display='flex';
        setTimeout(()=>document.getElementById('passwordInput').focus(),50);
    }
</script>
