    function gainsBar(today,prev,weekRow,igWeekViews,ttWeekViews,forcePeriod,clientName){
        function chip(label,value,delta){const numFmt=fmt(value);const numHtml=numFmt?`<span class="gain-chip-num">${numFmt}</span>`:`<span class="gain-chip-num empty">—</span>`;let deltaHtml='';if(delta!==null&&delta!==undefined){const d=n(delta);if(d>0)deltaHtml=`<span class="gain-delta up">↑ +${fmt(d)||d.toLocaleString()}</span>`;else if(d<0)deltaHtml=`<span class="gain-delta down">↓ ${fmt(d)||d.toLocaleString()}</span>`;else deltaHtml=`<span class="gain-delta flat">±0</span>`;}return`<div class="gain-chip"><span class="gain-chip-label">${label}</span><div class="gain-chip-val">${numHtml}${deltaHtml}</div></div>`;}
        function chipDiff(label,diffVal){if(diffVal===null||diffVal===undefined)return'';const d=n(diffVal);let deltaHtml='';if(d>0)deltaHtml=`<span class="gain-delta up">+${fmt(d)||d.toLocaleString()}</span>`;else if(d<0)deltaHtml=`<span class="gain-delta down">${fmt(d)||d.toLocaleString()}</span>`;else deltaHtml=`<span class="gain-delta flat">±0</span>`;return`<div class="gain-chip"><span class="gain-chip-label">${label}</span><div class="gain-chip-val">${deltaHtml}</div></div>`;}
        function chipDeltaOnly(label,diff){let deltaHtml='';if(diff===null||diff===undefined){deltaHtml=`<span class="gain-chip-num empty">—</span>`;}else{const d=n(diff);if(d>0)deltaHtml=`<span class="gain-delta up">+${fmt(d)||d.toLocaleString()}</span>`;else if(d<0)deltaHtml=`<span class="gain-delta down">${fmt(d)||d.toLocaleString()}</span>`;else deltaHtml=`<span class="gain-delta flat">±0</span>`;}return`<div class="gain-chip"><span class="gain-chip-label">${label}</span><div class="gain-chip-val">${deltaHtml}</div></div>`;}
        const hasIG=n(today.ig_followers)||n(today.ig_views_this_month);
        const hasTT=n(today.tiktok_followers)||n(today.tiktok_plays_this_month);
        const hasYT=n(today.yt_subscribers)||n(today.yt_total_views);
        const activePeriod=forcePeriod||gainPeriod;
        const dRow=activePeriod==='week'?weekRow:prev;
        const igFolDiff=dRow?n(today.ig_followers)-n(dRow.ig_followers):null;
        const ttFolDiff=dRow?n(today.tiktok_followers)-n(dRow.tiktok_followers):null;
        const ytSubDiff=dRow?n(today.yt_subscribers)-n(dRow.yt_subscribers):null;
        const ytViewDiff=dRow?n(today.yt_total_views)-n(dRow.yt_total_views):null;
        // Day mode: use the direct gained_today field from the sheet
        // Week mode: use _safeWeekViewDelta to handle month-boundary resets
        const igViewsGain=activePeriod==='week'?_safeWeekViewDelta(today,dRow,clientName,'ig_views_this_month','ig_views_gained_today'):(n(today.ig_views_gained_today)||null);
        const ttViewsGain=activePeriod==='week'?_safeWeekViewDelta(today,dRow,clientName,'tiktok_plays_this_month','tiktok_plays_gained_today'):(n(today.tiktok_plays_gained_today)||null);
        const periodLabel=activePeriod==='week'?"This Week's":"Today's";
        let cards='';
        if(hasIG)cards+=`<div class="gains-platform-card gp-ig"><div class="gains-platform-header"><div class="gains-platform-dot"></div><span class="gains-platform-name">Instagram</span></div><div class="gains-metrics-row">${chipDeltaOnly('Followers',igFolDiff)}${chipDiff('Views',igViewsGain)}</div></div>`;
        if(hasTT)cards+=`<div class="gains-platform-card gp-tt"><div class="gains-platform-header"><div class="gains-platform-dot"></div><span class="gains-platform-name">TikTok</span></div><div class="gains-metrics-row">${chipDeltaOnly('Followers',ttFolDiff)}${chipDiff('Views',ttViewsGain)}</div></div>`;
        if(hasYT)cards+=`<div class="gains-platform-card gp-yt"><div class="gains-platform-header"><div class="gains-platform-dot"></div><span class="gains-platform-name">YouTube</span></div><div class="gains-metrics-row">${chipDeltaOnly('Subscribers',ytSubDiff)}${chipDeltaOnly('Total Views',ytViewDiff)}</div></div>`;
        const note=dRow?'':`<span class="gains-no-data-note">Gains show after ${activePeriod==='week'?'7+':'2+'} days</span>`;
        return`<div class="gains-bar"><span class="gains-bar-label">${periodLabel}<br>Gains</span>${cards}${note}</div>`;
    }

    // Returns top N monthly videos across all platforms, sorted by views desc, deduped by URL
    function getTopMonthlyVideos(clientName,topN=5){
        const all=[];
        for(const plat of['instagram','tiktok','youtube'])all.push(...getTopVideos(clientName,plat,'month'));
        const seen=new Set();
        const deduped=[];
        for(const v of all){
            const key=(v.video_url&&v.video_url!=='#'&&v.video_url!=='')?v.video_url:(v.caption||'').substring(0,80);
            if(!seen.has(key)){seen.add(key);deduped.push(v);}
        }
        return deduped.sort((a,b)=>n(b.views)-n(a.views)).slice(0,topN);
    }

    async function generateContentSummary(clientName){
        const videos=getTopMonthlyVideos(clientName,5);
        if(!videos.length){alert('No top monthly videos found for this client.');return;}
        contentSummaryState[clientName]={loading:true,data:null,error:null};
        try{localStorage.setItem('syncview_contentSummaryState_v1',JSON.stringify(contentSummaryState));}catch{}
        refreshContentSummary(clientName);
        const payload={
            clientName,
            contentDescription:clientMap[clientName]?.content_description||'',
            videos:videos.map((v,i)=>({rank:i+1,platform:v.platform,url:v.video_url||'',caption:v.caption||'',views:n(v.views),likes:n(v.likes),comments:n(v.comments)}))
        };
        try{
            const controller=new AbortController();const _csto=setTimeout(()=>controller.abort(),180000);
            const resp=await fetch(CONTENT_SUMMARY_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),signal:controller.signal});clearTimeout(_csto);
            const text=await resp.text();
            if(!text)throw new Error('Empty response from webhook');
            let result=JSON.parse(text);
            if(Array.isArray(result)&&result[0])result=result[0];
            if(result.json)result=result.json;
            if(typeof result==='string'){try{result=JSON.parse(result);}catch{}}
            // Handle raw Claude API response format: { content: [{type:"text", text:"..."}] }
            if(!result.bullets&&result.content&&Array.isArray(result.content)&&result.content[0]?.text){
                result={bullets:result.content[0].text};
            }
            const bullets=result.bullets||result.summary||result;
            contentSummaryState[clientName]={loading:false,data:{bullets:typeof bullets==='string'?bullets:JSON.stringify(bullets),date:new Date().toISOString().split('T')[0]},error:null};
        }catch(e){
            console.error('[SyncView] Content summary error for',clientName,':',e);
            contentSummaryState[clientName]={loading:false,data:null,error:'Failed to generate summary: '+(e.name==='AbortError'?'Request timed out (3 min)':e.message||'Unknown error')};
        }
        try{localStorage.setItem('syncview_contentSummaryState_v1',JSON.stringify(contentSummaryState));}catch{}
        refreshContentSummary(clientName);
    }

    // Per-session guard: clients we've already auto-attempted this page load.
    // Prevents tight loops if the webhook is consistently failing.
    const _autoSummaryAttempted=new Set();

    // Auto-refresh content summaries that are stale, missing, or in an error state.
    // Stale  → previous summary exists but a newer scrape has landed
    // Missing → never generated and there's a previous error from a past session, OR no state at all
    // Error  → last attempt failed (e.g. "Failed to fetch") — retry once per session
    async function autoRefreshStaleSummaries(){
        const clientNames=Object.keys(clientMap);
        const targets=clientNames.filter(name=>{
            const videos=getTopMonthlyVideos(name,5);
            if(!videos.length)return false;
            if(_autoSummaryAttempted.has(name))return false;
            const state=contentSummaryState[name];
            // No state, or previous error → auto-generate so the user sees a loading spinner instead of a Generate/Retry button.
            if(!state||state.error||!state.data)return true;
            // Stale data → re-generate against the newer scrape.
            const summaryDate=state.data.date||'';
            const latestScrape=topVideos.filter(v=>v.client_name===name).reduce((max,v)=>{const d=v.scraped_date||'';return d>max?d:max;},'');
            return latestScrape&&(!summaryDate||summaryDate<latestScrape);
        });
        if(!targets.length){console.log('[SyncView] All content summaries up to date.');return;}
        console.log('[SyncView] Auto-refreshing content summaries for:',targets);
        // Flip any error/missing states to loading immediately so the user sees the spinner while we work through the queue.
        for(const name of targets){
            _autoSummaryAttempted.add(name);
            const s=contentSummaryState[name];
            if(!s||s.error||!s.data){
                contentSummaryState[name]={loading:true,data:null,error:null};
                refreshContentSummary(name);
            }
        }
        for(const name of targets){
            try{await generateContentSummary(name);}catch(e){console.warn('[SyncView] Auto-refresh failed for',name,e);}
        }
        console.log('[SyncView] Auto-refresh complete.');
    }

    function refreshContentSummary(clientName){
        const el=document.getElementById(`content-summary-${clientName.replace(/\s+/g,'_')}`);
        if(!el)return;
        const temp=document.createElement('div');
        temp.innerHTML=buildContentSummarySection(clientName);
        if(temp.firstElementChild)el.replaceWith(temp.firstElementChild);
    }

    function buildContentSummarySection(clientName){
        const id=`content-summary-${clientName.replace(/\s+/g,'_')}`;
        const enc=encodeURIComponent(clientName);
        const state=contentSummaryState[clientName];
        const videos=getTopMonthlyVideos(clientName,5);
        if(!videos.length)return'';
        let inner='';
        if(!state){
            inner=`<button class="cs-generate-btn" onclick="generateContentSummary(decodeURIComponent('${enc}'))">✦ Generate This Month's Performance Summary</button>`;
        }else if(state.loading){
            inner=`<div class="cs-loading"><span class="cs-spinner"></span>Downloading transcripts &amp; analysing what's working… <span style="font-weight:400;opacity:0.7;">(~1-2 min)</span></div>`;
        }else if(state.error){
            inner=`<div class="cs-error">${state.error}</div><button class="cs-generate-btn" onclick="generateContentSummary(decodeURIComponent('${enc}'))">Retry</button>`;
        }else if(state.data){
            const raw=state.data.bullets||'';
            // Render markdown-style bullet points
            const lines=raw.split('\n').filter(l=>l.trim());
            const items=lines.map(l=>{
                const t=l.replace(/^[-•*]\s*/,'').replace(/^\d+\.\s*/,'').trim();
                // Bold **text** and markdown links [label](url)
                const html=t
                    .replace(/\*\*\[(.+?)\]\*\*/g,'<strong>$1</strong>')
                    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
                    .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener" style="color:inherit;text-decoration:underline;font-weight:500;">$1</a>');
                return`<li>${html}</li>`;
            }).join('');
            // Check if summary is up to date vs latest top videos scrape
            const summaryDate=state.data.date||'';
            const latestScrape=topVideos.filter(v=>v.client_name===clientName).reduce((max,v)=>{const d=v.scraped_date||'';return d>max?d:max;},'');
            let statusBadge='';
            if(latestScrape){
                if(summaryDate&&summaryDate>=latestScrape){
                    statusBadge=`<span style="display:inline-flex;align-items:center;gap:4px;font-size:0.65rem;font-weight:600;color:#10b981;opacity:0.85;"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="#10b981" stroke-width="1.3"/><path d="M3.5 6l2 2 3-3.5" stroke="#10b981" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg> Up to date</span>`;
                }else{
                    statusBadge=`<span style="display:inline-flex;align-items:center;gap:4px;font-size:0.65rem;font-weight:600;color:#f59e0b;opacity:0.85;"><svg width="10" height="10" viewBox="0 0 12 12" fill="none"><circle cx="6" cy="6" r="5" stroke="#f59e0b" stroke-width="1.3"/><path d="M6 3.5v3M6 8.5v.01" stroke="#f59e0b" stroke-width="1.3" stroke-linecap="round"/></svg> New data available · <a href="#" onclick="event.preventDefault();generateContentSummary(decodeURIComponent('${enc}'))" style="color:#f59e0b;text-decoration:underline;font-weight:600;">Update</a></span>`;
                }
            }
            inner=`<ul class="cs-bullets">${items}</ul><div style="display:flex;align-items:center;gap:10px;margin-top:6px;">${statusBadge}<button class="cs-regen-btn" onclick="generateContentSummary(decodeURIComponent('${enc}'))">↻ Regenerate</button></div>`;
        }
        return`<div class="content-summary-section" id="${id}"><div class="cs-header"><span class="cs-title">✦ What's Working This Month</span><span class="cs-subtitle">Based on top ${videos.length} video${videos.length!==1?'s':''} by views</span></div>${inner}</div>`;
    }

    function buildTopVideosSection(clientName,platform,containerId){
        const period=getActivePeriod(clientName,platform),videos=getTopVideos(clientName,platform,period);
        const weekActive=period==='week'?'active':'',monthActive=period==='month'?'active':'';
        const wv=getTopVideos(clientName,platform,'week'),mv=getTopVideos(clientName,platform,'month');
        if(!wv.length&&!mv.length)return'';
        const showShares=platform.toLowerCase()==='tiktok',isIG=platform.toLowerCase()==='instagram';
        let cardsHtml=videos.length?`<div class="video-cards-scroll">${videos.map((v,i)=>buildVideoCard(v,showShares,isIG,i+1)).join('')}</div>`:`<div class="top-videos-empty">No top videos for this period yet</div>`;
        return`<div class="top-videos-section" id="${containerId}"><div class="top-videos-head"><div style="display:flex;align-items:center;gap:10px;"><span class="top-videos-title">Top Performing</span><div class="period-toggle"><button class="period-btn ${weekActive}" onclick="switchPeriod('${clientName}','${platform}','week','${containerId}')">Week</button><button class="period-btn ${monthActive}" onclick="switchPeriod('${clientName}','${platform}','month','${containerId}')">Month</button></div></div></div>${cardsHtml}</div>`;
    }

    function truncateCaption(caption){if(!caption)return'';const sentences=caption.match(/[^.!?]+[.!?]+/g)||[caption];let result='';for(let i=0;i<Math.min(2,sentences.length);i++){if((result+sentences[i]).length>130&&result.length>0)break;result+=sentences[i];}return result.trim()||caption.substring(0,120);}
    const captionStore={};

    function buildVideoCard(v,showShares,isIG,rank){
        const caption=v.caption||'',truncated=truncateCaption(caption),needsReadMore=caption.length>truncated.length+5;
        const uid='tc_'+Math.random().toString(36).substring(2,9);
        captionStore[uid]={full:caption,short:truncated};

    async function sendWeeklySlackUpdate(clientName){
        const btn=document.querySelector(`[data-slack-btn="${clientName}"]`);
        if(btn){btn.disabled=true;btn.textContent='Sending...';}
        try{
            const info=clientMap[clientName]||{};
            const channelId=info.slack_channel_id||'';
            if(!channelId){showNotify('No Slack channel','Add a slack_channel_id column to Clients Info for '+clientName);if(btn){btn.disabled=false;btn.innerHTML=_slackBtnContent;}return;}
            const clientVids=topVideos.filter(v=>v.client_name===clientName&&(v.period||'').toLowerCase().includes('week'));
            const latestDate=clientVids.reduce((max,v)=>{const d=v.scraped_date||'';return d>max?d:max;},'');
            const fresh=latestDate?clientVids.filter(v=>(v.scraped_date||'')===latestDate):clientVids;
            fresh.sort((a,b)=>n(b.views)-n(a.views));
            const top=fresh[0];
            if(!top){showNotify('No videos','No weekly top videos found for '+clientName);if(btn){btn.disabled=false;btn.innerHTML=_slackBtnContent;}return;}
            const resp=await fetch(WEEKLY_SLACK_WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({clientName,slack_channel_id:channelId,content_description:info.content_description||'',platform:top.platform||'instagram',video_url:top.video_url||'',caption:(top.caption||'').substring(0,500),views:n(top.views),likes:n(top.likes),comments:n(top.comments),shares:n(top.shares),scraped_date:latestDate})});
            if(resp.ok)showNotify('Sent!','Slack update sent for '+clientName);
            else showNotify('Error','Slack webhook returned '+resp.status);
        }catch(e){console.error('[SyncView] Slack send error:',e);showNotify('Error','Could not send Slack update. Check webhook.');}
        if(btn){btn.disabled=false;btn.innerHTML=_slackBtnContent;}
    }

    let _templatesEditMode = false;         // false = view mode, true = edit mode
    const _tplSaveTimers = {};              // debounce timers by `${client}::${field}`
    const _tplSaveAbort  = {};              // abort controllers by client
    const _tplDirty      = {};              // pending patches by client {field: value}
    const TPL_RECENT_KEY = 'syncview_tpl_recent_searches';
    const TPL_PINS_KEY   = 'syncview_tpl_pinned_clients';
    const TPL_MAX_PINS   = 5;
    let _tplPinsEditMode = false;
    let _tplPinSelectorOpen = false;

    async function loadTemplates() {
        if (!TEMPLATES_GET_URL) { templatesLoadError = 'not-configured'; _maybeRerenderTemplates(); return; }
        try {
            const resp = await fetch(TEMPLATES_GET_URL + '?_t=' + Date.now(), { method: 'GET' });
            const json = await resp.json();
            if (!json.ok) throw new Error(json.error || 'Unknown error');
            templatesData = json.templates || {};
            templatesLoaded = true;
            templatesLoadError = null;
        } catch (e) {
            console.warn('[SyncView] loadTemplates failed:', e);
            templatesLoadError = e.message || String(e);
        }
        _maybeRerenderTemplates();
    }
    function _maybeRerenderTemplates() {
        if (currentNav !== 'templates') return;
        const content = document.getElementById('content');
        if (!content) return;
        const ae = document.activeElement;
        if (ae && ae.hasAttribute && ae.hasAttribute('data-tpl-field')) return;
        content.innerHTML = renderTemplatesView();
        mountTemplatesView();
    }

    function _tplGet(name, field) {
        return (templatesData[name] && templatesData[name][field]) || '';
    }

    function _setTplStatus(state, message) {
        const el = document.getElementById('tplStatusBadge');
        if (!el) return;
        el.classList.remove('saving','saved','error');
        if (state === 'saving') {
            el.classList.add('saving');
            el.innerHTML = '<span class="dot"></span> Saving…';
        } else if (state === 'saved') {
            el.classList.add('saved');
            el.innerHTML = '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2.5 6l2.5 2.5L9.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg> Saved';
        } else if (state === 'error') {
            el.classList.add('error');
            el.innerHTML = '<span class="dot"></span> ' + (message || 'Save failed — will retry');
        } else {
            el.innerHTML = '';
        }
    }

    async function _tplFlush(name) {
        const patch = _tplDirty[name];
        if (!patch || !Object.keys(patch).length) return;
        if (!TEMPLATES_SAVE_URL) { _setTplStatus('error','Endpoint not configured'); return; }
        delete _tplDirty[name];
        if (_tplSaveAbort[name]) { try { _tplSaveAbort[name].abort(); } catch {} }
        const ctrl = new AbortController();
        _tplSaveAbort[name] = ctrl;
        _setTplStatus('saving');
        try {
            const resp = await fetch(TEMPLATES_SAVE_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ clientName: name, patch }),
                signal: ctrl.signal,
            });
            const json = await resp.json();
            if (!json.ok) throw new Error(json.error || 'Save failed');
            // Merge — never replace. The server only echoes back the fields it just wrote
            // (plus updated_at), so a replace would wipe every other field from local state
            // until the next page reload.
            templatesData[name] = Object.assign({}, templatesData[name] || {}, json.template || {});
            _setTplStatus('saved');
            setTimeout(() => {
                const badge = document.getElementById('tplStatusBadge');
                if (badge && badge.classList.contains('saved')) _setTplStatus('idle');
            }, 2000);
        } catch (e) {
            if (e.name === 'AbortError') return;
            console.warn('[SyncView] template save failed:', e);
            _tplDirty[name] = Object.assign(patch, _tplDirty[name] || {});
            _setTplStatus('error', e.message || 'Save failed — try again');
        }
    }

    function _tplQueueSave(name, field, value, immediate) {
        if (!templatesData[name]) templatesData[name] = { client_name: name };
        templatesData[name][field] = value;
        if (!_tplDirty[name]) _tplDirty[name] = {};
        _tplDirty[name][field] = value;

        const key = name + '::' + field;
        if (_tplSaveTimers[key]) clearTimeout(_tplSaveTimers[key]);
        const delay = immediate ? 0 : 600;
        _tplSaveTimers[key] = setTimeout(() => { delete _tplSaveTimers[key]; _tplFlush(name); }, delay);
        _setTplStatus('saving');
    }

    function _tplEsc(s) { return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function _tplEscAttr(s) { return _tplEsc(s).replace(/'/g,"&#39;"); }

    /* ── Edit-mode field renderers ──────────────────────────────────────── */
    function _tplFieldText(name, field, label, placeholder) {
        const v = _tplGet(name, field);
        return `<div class="tpl-field"><label class="tpl-field-label">${label}</label>
            <input class="tpl-input" type="text" data-tpl-client="${_tplEsc(name)}" data-tpl-field="${field}"
                   value="${_tplEsc(v)}" placeholder="${_tplEsc(placeholder||'')}" /></div>`;
    }
    function _tplFieldTextarea(name, field, label, placeholder) {
        const v = _tplGet(name, field);
        return `<div class="tpl-field"><label class="tpl-field-label">${label}</label>
            <textarea class="tpl-textarea" data-tpl-client="${_tplEsc(name)}" data-tpl-field="${field}"
                      placeholder="${_tplEsc(placeholder||'')}" rows="4">${_tplEsc(v)}</textarea></div>`;
    }
    function _tplFieldColor(name, field, label, offField) {
        const v = _tplGet(name, field) || '';
        const safe = /^#[0-9a-fA-F]{6}$/.test(v) ? v : '#000000';
        const isOff = offField ? !!_tplGet(name, offField) : false;
        const head = offField
            ? `<div class="tpl-field-head"><label class="tpl-field-label">${label}</label>
                 <label class="tpl-toggle-mini">
                   <input type="checkbox" data-tpl-client="${_tplEsc(name)}" data-tpl-field="${offField}" data-tpl-bool data-tpl-disables-pair="${field}"${isOff?' checked':''} />
                   <span class="tpl-toggle-mini-track"><span class="tpl-toggle-mini-thumb"></span></span>
                   <span>No highlight</span>
                 </label>
               </div>`
            : `<label class="tpl-field-label">${label}</label>`;
        return `<div class="tpl-field">${head}
            <div class="tpl-color-row${isOff?' tpl-color-off':''}" data-tpl-color-row="${field}">
                <input class="tpl-color-swatch" type="color" data-tpl-client="${_tplEsc(name)}" data-tpl-field="${field}" data-tpl-color-pair="${field}" value="${safe}" />
                <input class="tpl-input tpl-color-hex" type="text" data-tpl-client="${_tplEsc(name)}" data-tpl-field="${field}" data-tpl-color-pair="${field}" value="${_tplEsc(v)}" placeholder="#RRGGBB" maxlength="7" />
            </div></div>`;
    }
    function _tplFieldLink(name, field, label, placeholder) {
        const v = _tplGet(name, field);
        const isUrl = /^https?:\/\//i.test(v);
        return `<div class="tpl-field"><label class="tpl-field-label">${label}</label>
            <div class="tpl-link-row">
                <input class="tpl-input" type="url" data-tpl-client="${_tplEsc(name)}" data-tpl-field="${field}"
                       value="${_tplEsc(v)}" placeholder="${_tplEsc(placeholder||'https://…')}" />
                <a class="tpl-link-open${isUrl?'':' disabled'}" href="${isUrl?_tplEsc(v):'#'}" target="_blank" rel="noopener" title="Open link"
                   data-tpl-link-for="${field}">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M9.5 2.5h4v4M13.5 2.5L7 9M11 8.5V13a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </a>
            </div></div>`;
    }

    /* ── View-mode field renderers ──────────────────────────────────────── */
    const _NOT_SET = '<span class="tpl-not-set">Not set</span>';
    function _tplViewText(name, field, label) {
        const v = _tplGet(name, field);
        return `<div class="tpl-view-field">
            <div class="tpl-view-label">${label}</div>
            <div class="tpl-view-value">${v ? _tplEsc(v) : _NOT_SET}</div>
        </div>`;
    }
    function _tplViewColor(name, field, label) {
        const v = _tplGet(name, field) || '';
        const isHex = /^#[0-9a-fA-F]{6}$/.test(v);
        const swatch = isHex
            ? `<span class="tpl-view-swatch" style="background:${_tplEsc(v)}"></span>`
            : `<span class="tpl-view-swatch tpl-view-swatch-empty" aria-hidden="true"></span>`;
        return `<div class="tpl-view-field">
            <div class="tpl-view-label">${label}</div>
            <div class="tpl-view-value tpl-view-color-row">${swatch}<span class="tpl-view-color-hex">${v ? _tplEsc(v.toUpperCase()) : _NOT_SET}</span></div>
        </div>`;
    }
    function _tplViewLink(name, field, label, openLabel) {
        const v = _tplGet(name, field);
        const isUrl = /^https?:\/\//i.test(v);
        let host = '';
        if (isUrl) { try { host = new URL(v).hostname.replace(/^www\./,''); } catch {} }
        const value = isUrl
            ? `<a class="tpl-view-link" href="${_tplEsc(v)}" target="_blank" rel="noopener">
                ${openLabel || 'Open'}
                ${host ? `<span class="tpl-view-link-host">${_tplEsc(host)}</span>` : ''}
                <svg width="11" height="11" viewBox="0 0 16 16" fill="none"><path d="M9.5 2.5h4v4M13.5 2.5L7 9M11 8.5V13a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
              </a>`
            : _NOT_SET;
        return `<div class="tpl-view-field">
            <div class="tpl-view-label">${label}</div>
            <div class="tpl-view-value">${value}</div>
        </div>`;
    }
    function _tplViewProse(name, field) {
        const v = _tplGet(name, field);
        if (!v) return `<div class="tpl-view-prose tpl-view-prose-empty">No preferences noted yet.</div>`;
        return `<div class="tpl-view-prose">${_tplEsc(v)}</div>`;
    }

    /* ── Thumbnails color sets (multiple title+highlight pairs) ─────────── */
    const TPL_MAX_COLOR_SETS = 5;
    function _tplGetColorSets(name) {
        const raw = _tplGet(name, 'thumbnails_color_sets');
        if (raw && typeof raw === 'string') {
            try {
                const arr = JSON.parse(raw);
                if (Array.isArray(arr) && arr.length) {
                    return arr.map(s => ({ title: (s && s.title) || '', highlight: (s && s.highlight) || '' }));
                }
            } catch {}
        }
        // Migration: fall back to the single-pair legacy columns when no JSON yet.
        const t = _tplGet(name, 'thumbnails_title_color');
        const h = _tplGet(name, 'thumbnails_highlight_color');
        if (t || h) return [{ title: t || '', highlight: h || '' }];
        return [{ title: '', highlight: '' }];
    }
    function _tplSaveColorSets(name, sets) {
        const cleaned = (sets && sets.length ? sets : [{ title: '', highlight: '' }])
            .map(s => ({ title: (s && s.title) || '', highlight: (s && s.highlight) || '' }));
        _tplQueueSave(name, 'thumbnails_color_sets', JSON.stringify(cleaned), false);
        // Mirror the first set into the legacy single-pair columns so anything still reading those stays in sync.
        _tplQueueSave(name, 'thumbnails_title_color', cleaned[0].title, false);
        _tplQueueSave(name, 'thumbnails_highlight_color', cleaned[0].highlight, false);
    }
    function _tplAddColorSet(name) {
        const sets = _tplGetColorSets(name);
        if (sets.length >= TPL_MAX_COLOR_SETS) return;
        sets.push({ title: '', highlight: '' });
        _tplSaveColorSets(name, sets);
        if (_templatesSelected === name) {
            const content = document.getElementById('content');
            if (content) { content.innerHTML = renderClientTemplate(name); mountTemplatesView(); }
        }
    }
    function _tplRemoveColorSet(name, index) {
        const sets = _tplGetColorSets(name);
        if (index < 0 || index >= sets.length) return;
        sets.splice(index, 1);
        if (sets.length === 0) sets.push({ title: '', highlight: '' });
        _tplSaveColorSets(name, sets);
        if (_templatesSelected === name) {
            const content = document.getElementById('content');
            if (content) { content.innerHTML = renderClientTemplate(name); mountTemplatesView(); }
        }
    }

    function _tplRenderColorSetsEdit(name, sets, hlOff) {
        const items = sets.map((s, i) => {
            const titleSafe = /^#[0-9a-fA-F]{6}$/.test(s.title) ? s.title : '#000000';
            const hlSafe = /^#[0-9a-fA-F]{6}$/.test(s.highlight) ? s.highlight : '#000000';
            const removeBtn = sets.length > 1
                ? `<button class="tpl-set-remove" onclick="_tplRemoveColorSet('${_tplEscAttr(name)}', ${i})" title="Remove this set"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><line x1="2.5" y1="2.5" x2="9.5" y2="9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="9.5" y1="2.5" x2="2.5" y2="9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></button>`
                : '';
            return `<div class="tpl-color-set-row" data-tpl-set-index="${i}">
                <div class="tpl-set-num">${i + 1}</div>
                <div class="tpl-set-pair">
                    <div class="tpl-set-cell">
                        <span class="tpl-set-cell-label">Title</span>
                        <div class="tpl-color-row">
                            <input class="tpl-color-swatch" type="color" data-tpl-set="${i}" data-tpl-set-key="title" data-tpl-set-pair-color value="${titleSafe}" />
                            <input class="tpl-input tpl-color-hex" type="text" data-tpl-set="${i}" data-tpl-set-key="title" data-tpl-set-pair-color value="${_tplEsc(s.title)}" placeholder="#title" maxlength="7" />
                        </div>
                    </div>
                    <div class="tpl-set-cell${hlOff?' tpl-color-off':''}">
                        <span class="tpl-set-cell-label">Highlight</span>
                        <div class="tpl-color-row">
                            <input class="tpl-color-swatch" type="color" data-tpl-set="${i}" data-tpl-set-key="highlight" data-tpl-set-pair-color value="${hlSafe}" />
                            <input class="tpl-input tpl-color-hex" type="text" data-tpl-set="${i}" data-tpl-set-key="highlight" data-tpl-set-pair-color value="${_tplEsc(s.highlight)}" placeholder="#highlight" maxlength="7" />
                        </div>
                    </div>
                </div>
                ${removeBtn}
            </div>`;
        }).join('');
        const canAddMore = sets.length < TPL_MAX_COLOR_SETS;
        const addBtn = canAddMore
            ? `<button class="tpl-set-add" onclick="_tplAddColorSet('${_tplEscAttr(name)}')"><svg width="11" height="11" viewBox="0 0 12 12" fill="none"><line x1="6" y1="2.5" x2="6" y2="9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="2.5" y1="6" x2="9.5" y2="6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg> Add color set</button>`
            : `<div class="tpl-set-add-max">Max ${TPL_MAX_COLOR_SETS} sets</div>`;
        return `<div class="tpl-color-sets-edit" data-tpl-color-sets data-tpl-client="${_tplEsc(name)}">
            ${items}
            ${addBtn}
        </div>`;
    }

    function _tplRenderColorSetsView(name, hlOff) {
        const sets = _tplGetColorSets(name).filter(s => s.title || s.highlight);
        if (!sets.length) {
            return `<div class="tpl-view-field">
                <div class="tpl-view-label">Color sets</div>
                <div class="tpl-view-value">${_NOT_SET}</div>
            </div>`;
        }
        const cards = sets.map((s, i) => {
            const titleHex = /^#[0-9a-fA-F]{6}$/.test(s.title);
            const hlHex = /^#[0-9a-fA-F]{6}$/.test(s.highlight);
            const titleSwatch = titleHex
                ? `<span class="tpl-view-swatch tpl-view-swatch-sm" style="background:${_tplEsc(s.title)}"></span>`
                : `<span class="tpl-view-swatch tpl-view-swatch-sm tpl-view-swatch-empty"></span>`;
            const hlSwatch = (!hlOff && s.highlight)
                ? (hlHex
                    ? `<span class="tpl-view-swatch tpl-view-swatch-sm" style="background:${_tplEsc(s.highlight)}"></span>`
                    : `<span class="tpl-view-swatch tpl-view-swatch-sm tpl-view-swatch-empty"></span>`)
                : '';
            const titleHexLabel = s.title ? _tplEsc(s.title.toUpperCase()) : '—';
            const hlHexLabel = (!hlOff && s.highlight) ? ` · ${_tplEsc(s.highlight.toUpperCase())}` : '';
            return `<div class="tpl-color-set-card">
                <span class="tpl-set-num">${i + 1}</span>
                <span class="tpl-set-swatches">${titleSwatch}${hlSwatch}</span>
                <span class="tpl-set-hex">${titleHexLabel}${hlHexLabel}</span>
            </div>`;
        }).join('');
        return `<div class="tpl-view-field tpl-view-color-sets-field">
            <div class="tpl-view-label">Color sets</div>
            <div class="tpl-color-sets-view">${cards}</div>
        </div>`;
    }

    /* ── View renderers ─────────────────────────────────────────────────── */
    function renderTemplatesView() {
        if (_templatesSelected) return renderClientTemplate(_templatesSelected);
        return renderTemplatesIndex();
    }

    function renderTemplatesIndex() {
        const banner = (TEMPLATES_GET_URL && TEMPLATES_SAVE_URL) ? '' : `
            <div class="tpl-config-banner">
                Templates backend isn't configured yet — set <code>TEMPLATES_GET_URL</code> and <code>TEMPLATES_SAVE_URL</code> in <code>index.html</code>. Until then, edits won't be saved.
            </div>`;
        const errBanner = (templatesLoadError && templatesLoadError !== 'not-configured') ? `
            <div class="tpl-config-banner">Couldn't load templates: ${_tplEsc(templatesLoadError)}. Try refreshing the page.</div>` : '';
        return `<div class="tpl-index-centered">
            ${banner}${errBanner}
            <div class="tpl-index-title">Client Templates</div>
            <div class="tpl-index-sub">Fonts, colors, references, and preferences — one place for all of them.</div>
            <div class="search-bar-wrap" id="tplSearchWrap">
                <div class="search-bar-pill">
                    <input class="search-bar-input" id="tplSearchInput" type="text"
                        placeholder="Search clients…"
                        oninput="_tplOnSearchInput()" onkeydown="_tplOnSearchKey(event)"
                        onfocus="_tplOnSearchFocus()" autocomplete="off">
                    <div class="search-ghost-overlay" id="tplSearchGhost"></div>
                    <button class="search-bar-icon" onclick="_tplOnSearchIconClick()" title="Search">
                        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    </button>
                </div>
                <div class="search-dropdown" id="tplSearchBox">
                    <div id="tplSearchResults"></div>
                </div>
            </div>
            <div class="tpl-pins-area" id="tplPinsArea">
                <div class="tpl-pins-label" id="tplPinsLabel">My Clients</div>
                <div class="pins-row" id="tplPinsRow"></div>
                <div class="pins-add-row" id="tplPinsAddRow"></div>
            </div>
        </div>`;
    }

    /* ── Templates pinned clients (per-user, localStorage) ──────────────── */
    function _tplGetPins() { try { return JSON.parse(localStorage.getItem(TPL_PINS_KEY) || '[]'); } catch { return []; } }
    function _tplSavePins(p) { localStorage.setItem(TPL_PINS_KEY, JSON.stringify(p)); }
    function _tplTogglePin(name) {
        let pins = _tplGetPins();
        if (pins.includes(name)) pins = pins.filter(p => p !== name);
        else { if (pins.length >= TPL_MAX_PINS) return; pins.push(name); }
        _tplSavePins(pins);
        _tplRenderPins();
    }
    function _tplRemovePin(name) {
        const pins = _tplGetPins().filter(p => p !== name);
        _tplSavePins(pins);
        if (pins.length === 0) _tplPinsEditMode = false;
        _tplPinSelectorOpen = false;
        _tplRenderPins();
    }
    function _tplTogglePinsEdit() { _tplPinsEditMode = !_tplPinsEditMode; _tplPinSelectorOpen = false; _tplRenderPins(); }
    function _tplClosePinSelector() { _tplPinSelectorOpen = false; const dd = document.getElementById('tplPinSelectorDropdown'); if (dd) dd.classList.remove('open'); }
    function _tplTogglePinSelector() {
        if (_tplPinSelectorOpen) { _tplClosePinSelector(); return; }
        _tplPinSelectorOpen = true;
        const dd = document.getElementById('tplPinSelectorDropdown');
        if (dd) { dd.classList.add('open'); _tplRenderPinSelectorList(); }
        const close = (e) => {
            const addRow = document.getElementById('tplPinsAddRow');
            if (addRow && !addRow.contains(e.target)) {
                _tplClosePinSelector();
                document.removeEventListener('click', close);
            }
        };
        setTimeout(() => document.addEventListener('click', close), 0);
    }
    function _tplRenderPins() {
        const row = document.getElementById('tplPinsRow');
        const addRow = document.getElementById('tplPinsAddRow');
        const area = document.getElementById('tplPinsArea');
        if (!row || !addRow) return;
        const pins = _tplGetPins();
        row.innerHTML = '';
        pins.forEach(name => {
            const pill = document.createElement('a');
            pill.className = 'pin-pill';
            pill.href = '#templates/' + encodeURIComponent(name);
            pill.style.textDecoration = 'none';
            pill.style.color = 'inherit';
            if (!_tplPinsEditMode) pill.onclick = (e) => { e.preventDefault(); openClientTemplate(name); };
            else pill.onclick = (e) => { e.preventDefault(); };
            const nameSpan = document.createElement('span');
            nameSpan.textContent = name;
            pill.appendChild(nameSpan);
            if (_tplPinsEditMode) {
                const rm = document.createElement('span');
                rm.className = 'pin-remove';
                rm.title = 'Remove';
                rm.textContent = '✕';
                rm.onclick = (e) => { e.preventDefault(); e.stopPropagation(); _tplRemovePin(name); };
                pill.appendChild(rm);
            }
            row.appendChild(pill);
        });
        if (pins.length >= 1) {
            const editBtn = document.createElement('button');
            editBtn.className = 'pin-edit-btn' + (_tplPinsEditMode ? ' active' : '');
            editBtn.title = _tplPinsEditMode ? 'Done' : 'Edit pins';
            editBtn.innerHTML = _tplPinsEditMode
                ? '<svg width="11" height="11" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>'
                : PEN_ICON_SVG;
            editBtn.onclick = _tplTogglePinsEdit;
            row.appendChild(editBtn);
        }
        addRow.innerHTML = '';
        const showAddBtn = pins.length < TPL_MAX_PINS && (pins.length === 0 || _tplPinsEditMode || _tplPinSelectorOpen);
        if (showAddBtn) {
            const addBtn = document.createElement('button');
            addBtn.className = 'pin-add-btn';
            addBtn.title = 'Pin a client';

    function _tplRenderPinSelectorList() {

    /* ── Templates search bar (mirrors the analytics search bar) ────────── */
    function _tplGetRecent() { try { return JSON.parse(localStorage.getItem(TPL_RECENT_KEY) || '[]'); } catch { return []; } }
    function _tplAddRecent(name) { let r = _tplGetRecent().filter(n => n !== name); r.unshift(name); r = r.slice(0,3); localStorage.setItem(TPL_RECENT_KEY, JSON.stringify(r)); }
    function _tplAllNames() { return [...new Set(allData.map(r => r.client_name))].sort(); }
    function _tplMatches(q) {
        const allNames = _tplAllNames();
        const q2 = (q || '').trim().toLowerCase();
        if (!q2) return [];
        const starts = allNames.filter(n => n.toLowerCase().startsWith(q2));
        const contains = allNames.filter(n => !n.toLowerCase().startsWith(q2) && n.toLowerCase().includes(q2));
        return [...starts, ...contains];
    }
    function _tplHighlight(name, q) { if (!q) return _tplEsc(name); const idx = name.toLowerCase().indexOf(q.toLowerCase()); if (idx < 0) return _tplEsc(name); return _tplEsc(name.slice(0,idx)) + '<span class="s-match">' + _tplEsc(name.slice(idx, idx + q.length)) + '</span>' + _tplEsc(name.slice(idx + q.length)); }
    function _tplOpenSearchDropdown() {
        const box = document.getElementById('tplSearchBox');
        if (!box || box.classList.contains('open')) return;
        box.classList.add('open');
        const close = (e) => {
            const wrap = document.getElementById('tplSearchWrap');
            if (wrap && !wrap.contains(e.target)) {
                box.classList.remove('open');
                document.removeEventListener('click', close);
            }
        };
        setTimeout(() => document.addEventListener('click', close), 0);
    }
    function _tplOnSearchFocus() { _tplRenderSearchResults(document.getElementById('tplSearchInput')?.value || ''); _tplOpenSearchDropdown(); }
    function _tplOnSearchInput() {
        const q = document.getElementById('tplSearchInput')?.value || '';
        _tplRenderSearchResults(q);
        _tplUpdateSearchGhost(q);
        _tplOpenSearchDropdown();
    }
    function _tplOnSearchIconClick() {
        const inp = document.getElementById('tplSearchInput');
        const q = (inp?.value || '').trim();
        if (q) {
            const first = _tplMatches(q)[0];
            if (first) { _tplGoTo(first); return; }
        }
        inp?.focus();
        _tplOpenSearchDropdown();
    }
    function _tplOnSearchKey(e) {
        if (e.key === 'Escape') {
            document.getElementById('tplSearchBox')?.classList.remove('open');
            const ghost = document.getElementById('tplSearchGhost'); if (ghost) ghost.innerHTML = '';
            document.getElementById('tplSearchInput')?.blur();
            return;
        }
        if (e.key !== 'Enter') return;
        const q = (document.getElementById('tplSearchInput')?.value || '').trim();
        if (!q) return;
        const first = _tplMatches(q)[0];
        if (first) _tplGoTo(first);
    }
    function _tplUpdateSearchGhost(q) {
        const ghost = document.getElementById('tplSearchGhost');
        const inp = document.getElementById('tplSearchInput');
        if (!ghost || !inp) return;
        const q2 = q.trim().toLowerCase();
        if (!q2) { ghost.innerHTML = ''; return; }
        const first = _tplMatches(q2)[0];
        if (!first) { ghost.innerHTML = ''; return; }
        if (first.toLowerCase().startsWith(q2)) {
            const typed = first.slice(0, q.length);
            const rest = first.slice(q.length);
            ghost.innerHTML = `<span style="color:transparent;white-space:pre">${_tplEsc(typed)}</span><span style="color:var(--text-muted);opacity:0.55;white-space:pre">${_tplEsc(rest)}</span><span style="margin-left:8px;font-size:0.65rem;color:var(--text-muted);opacity:0.4;background:var(--border);border-radius:3px;padding:1px 5px;flex-shrink:0;">↵</span>`;
        } else {
            ghost.innerHTML = `<span style="color:transparent;white-space:pre">${_tplEsc(q)}</span><span style="margin-left:8px;font-size:0.65rem;color:var(--text-muted);opacity:0.4;background:var(--border);border-radius:3px;padding:1px 5px;flex-shrink:0;">↵ ${_tplEsc(first)}</span>`;
        }
    }
    function _tplRenderSearchResults(q) {
        const el = document.getElementById('tplSearchResults');
        if (!el) return;
        const allNames = _tplAllNames();
        const recent = _tplGetRecent().filter(n => allNames.includes(n));
        const q2 = q.trim().toLowerCase();
        if (!q2) {
            if (!recent.length) { el.innerHTML = ''; return; }
            el.innerHTML = `<div class="search-section-label">Recent</div>` + recent.map(name => `<div class="search-suggestion" onclick="_tplGoTo('${_tplEscAttr(name)}')"><span class="s-icon">↩</span><span>${_tplEsc(name)}</span></div>`).join('');
        } else {
            const matches = _tplMatches(q2);
            if (!matches.length) { el.innerHTML = `<div class="search-empty">No clients found</div>`; }
            else { el.innerHTML = matches.slice(0, 6).map(name => `<div class="search-suggestion" onclick="_tplGoTo('${_tplEscAttr(name)}')"><span class="s-icon">👤</span><span>${_tplHighlight(name, q.trim())}</span></div>`).join(''); }
        }
    }
    function _tplGoTo(name) {
        _tplAddRecent(name);
        const box = document.getElementById('tplSearchBox');
        const inp = document.getElementById('tplSearchInput');
        const ghost = document.getElementById('tplSearchGhost');
        if (box) box.classList.remove('open');
        if (inp) { inp.value = ''; inp.blur(); }
        if (ghost) ghost.innerHTML = '';
        openClientTemplate(name);
    }

    function setTemplatesEditMode(on) {
        const name = _templatesSelected;
        // Flush any pending autosaves before leaving edit mode so view mode reflects the latest.
        if (!on && name && _tplDirty[name] && Object.keys(_tplDirty[name]).length) _tplFlush(name);
        _templatesEditMode = !!on;
        const content = document.getElementById('content');
        if (!content || !name) return;
        content.innerHTML = renderClientTemplate(name);
        mountTemplatesView();

    function mountTemplatesView() {
        const root = document.getElementById('content');
        if (!root) return;
        // Render the "My Clients" pinned section if the index page is showing.
        if (!_templatesSelected && document.getElementById('tplPinsArea')) _tplRenderPins();
        const fields = root.querySelectorAll('[data-tpl-field]');
        fields.forEach(el => {
            const name  = el.getAttribute('data-tpl-client');
            const field = el.getAttribute('data-tpl-field');
            const isColorPair = el.hasAttribute('data-tpl-color-pair');
            const isBool = el.hasAttribute('data-tpl-bool');

            if (isBool) {
                // Booleans (e.g. "no highlight" toggle): persist as 'true' or '' so the
                // string round-trip stays unambiguous, and dim the paired color row.
                el.addEventListener('change', () => {
                    const v = el.checked ? 'true' : '';
                    _tplQueueSave(name, field, v, true);
                    const pair = el.getAttribute('data-tpl-disables-pair');
                    if (pair) {
                        const row = root.querySelector(`[data-tpl-color-row="${pair}"]`);
                        if (row) row.classList.toggle('tpl-color-off', el.checked);
                    }
                    // The thumbnails toggle dims every highlight cell across all color sets.
                    if (el.hasAttribute('data-tpl-disables-color-sets')) {
                        root.querySelectorAll('.tpl-color-sets-edit .tpl-set-cell').forEach(cell => {
                            const isHl = cell.querySelector('[data-tpl-set-key="highlight"]');
                            if (isHl) cell.classList.toggle('tpl-color-off', el.checked);
                        });
                    }
                });
                return;
            }

            el.addEventListener('input', () => {
                let v = el.value;
                if (isColorPair) {
                    const pair = el.getAttribute('data-tpl-color-pair');
                    const peers = root.querySelectorAll(`[data-tpl-color-pair="${pair}"][data-tpl-client="${CSS.escape(name)}"]`);
                    if (el.type === 'color') {
                        peers.forEach(p => { if (p !== el && p.type !== 'color') p.value = v; });
                    } else {
                        if (/^#[0-9a-fA-F]{6}$/.test(v)) peers.forEach(p => { if (p !== el && p.type === 'color') p.value = v; });
                    }
                }
                _tplQueueSave(name, field, v, false);
                if (field.endsWith('_link') || field === 'filming_plans_link') {
                    const opener = root.querySelector(`[data-tpl-link-for="${field}"]`);
                    if (opener) {
                        const ok = /^https?:\/\//i.test(v);
                        opener.classList.toggle('disabled', !ok);
                        opener.setAttribute('href', ok ? v : '#');
                    }
                }
            });
            el.addEventListener('blur', () => {
                if (_tplDirty[name] && Object.keys(_tplDirty[name]).length) _tplFlush(name);
            });
        });

        // Per-set color inputs (thumbnails color sets). Each has data-tpl-set + data-tpl-set-key.
        root.querySelectorAll('[data-tpl-color-sets]').forEach(container => {
            const cName = container.getAttribute('data-tpl-client');
            container.querySelectorAll('[data-tpl-set-pair-color]').forEach(el => {
                const idx = parseInt(el.getAttribute('data-tpl-set'), 10);
                const key = el.getAttribute('data-tpl-set-key');
                el.addEventListener('input', () => {
                    const v = el.value;
                    // Sync swatch ↔ hex within the same set+key.
                    const peers = container.querySelectorAll(`[data-tpl-set="${idx}"][data-tpl-set-key="${key}"]`);
                    if (el.type === 'color') {
                        peers.forEach(p => { if (p !== el && p.type !== 'color') p.value = v; });
                    } else if (/^#[0-9a-fA-F]{6}$/.test(v)) {
                        peers.forEach(p => { if (p !== el && p.type === 'color') p.value = v; });
                    }
                    const sets = _tplGetColorSets(cName);
                    while (sets.length <= idx) sets.push({ title: '', highlight: '' });
                    sets[idx][key] = v;
                    _tplSaveColorSets(cName, sets);
                });
                el.addEventListener('blur', () => {
                    if (_tplDirty[cName] && Object.keys(_tplDirty[cName]).length) _tplFlush(cName);
                });
            });
        });
    }

    function wlReadCache() {
        try {
            const raw = localStorage.getItem(LINEAR_ISSUES_CACHE_KEY);
            if (!raw) return null;
            const parsed = JSON.parse(raw);
            if (!parsed || !parsed.fetchedAt || !Array.isArray(parsed.issues)) return null;
            return parsed;
        } catch { return null; }
    }
    function wlWriteCache(payload) {
        try { localStorage.setItem(LINEAR_ISSUES_CACHE_KEY, JSON.stringify(payload)); } catch {}
    }
    function wlIsFresh(fetchedAt) {
        return typeof fetchedAt === 'number' && (Date.now() - fetchedAt) < LINEAR_ISSUES_TTL_MS;
    }

    async function loadLinearIssues(force) {
        const cache = wlReadCache();
        if (cache && !force && wlIsFresh(cache.fetchedAt)) {
            return { issues: cache.issues, fetchedAt: cache.fetchedAt, fromCache: true };
        }
        const resp = await fetch(LINEAR_ISSUES_WEBHOOK, { method: 'GET' });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        const issues = Array.isArray(data) ? data : (data.issues || []);
        const fetchedAt = Date.now();
        wlWriteCache({ issues, fetchedAt });
        return { issues, fetchedAt, fromCache: false };
    }

    // Date helpers — all dates handled as YYYY-MM-DD strings for determinism.
    function wlTodayISO() {
        const d = new Date();
        return wlISO(d.getFullYear(), d.getMonth(), d.getDate());
    }
    function wlISO(y, m, d) {
        return y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    }
    function wlParseISO(iso) {
        const [y, m, d] = iso.split('-').map(Number);
        return new Date(y, m - 1, d);
    }
    function wlAddWorkingDays(iso, n) {
        const d = wlParseISO(iso);
        let added = 0;
        while (added < n) {
            d.setDate(d.getDate() + 1);
            const dow = d.getDay();
            if (dow !== 0 && dow !== 6) added++;
        }
        return wlISO(d.getFullYear(), d.getMonth(), d.getDate());
    }
    function wlSubWorkingDays(iso, n) {
        const d = wlParseISO(iso);
        let removed = 0;
        while (removed < n) {
            d.setDate(d.getDate() - 1);
            const dow = d.getDay();
            if (dow !== 0 && dow !== 6) removed++;
        }
        return wlISO(d.getFullYear(), d.getMonth(), d.getDate());
    }
    function wlNextWorkingDay(iso) {
        const d = wlParseISO(iso);
        while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() + 1);
        return wlISO(d.getFullYear(), d.getMonth(), d.getDate());
    }
    function wlIsWeekend(y, m, d) {
        const dow = new Date(y, m, d).getDay();
        return dow === 0 || dow === 6;
    }
    function wlWeekMondayISO(iso) {
        const d = wlParseISO(iso);
        const dow = d.getDay(); // 0=Sun..6=Sat
        const diff = dow === 0 ? -6 : 1 - dow;
        d.setDate(d.getDate() + diff);
        return wlISO(d.getFullYear(), d.getMonth(), d.getDate());
    }
    function wlAddDays(iso, n) {
        const d = wlParseISO(iso);
        d.setDate(d.getDate() + n);
        return wlISO(d.getFullYear(), d.getMonth(), d.getDate());
    }
    function wlFormatShort(iso) {
        const d = wlParseISO(iso);
        return d.toLocaleDateString('en-GB', { month: 'short', day: 'numeric' });
    }

    // Status classification — user rule:
    //   Workload only shows work the editor still owns. Anything parked on
    //   someone else (Tweaks Applied, awaiting SMM/Casper/Client approval,

    //   plus any active status not explicitly parked) is shown.
    //   "Right now" = status name is literally "In Progress".
    const WL_PARKED_STATUSES = new Set([
        'tweak applied', 'tweaks applied',
        'for smm approval', 'waiting for smm approval', 'smm approval',
        'for casper approval', 'waiting for casper approval', 'casper approval',
        'for kasper approval', 'waiting for kasper approval', 'kasper approval',
        'for client approval', 'waiting for client approval', 'client approval',
        'approved',
        'posted'
    ]);
    function wlNormStatus(sub) {
        return (sub.status || '').trim().toLowerCase();
    }
    function wlIsActiveStatus(sub) {
        const t = (sub.statusType || '').toLowerCase();
        if (t === 'completed' || t === 'canceled' || t === 'triage') return false;
        return !WL_PARKED_STATUSES.has(wlNormStatus(sub));
    }
    function wlIsInProgress(sub) {
        return wlNormStatus(sub) === 'in progress';
    }
    function wlIsTweaksNeeded(sub) {
        // Linear's actual status is "Tweak Needed" (singular). We match the
        // plural form too in case the status name gets renamed later — same
        // defensive pattern as the "tweak applied" / "tweaks applied" entry
        // in WL_PARKED_STATUSES.
        const s = wlNormStatus(sub);
        return s === 'tweak needed' || s === 'tweaks needed';
    }
    function wlIsToDo(sub) {
        const s = wlNormStatus(sub);

    const WL_ALLOWED_EDITORS = new Set([

    function wlNormalizeEditor(s) {

    // Effective work date = the working day BEFORE the due date, never earlier
    // than today. The team's rule is that a video due tomorrow has to be edited
    // today, so the scheduler always targets dueDate-1, not the due date itself.
    // Items without a due date (e.g. In Progress with no date set) get pinned
    // to today so the editor sees them on the calendar instead of nowhere.
    function wlEffectiveWorkDate(dueDate, todayISO) {
        if (!dueDate) return todayISO;
        const before = wlSubWorkingDays(dueDate, 1);
        return before < todayISO ? todayISO : before;
    }

    // Scheduler — deterministic, per-assignee, work-date first, capacity-per-day batched by client.
    // Rules:
    //   - Work date for any sub-issue is dueDate-1 working day, floored to today.
    //   - Items whose work date is today are pinned to today (capacity overflow allowed).
    //   - Items whose work date falls before the cursor overflow back to that work date.
    //   - Video editors: 5/day capacity. Graphic designers: 15/day capacity.
    function scheduleAll(plannedSubs, todayISO) {
        const byAssignee = new Map();
        for (const s of plannedSubs) {
            s.effectiveWorkDate = wlEffectiveWorkDate(s.dueDate, todayISO);
            if (!byAssignee.has(s.assigneeId)) byAssignee.set(s.assigneeId, []);
            byAssignee.get(s.assigneeId).push(s);
        }
        const scheduledByDate = new Map();
        const push = (iso, sub) => {
            if (!scheduledByDate.has(iso)) scheduledByDate.set(iso, []);
            scheduledByDate.get(iso).push(sub);
        };

        for (const [, subs] of byAssignee) {
            const capacity = wlEditorCapacity(subs[0].teamKey, subs[0].teamName);

            // Pin items whose work date is today (i.e. due today, due tomorrow,
            // or already overdue) to today regardless of capacity.
            const dueToday = subs.filter(s => s.effectiveWorkDate === todayISO);
            const queue    = subs.filter(s => s.effectiveWorkDate !== todayISO);
            for (const s of dueToday) {
                s.scheduledDate = todayISO;
                push(todayISO, s);
            }

            queue.sort((a, b) => {
                const da = a.effectiveWorkDate || '9999-12-31';
                const db = b.effectiveWorkDate || '9999-12-31';
                if (da !== db) return da < db ? -1 : 1;
                const ca = a.clientName || '';
                const cb = b.clientName || '';
                if (ca !== cb) return ca.localeCompare(cb);
                return (a.identifier || '').localeCompare(b.identifier || '');
            });

            // Group consecutive same-client items into chunks of up to `capacity`.
            const chunks = [];
            let i = 0;
            while (i < queue.length) {
                const chunk = [queue[i]];
                let j = i + 1;
                while (j < queue.length && chunk.length < capacity && queue[j].clientName === chunk[0].clientName) {
                    chunk.push(queue[j]);
                    j++;
                }
                chunks.push(chunk);
                i = j;
            }

            // Assign dates: ASAP scheduling, packed into the cursor day's
            // remaining capacity. Today starts with however many slots the
            // dueToday pin hasn't already eaten; subsequent days start full.
            // A chunk that doesn't fit in the remaining slots gets bumped to
            // the next working day rather than overflowing the current one,
            // so an editor with 4 pinned never gets a 5-item chunk piled
            // on top to make 9. If the cursor overtakes a chunk's work date,
            // overflow back to that work date rather than pushing past it.
            let cursor = todayISO;
            let cursorRemaining = Math.max(0, capacity - dueToday.length);
            if (cursorRemaining === 0) {
                cursor = wlAddWorkingDays(todayISO, 1);
                cursorRemaining = capacity;
            }
            for (const chunk of chunks) {
                if (chunk.length > cursorRemaining) {
                    cursor = wlAddWorkingDays(cursor, 1);
                    cursorRemaining = capacity;
                }
                const chunkTarget = chunk[0].effectiveWorkDate;
                const assignedDate = (chunkTarget && chunkTarget < cursor) ? chunkTarget : cursor;
                for (const sub of chunk) {
                    sub.scheduledDate = assignedDate;
                    push(assignedDate, sub);
                }
                if (assignedDate === cursor) {
                    cursorRemaining -= chunk.length;
                    if (cursorRemaining <= 0) {
                        cursor = wlAddWorkingDays(cursor, 1);
                        cursorRemaining = capacity;
                    }
                }
            }
        }
        return scheduledByDate;
    }

    function wlTeamBucket(teamKey, teamName) {
        const k = (teamKey || '').toUpperCase();
        const n = (teamName || '').toLowerCase();
        if (n.includes('graphic') || k === 'DES' || k === 'GFX' || k === 'GRA') return 'graphics';
        return 'video';
    }
    function wlEditorCapacity(teamKey, teamName) {
        return wlTeamBucket(teamKey, teamName) === 'graphics' ? 15 : 5;
    }

    function wlInitials(name) {
        const n = wlDisplayName(name);
        if (!n) return '?';
        const parts = n.trim().split(/\s+/);
        return ((parts[0]?.[0] || '') + (parts[1]?.[0] || '')).toUpperCase() || n[0].toUpperCase();
    }

    // Some Linear users have no full name set — assigneeName is then the email.
    // Convert "martin.synchro@gmail.com" -> "Martin Synchro"; otherwise use the name as-is.
    function wlDisplayName(name) {
        if (!name) return '';
        const s = String(name).trim();
        if (!/@/.test(s)) return s;
        const local = s.split('@')[0];
        return local.split(/[._-]+/).filter(Boolean)
            .map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
            .join(' ') || s;
    }
