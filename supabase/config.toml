# Supabase CLI config for project uzltbbrjidmjwwfakwve (SyncView).
# Only used for Edge Function deploys — the database schema is managed by the
# *.sql files in migrations/, run by hand in the SQL editor.
project_id = "uzltbbrjidmjwwfakwve"

# Public capture endpoint: transport remains anonymous, but F81 requires server-minted submission
# ownership, abuse/rate/size/schema/kind controls, conditional updates, immutable creation time,
# and sanitized alerts. JWT-off plus service role is not itself a safe public-write contract.
[functions.onboarding-capture]
verify_jwt = false

# Staff credentials gateway. F84 blocks current shared/legacy-key + bulk-plaintext design: replace
# it with individually revocable active-member sessions, metadata-only list, one-secret fail-closed
# audited reveal, and no old plaintext history. JWT-off plus a shared custom key is not sufficient.
[functions.client-credentials]
verify_jwt = false

# A1 calendar write port. Browser/reconciler/n8n callers route here only through
# the runtime canary flag; old n8n calendar-upsert-post stays live as fallback.
[functions.calendar-upsert]
verify_jwt = false

# A2 calendar reorder port. Shares calendar_upsert_ef_clients with calendar saves.
[functions.calendar-reorder]
verify_jwt = false

# A2 samples writer ports. Browser/reconciler/n8n callers route here only through
# sample_review_ef_clients; old sample-review n8n webhooks stay live as fallback.
[functions.sample-review-upsert]
verify_jwt = false

[functions.sample-review-reorder]
verify_jwt = false

# A4 settings writer ports. Browser callers route here only through
# settings_ef_clients; old n8n Sheets writers stay live as fallback.
[functions.templates-save]
verify_jwt = false

[functions.caption-prompts-save]
verify_jwt = false

# Filming plan source of truth. The deployed EF now authenticates every request; missing/wrong
# credentials return 401. Candidate Pages source routes its direct read here, so anon table SELECT
# remains temporarily open until that caller merges and is proved, then the F88 revoke can land.
[functions.filming-plans]
verify_jwt = false

# Browser-callable transport for the SMM report form/viewer. Every action now
# requires the shared staff role key: admin/SMM may submit, while report-text
# reads and manager synchronization are admin-only (plus the transition legacy
# service key). The underlying tables must not grant anon SELECT.
[functions.smm-weekly-reports]
verify_jwt = false

# Browser-triggered resolver for Google Drive thumbnail parent folders. F79/F80 block current
# deployment: require principal/client scope and make the final write an exact URL/version CAS.
[functions.thumbnail-folder-resolve]
verify_jwt = false

# Scheduled scanner for pending thumbnail revision baselines. F78 is closed: the deployed function
# requires a dedicated scheduler signature, fails closed when its server secret is absent or the
# caller signature is wrong, bounds work server-side, and returns aggregate counts only. The
# independent operational kill is repository variable THUMBNAIL_REVISION_SCAN_ENABLED.
[functions.thumbnail-revision-scan]
verify_jwt = false

# Browser comparison reader. Transport JWT stays off because the static SPA
# authenticates with either a staff role key + exact active roster actor or a
# client review token scoped to the requested client. The private bucket and raw
# revision table are never exposed directly.
[functions.thumbnail-revision-read]
verify_jwt = false

# Track B B0 auth verifiers. Both are callable from the static browser app and
# enforce/log with the service role internally; JWT verification stays off.
[functions.client-token-verify]
verify_jwt = false

[functions.client-review-link]
verify_jwt = false

[functions.key-verify]
verify_jwt = false

# Staff-only paginated Production comment reader. The static browser supplies
# its publishable key for routing; the function separately verifies the stored
# staff role key and active roster member before any service-role read.
[functions.production-comments]
verify_jwt = false

# Browser-callable native Production write gateway. Supabase JWT verification
# stays off because the static SPA authenticates each request with either a
# staff role key plus exact roster actor or a scoped client review token.
[functions.production-write]
verify_jwt = false

# Staff-authenticated internal Workload plan-day projection and writer. The
# static browser supplies its verified role key; client tokens and automation
# principals cannot set internal plan dates.
[functions.workload-plan]
verify_jwt = false

# Track B B3 inbound Linear webhook receiver. It verifies Linear HMAC itself and
# follows the existing linear_inbound_enabled gate.
[functions.linear-inbound]
verify_jwt = false
