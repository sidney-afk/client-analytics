# Supabase CLI config for project uzltbbrjidmjwwfakwve (SyncView).
# Only used for Edge Function deploys — the database schema is managed by the
# *-supabase-migration.sql files in the repo root, run by hand in the SQL editor.
project_id = "uzltbbrjidmjwwfakwve"

# Public capture endpoint: the onboarding form calls it anonymously from the
# browser, so JWT verification must stay off (the function holds the service
# role internally and the target table has no anon access).
[functions.onboarding-capture]
verify_jwt = false

# Staff-only credentials gateway. Browser calls it anonymously, but every action
# must include X-Syncview-Key matching the CREDENTIALS_STAFF_KEY Edge secret.
[functions.client-credentials]
verify_jwt = false

# A1 calendar write port. Browser/reconciler/n8n callers route here only through
# the runtime canary flag; old n8n calendar-upsert-post stays live as fallback.
[functions.calendar-upsert]
verify_jwt = false

# A2 calendar reorder port. Shares calendar_upsert_ef_clients with calendar saves.
[functions.calendar-reorder]
verify_jwt = false

# A2 samples writer ports. Browser/reconciler/n8n callers route here only through
# sample_review_ef_clients; old sample-review n8n webhooks stay live as fallback.
[functions.sample-review-upsert]
verify_jwt = false

[functions.sample-review-reorder]
verify_jwt = false
